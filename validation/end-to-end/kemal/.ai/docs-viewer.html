<!--
  DeepInit docs-navigation viewer (M7-7) — a self-contained, OFFLINE, vanilla-JS
  static DOCS READER over DeepInit's generated AGENTS.md + .ai/docs output.
  Generated artifact: regenerated every run, NOT an owned-region merge — do not

  Self-contained: vanilla JS + inline CSS, no remote/content-delivery hosts, no

  the renderer/search/tree/markdown are all first-party. (dashboard AF-6 discipline;

-->
<style>
:root{
  --bg:#fbfcfd; --bg-rail:#f3f5f8; --bg-card:#ffffff; --bg-code:#f3f5f8; --bg-inset:#eef1f5;
  --fg:#1b2330; --fg-soft:#54637a; --fg-faint:#8593a8; --border:#dde3ec; --border-soft:#e8edf3;
  --accent:#2563c9; --accent-soft:#e7f0fd; --accent-fg:#1d4fa0;
  --crit:#c0223b; --high:#d6612a; --med:#b8860b; --low:#5b6b86; --ok:#1f9d6b;
  --pill-high:#1f9d6b; --pill-med:#b8860b; --pill-low:#8593a8;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 2px 8px rgba(20,30,50,.05);
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --rail-l:17rem; --rail-r:15rem; --maxprose:74ch;
}
@media (prefers-color-scheme:dark){:root[data-theme="auto"]{
  --bg:#0f1419; --bg-rail:#141a22; --bg-card:#161d27; --bg-code:#1b232f; --bg-inset:#1b232f;
  --fg:#e6ebf2; --fg-soft:#9fb0c6; --fg-faint:#6c7c93; --border:#27313f; --border-soft:#212a36;
  --accent:#5b9bf2; --accent-soft:#16263e; --accent-fg:#8fbcf7;
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#7d8da3; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#7d8da3;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25);
}}
:root[data-theme="dark"]{
  --bg:#0f1419; --bg-rail:#141a22; --bg-card:#161d27; --bg-code:#1b232f; --bg-inset:#1b232f;
  --fg:#e6ebf2; --fg-soft:#9fb0c6; --fg-faint:#6c7c93; --border:#27313f; --border-soft:#212a36;
  --accent:#5b9bf2; --accent-soft:#16263e; --accent-fg:#8fbcf7;
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#7d8da3; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#7d8da3;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans);
  font-size:clamp(.95rem,.9rem+.2vw,1.02rem);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
.skip{position:absolute;left:-999px;top:0;background:var(--accent);color:#fff;padding:.5rem .9rem;z-index:50;border-radius:0 0 6px 0}
.skip:focus{left:0}

/* layout */
header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:1rem;
  padding:.55rem 1.1rem;background:var(--bg-rail);border-bottom:1px solid var(--border);backdrop-filter:saturate(1.1) blur(4px)}
.brand{display:flex;align-items:center;gap:.55rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.brand .logo{width:1.45rem;height:1.45rem;flex:0 0 auto;color:var(--accent)}
.brand .sub{font-weight:500;color:var(--fg-faint);font-size:.8rem}
.repo{font-family:var(--mono);font-size:.76rem;color:var(--fg-soft);background:var(--bg-inset);
  padding:.18rem .5rem;border-radius:5px;border:1px solid var(--border-soft);white-space:nowrap}
.spacer{flex:1 1 auto}
.searchwrap{position:relative;width:min(34vw,22rem)}
#search{width:100%;padding:.42rem .7rem .42rem 2rem;border:1px solid var(--border);border-radius:8px;
  background:var(--bg-card);color:var(--fg);font-size:.85rem;font-family:var(--sans)}
#search::placeholder{color:var(--fg-faint)}
.searchwrap .si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--fg-faint);width:1rem;height:1rem;pointer-events:none}
.kbd{font-family:var(--mono);font-size:.7rem;color:var(--fg-faint);border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:.02rem .3rem;background:var(--bg-card)}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:8px;cursor:pointer;transition:background-color .15s,color .15s}
.iconbtn:hover{background:var(--accent-soft);color:var(--accent-fg)}
.iconbtn svg{width:1.05rem;height:1.05rem}

#results{position:absolute;top:2.4rem;left:0;right:0;max-height:62vh;overflow:auto;background:var(--bg-card);
  border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:40;display:none;padding:.3rem}
#results.open{display:block}
.res{display:block;padding:.4rem .55rem;border-radius:7px;cursor:pointer}
.res[aria-selected="true"],.res:hover{background:var(--accent-soft)}
.res .rt{font-size:.82rem;font-weight:600}
.res .rk{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);margin-left:.4rem}
.res .rx{font-size:.76rem;color:var(--fg-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res mark{background:transparent;color:var(--accent-fg);font-weight:700}

.shell{display:grid;grid-template-columns:var(--rail-l) minmax(0,1fr) var(--rail-r);gap:0;align-items:start}
nav.rail{position:sticky;top:3.1rem;height:calc(100vh - 3.1rem);overflow:auto;padding:1rem .7rem 2rem;
  background:var(--bg-rail);border-right:1px solid var(--border)}
aside.toc{position:sticky;top:3.1rem;height:calc(100vh - 3.1rem);overflow:auto;padding:1.2rem .9rem 2rem;font-size:.82rem}
main{min-width:0;padding:1.6rem clamp(1rem,3vw,2.6rem) 5rem}
.prose{max-width:var(--maxprose)}

/* nav rail */
.navsec{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint);margin:1.1rem .4rem .3rem;font-weight:700}
.navlink{display:flex;align-items:center;gap:.5rem;padding:.34rem .55rem;border-radius:7px;color:var(--fg-soft);
  cursor:pointer;font-size:.86rem;font-weight:500;transition:background-color .12s,color .12s}
.navlink:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.navlink[aria-current="page"]{background:var(--accent-soft);color:var(--accent-fg);font-weight:650}
.navlink .ni{display:inline-flex;align-items:center;justify-content:center;width:1.1rem;flex:0 0 auto;color:var(--fg-faint);font-size:.8rem}
.navlink[aria-current="page"] .ni{color:var(--accent)}
.navlink .ct{margin-left:auto;font-size:.7rem;color:var(--fg-faint);font-family:var(--mono)}
.tree{margin:.1rem 0 0}
.tree .navlink{padding-left:1.7rem;font-weight:450}

/* TOC */
.toc .th{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint);font-weight:700;margin-bottom:.5rem}
.toc a{display:block;padding:.16rem 0 .16rem .65rem;color:var(--fg-soft);border-left:2px solid var(--border-soft);font-size:.8rem;line-height:1.4}
.toc a:hover{color:var(--accent-fg);text-decoration:none}
.toc a[aria-current="true"]{color:var(--accent-fg);border-left-color:var(--accent);font-weight:600}
.toc a.h3{padding-left:1.35rem;font-size:.76rem}

/* content */
h1.page{font-size:1.7rem;letter-spacing:-.02em;margin:.2rem 0 .35rem}
.tagline{color:var(--fg-soft);font-size:1.02rem;margin:0 0 1.3rem;max-width:var(--maxprose)}
.metarow{display:flex;flex-wrap:wrap;gap:.5rem;margin:0 0 1.5rem}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:9px;padding:.5rem .8rem;min-width:5.2rem}
.stat .n{font-size:1.25rem;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.stat .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);margin-top:.1rem}
main h2{font-size:1.22rem;letter-spacing:-.01em;margin:2.2rem 0 .7rem;padding-bottom:.3rem;border-bottom:1px solid var(--border-soft);scroll-margin-top:4.2rem}
main h3{font-size:1.02rem;margin:1.5rem 0 .5rem;scroll-margin-top:4.2rem}
main h4{font-size:.92rem;margin:1.1rem 0 .4rem;color:var(--fg-soft);scroll-margin-top:4.2rem}
.headerlink{opacity:0;margin-left:.4rem;color:var(--fg-faint);font-weight:400;text-decoration:none;font-size:.85em}
h2:hover .headerlink,h3:hover .headerlink,h4:hover .headerlink{opacity:1}
main p{max-width:var(--maxprose)}
main ul,main ol{max-width:var(--maxprose);padding-left:1.3rem}
main li{margin:.25rem 0}
main code{font-family:var(--mono);font-size:.85em;background:var(--bg-code);padding:.08rem .35rem;border-radius:4px;border:1px solid var(--border-soft)}
main pre{position:relative;background:var(--bg-code);border:1px solid var(--border);border-radius:9px;padding:.85rem 1rem;overflow:auto;max-width:var(--maxprose)}
main pre code{background:none;border:none;padding:0;font-size:.84em;line-height:1.5}
.copybtn{position:absolute;top:.45rem;right:.45rem;font-size:.68rem;padding:.15rem .45rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copybtn{opacity:1}
blockquote{margin:.8rem 0;padding:.2rem 0 .2rem 1rem;border-left:3px solid var(--border);color:var(--fg-soft);max-width:var(--maxprose)}
table.md{border-collapse:collapse;margin:.9rem 0;font-size:.85rem;display:block;overflow:auto;max-width:100%}
table.md th,table.md td{border:1px solid var(--border);padding:.4rem .6rem;text-align:left;vertical-align:top}
table.md th{background:var(--bg-inset);font-weight:650}
hr{border:none;border-top:1px solid var(--border);margin:1.6rem 0}

/* chips, pills, citations */
.cite{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.74rem;
  background:var(--bg-inset);border:1px solid var(--border-soft);border-radius:5px;padding:.05rem .35rem;cursor:pointer;color:var(--fg-soft);transition:background-color .12s}
.cite:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.cite .ci{width:.8rem;height:.8rem;opacity:.7}
.xref{font-family:var(--mono);font-size:.82em;color:var(--accent-fg);background:var(--accent-soft);padding:.02rem .3rem;border-radius:4px}
a.xref:hover{text-decoration:none;filter:brightness(.95)}
.pill{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.02em;padding:.08rem .42rem;border-radius:20px;vertical-align:middle}
.pill.high{background:color-mix(in srgb,var(--pill-high) 18%,transparent);color:var(--pill-high)}
.pill.medium{background:color-mix(in srgb,var(--pill-med) 18%,transparent);color:var(--pill-med)}
.pill.low{background:color-mix(in srgb,var(--pill-low) 20%,transparent);color:var(--pill-low)}
.pill.sev-critical{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}
.pill.sev-high{background:color-mix(in srgb,var(--high) 16%,transparent);color:var(--high)}
.pill.sev-medium{background:color-mix(in srgb,var(--med) 18%,transparent);color:var(--med)}
.pill.sev-low{background:color-mix(in srgb,var(--low) 20%,transparent);color:var(--low)}
.badge{display:inline-block;font-size:.7rem;font-weight:600;padding:.1rem .5rem;border-radius:6px;background:var(--bg-inset);color:var(--fg-soft);border:1px solid var(--border-soft)}

/* fact cards */
.fact{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;margin:.55rem 0;box-shadow:var(--shadow);scroll-margin-top:4.4rem}
.fact .ft{margin:0 0 .35rem}
.fact .fm{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}

/* component header */
.comphead{display:flex;flex-wrap:wrap;gap:.6rem;align-items:baseline;margin:.2rem 0 .3rem}
.filelist{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0 1rem}
.filelist .cite{cursor:pointer}
.edge{display:flex;gap:.5rem;align-items:baseline;padding:.3rem 0;border-bottom:1px solid var(--border-soft);font-size:.9rem}

/* ADR timeline */
.timeline{position:relative;margin:1rem 0 0;padding-left:1.6rem}
.timeline::before{content:"";position:absolute;left:.42rem;top:.4rem;bottom:.4rem;width:2px;background:var(--border)}
.adr{position:relative;margin:0 0 1rem}
.adr::before{content:"";position:absolute;left:-1.32rem;top:.45rem;width:.7rem;height:.7rem;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.adr summary{cursor:pointer;list-style:none;display:flex;flex-wrap:wrap;gap:.5rem;align-items:baseline;padding:.5rem .7rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow)}
.adr summary::-webkit-details-marker{display:none}
.adr summary:hover{border-color:var(--accent)}
.adr .at{font-weight:650}
.adr .aid{font-family:var(--mono);font-size:.78rem;color:var(--accent-fg)}
.adr[open] summary{border-radius:9px 9px 0 0;border-bottom:none}
.adr .body{border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:.3rem 1rem .8rem}
.kl{display:flex;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border-soft)}
.kl .kid{font-family:var(--mono);font-size:.74rem;color:var(--accent-fg);white-space:nowrap}
.callout{background:var(--accent-soft);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:.7rem 1rem;margin:1rem 0;color:var(--fg-soft);font-size:.9rem;max-width:var(--maxprose)}

/* issues */
.issbanner{display:flex;gap:.8rem;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.5rem 0 1.3rem;box-shadow:var(--shadow)}
.issbanner .big{font-size:1.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.supp{margin:.5rem 0}
.supp summary{cursor:pointer;display:flex;gap:.5rem;align-items:center;padding:.5rem .7rem;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;font-size:.9rem}
.supp summary:hover{border-color:var(--accent)}
.supp .body{padding:.4rem 1rem .7rem;color:var(--fg-soft);font-size:.88rem}
.fixtag{font-family:var(--mono);font-size:.72rem;color:var(--fg-faint)}

/* files index */
.fileitem{border-bottom:1px solid var(--border-soft);padding:.5rem 0}
.fileitem .fp{font-family:var(--mono);font-size:.84rem;font-weight:600}
.fileitem .fr{font-size:.78rem;color:var(--fg-soft);margin-top:.15rem}

.gen-banner{font-size:.72rem;color:var(--fg-faint);background:var(--bg-inset);border:1px dashed var(--border);
  border-radius:7px;padding:.45rem .7rem;margin:1.6rem 0 0;max-width:var(--maxprose)}
footer{padding:1.4rem clamp(1rem,3vw,2.6rem);color:var(--fg-faint);font-size:.76rem;border-top:1px solid var(--border-soft);margin-top:2rem}

dialog#shortcuts{border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;background:var(--bg-card);color:var(--fg);box-shadow:var(--shadow);max-width:24rem}
dialog#shortcuts::backdrop{background:rgba(10,15,25,.45)}
dialog#shortcuts h3{margin:.1rem 0 .8rem}
dialog#shortcuts dl{display:grid;grid-template-columns:auto 1fr;gap:.4rem .9rem;margin:0;font-size:.86rem}
dialog#shortcuts dt{text-align:right}

@media (max-width:1000px){.shell{grid-template-columns:var(--rail-l) minmax(0,1fr)}aside.toc{display:none}}
@media (max-width:720px){.shell{grid-template-columns:1fr}nav.rail{display:none}.searchwrap{width:auto;flex:1}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>

fault_handlers_setup && @router_included`), so repeated `Kemal.run`/`mount` calls do not double-insert the default chain. — `src/kemal/config.cr:141` [BR-core:004]","cites":[{"file":"src/kemal/config.cr","line":"141","ref":"src/kemal/config.cr:141"}],"ids":["BR-core:004"],"certainty":"","anchor":"br-core-004"}],"lean_md":"# kemal — Agent Context\n\nKemal is a lean, Sinatra-style HTTP web framework for the Crystal language: a global-scope DSL (`get \"/\" { ... }`, `ws`, `sse`, `before_all`, `use`, `mount`) layered over a fixed `HTTP::Handler` middleware chain that a single process-wide `Config` singleton assembles and owns.\n\n## Architecture\nA composable `HTTP::Handler` middleware pipeline driven by a Sinatra-style global DSL over a process-global `Config` singleton. The whole `src/kemal/` tree is loaded by three glob `require`s in `src/kemal.cr`; files reference siblings by fully-qualified constants, not per-file imports. Components map to `.ai/docs/components/`.\n\n## Components (7)\n- **core** — entry point + global run/stop lifecycle + the `Config` singleton that assembles the ordered handler chain + the top-level DSL + CLI/SSL. → `.ai/docs/components/core.md`\n- **handlers** — the `HTTP::Handler` middleware links (init, exception, head, override-method, path, static-file, filter) + the base handler with only/exclude matching. → `.ai/docs/components/handlers.md`\n- **router** — route storage/matching/dispatch: the terminal `RouteHandler` + LRU route cache, the modular `Router` DSL, and param parsing with body-size guards. → `.ai/docs/components/router.md`\n- **websocket** — real-time transports: `WebSocketHandler` (Origin allow-list), the WS route wrapper, and Server-Sent Events. → `.ai/docs/components/websocket.md`\n- **helpers** — global view/response helpers, ECR templating macros, the exception hierarchy, and path/zip utilities. → `.ai/docs/components/helpers.md`\n- **logging** — pluggable request-logging abstraction (deprecated in favor of stdlib `Log`); the default `RequestLogHandler` + legacy/no-op loggers. → `.ai/docs/components/logging.md`\n- **ext** — stdlib monkey-patches (NOT under `Kemal::`): reopens `HTTP::Server::Context` (params/redirect/route lookup + typed `@store`) and `HTTP::Server::Response`. → `.ai/docs/components/ext.md`\n\n## Critical to know (non-obvious, load-bearing)\n*Ranked: contradicts-naive-reading first, then key invariants / boundary rules / the boot sequence, then Core behavioral facts.*\n\n- Exception handlers are matched by ORDER OF DECLARATION, not nearest-inheritance — the first *registered* compatible handler wins (`ex.class \u003c= expected_exception`). Documented in-code as intentional; naive readers expect most-specific-wins. — `src/kemal/exception_handler.cr:24`  [BR-handlers:003]\n- The default middleware chain is assembled in a FIXED, position-counted order (NOT registration order); the two terminal handlers `WebSocketHandler::INSTANCE` then `RouteHandler::INSTANCE` are ALWAYS appended last, and custom (`use`) handlers always land between the built-ins and those terminal handlers. — `src/kemal/config.cr:140`  [BR-core:001]\n- There is NO per-application isolation: `Config::INSTANCE` plus the class-constant arrays HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS are process-global mutable state shared by the global DSL, every Router, and every handler; `Config.clear` is the ONLY reset seam (tests/sub-apps share one registry). — `src/kemal/config.cr:11`  [BR-core:002]\n- Filter order is invariant `before_all → before_x → X → after_x → after_all`, and global filters live in `@global_filters` and NEVER enter the radix `@tree`, so a path lookup cannot match them twice — duplicate `before_all`/`after_all` execution is structurally impossible (the #757 fix this commit carries). — `src/kemal/filter_handler.cr:40`  [BR-handlers:002]\n- WebSocket upgrades are rejected 403 unless the request Origin (normalized to `scheme://host[:port]`, default-port-stripped, lowercased; literal `null` supported) matches a non-empty `websocket_allowed_origins`; an EMPTY allow-list disables the check (allow-all). This is the cross-site-WebSocket-hijacking boundary. — `src/kemal/websocket_handler.cr:45`  [BR-websocket:001]\n- Request body size is capped TWO independent ways so a missing/lying `Content-Length` can't bypass the limit: `validate_content_length!` rejects an oversized declared length, and `LimitedBodyIO`/`read_body_with_limit` enforce `max_request_body_size` while streaming, raising `PayloadTooLarge` → 413. — `src/kemal/param_parser.cr:227`  [BR-router:002]\n- The `HTTP::Handler` chain contract: a handler does work then calls `call_next(context)` to advance; a handler that returns WITHOUT `call_next` terminates the chain for that request (e.g. WebSocketHandler on a 403 reject, PathHandler on a prefix miss). `RouteHandler::INSTANCE` is the terminal link and raises `RouteNotFound` when no route matches. — `src/kemal/handler.cr:35`  [BR-handlers:001]\n- `RouteHandler#process_request` always cleans up per-request multipart temp files in an `ensure` block (`context.params.cleanup_temporary_files`), so a raising route handler never leaks `FileUpload` tempfiles; `FileUpload`'s constructor also cleans up + re-raises on a copy failure. — `src/kemal/route_handler.cr:173`  [BR-router:001]\n- System boot is one ordered call-chain in `Kemal.run`: `CLI.new(args)` parses ARGV into Config (aborts on missing SSL key/cert) → `Kemal.config` singleton → `config.setup` assembles the chain → (non-test) `setup_404` + `setup_trap_signal` → `server = HTTP::Server.new(config.handlers)` → `running=true` → `yield config` → early-return if the block called `Kemal.stop` → `bind_tls`/`bind_tcp` → `display_startup_message` → `server.listen` (blocks; skipped when `env==test`). — `src/kemal.cr:33`  [WF-core:001]\n- `config.setup` is idempotent-guarded (`unless @default_handlers_setup && @router_included`), so repeated `Kemal.run`/`mount` calls do not double-insert the default chain. — `src/kemal/config.cr:141`  [BR-core:004]\n\n## Where to look\n- Component detail → `.ai/docs/components/{name}.md`\n- Why decisions were made → `.ai/docs/decisions.md`\n- Known issues (drift, contradictions, coupling, unenforced rules) → `.ai/docs/issues.md`  *(0 verified fires; 9 named suppressions)*\n- Run manifest + hashes → `.ai/docs/manifest.json`\n- Navigational dashboard → `.ai/dashboard.html`  ·  Machine-readable findings → `.ai/deepinit.sarif`","components":[{"name":"core","role":"Framework entry point + global run/stop lifecycle + the user-facing DSL baked into top-level scope. Owns the `Config` singleton that holds every option and assembles the ordered middleware chain.","paths":["src/kemal.cr","src/kemal/dsl.cr","src/kemal/config.cr","src/kemal/cli.cr","src/kemal/ssl.cr"],"facts":[{"text":"WF-core:001 — system boot is one ordered call-chain (background process). `Kemal.run`: (1) `Kemal::CLI.new(args)` parses ARGV into Config + configures SSL [`kemal.cr:34`, `cli.cr:6-15`]; (2) `config = Kemal.config` (the singleton); (3) `config.setup` assembles the ordered HANDLERS chain [`config.cr:140`]; (4) optional port override; (5) non-test only: `setup_404` registers a default 404 handler unless present + `setup_trap_signal` installs `Process.on_terminate → Kemal.stop → exit` [`kemal.cr:41-43,95-109`]; (6) `server = config.server · · = HTTP::Server.new(config.handlers)`; (7) `config.running = true` then `yield config` to the user block; (8) early return if the block called `Kemal.stop`; (9) `bind_tls`/`bind_tcp`; (10) `display_startup_message`; (11) `server.listen` (blocks) unless `env == test`. — `src/kemal.cr:33`","ids":["WF-core:001"],"cites":[{"file":"kemal.cr","line":"34","ref":"kemal.cr:34"},{"file":"cli.cr","line":"6-15","ref":"cli.cr:6-15"},{"file":"config.cr","line":"140","ref":"config.cr:140"},{"file":"kemal.cr","line":"41-43","ref":"kemal.cr:41-43"},{"file":"src/kemal.cr","line":"33","ref":"src/kemal.cr:33"}],"anchor":"wf-core-001"},{"text":"BR-core:002 — no per-application isolation. `Config::INSTANCE` (`config.cr:11`) plus the class-level mutable constants HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS (`config.cr:12-16`) are process-global mutable state that the global-scope DSL, every Router, and every handler register into. `Kemal.config` returns that one instance (`config.cr:209`). Intentional Sinatra-style design, but tests/sub-apps share one registry. — `src/kemal/config.cr:11`","ids":["BR-core:002"],"cites":[{"file":"config.cr","line":"11","ref":"config.cr:11"},{"file":"config.cr","line":"12-16","ref":"config.cr:12-16"},{"file":"config.cr","line":"209","ref":"config.cr:209"},{"file":"src/kemal/config.cr","line":"11","ref":"src/kemal/config.cr:11"}],"anchor":"br-core-002"},{"text":"BR-core:001 — fixed chain assembly order. `config.setup` (`config.cr:140-154`) builds the chain in fixed, position-counted order via `@handler_position`: InitHandler → [RequestLogHandler if `@logging`] → HeadRequestHandler → [ExceptionHandler if `@always_rescue`] → [StaticFileHandler if `serve_static` is a Hash] → custom (`use`) handlers → filter handlers → `WebSocketHandler::INSTANCE` → `RouteHandler::INSTANCE`. The two terminal handlers are always appended LAST (`config.cr:151-152`); custom handlers always sit between the built-ins and the terminal Route/WS handlers. — `src/kemal/config.cr:140`","ids":["BR-core:001"],"cites":[{"file":"config.cr","line":"140-154","ref":"config.cr:140-154"},{"file":"config.cr","line":"151-152","ref":"config.cr:151-152"},{"file":"src/kemal/config.cr","line":"140","ref":"src/kemal/config.cr:140"}],"anchor":"br-core-001"},{"text":"BR-core:004 — idempotent setup. Guarded by `unless @default_handlers_setup && @router_included`, so repeated `Kemal.run`/`mount` does not double-insert the default chain; `@handler_position` monotonically advances within a single setup to preserve insertion order. — `src/kemal/config.cr:141`","ids":["BR-core:004"],"cites":[{"file":"src/kemal/config.cr","line":"141","ref":"src/kemal/config.cr:141"}],"anchor":"br-core-004"}],"edges":["core → handlers/router/websocket: `config.setup` appends `WebSocketHandler::INSTANCE` and `RouteHandler::INSTANCE` (constant references resolved after the umbrella glob load).","DSL `get/ws/sse` → router/websocket: delegate to the `RouteHandler`/`WebSocketHandler` INSTANCE singletons.","DSL `use()` → handlers: wraps in `PathHandler` for the path-prefix form."],"all_cites":[{"file":"kemal.cr","line":"13","ref":"kemal.cr:13"},{"file":"src/kemal.cr","line":"33","ref":"src/kemal.cr:33"},{"file":"kemal.cr","line":"34","ref":"kemal.cr:34"},{"file":"cli.cr","line":"6-15","ref":"cli.cr:6-15"},{"file":"config.cr","line":"140","ref":"config.cr:140"},{"file":"kemal.cr","line":"41-43","ref":"kemal.cr:41-43"},{"file":"config.cr","line":"11","ref":"config.cr:11"},{"file":"config.cr","line":"12-16","ref":"config.cr:12-16"},{"file":"config.cr","line":"209","ref":"config.cr:209"},{"file":"src/kemal/config.cr","line":"11","ref":"src/kemal/config.cr:11"},{"file":"config.cr","line":"140-154","ref":"config.cr:140-154"},{"file":"config.cr","line":"151-152","ref":"config.cr:151-152"},{"file":"src/kemal/config.cr","line":"140","ref":"src/kemal/config.cr:140"},{"file":"src/kemal/config.cr","line":"141","ref":"src/kemal/config.cr:141"},{"file":"config.cr","line":"80-94","ref":"config.cr:80-94"},{"file":"config.cr","line":"100-103","ref":"config.cr:100-103"},{"file":"src/kemal/config.cr","line":"80","ref":"src/kemal/config.cr:80"},{"file":"config.cr","line":"2","ref":"config.cr:2"},{"file":"src/kemal/config.cr","line":"2","ref":"src/kemal/config.cr:2"},{"file":"config.cr","line":"164","ref":"config.cr:164"},{"file":"src/kemal/config.cr","line":"164","ref":"src/kemal/config.cr:164"},{"file":"dsl.cr","line":"12","ref":"dsl.cr:12"},{"file":"dsl.cr","line":"123-135","ref":"dsl.cr:123-135"},{"file":"src/kemal/dsl.cr","line":"28","ref":"src/kemal/dsl.cr:28"},{"file":"dsl.cr","line":"143-181","ref":"dsl.cr:143-181"},{"file":"src/kemal/dsl.cr","line":"143","ref":"src/kemal/dsl.cr:143"},{"file":"dsl.cr","line":"63-68","ref":"dsl.cr:63-68"},{"file":"src/kemal/dsl.cr","line":"63","ref":"src/kemal/dsl.cr:63"},{"file":"cli.cr","line":"38","ref":"cli.cr:38"},{"file":"cli.cr","line":"45-46","ref":"cli.cr:45-46"},{"file":"src/kemal/cli.cr","line":"42","ref":"src/kemal/cli.cr:42"},{"file":"src/kemal/ssl.cr","line":"1","ref":"src/kemal/ssl.cr:1"}],"all_ids":["WF-core:001","BR-core:002","BR-core:001","BR-core:004","ADR-0001","ADR-0002"],"body_md":"# core\n\n**Role.** Framework entry point + global run/stop lifecycle + the user-facing DSL baked into top-level scope. Owns the `Config` singleton that holds every option and assembles the ordered middleware chain.\n\n**Paths.** `src/kemal.cr` · `src/kemal/dsl.cr` · `src/kemal/config.cr` · `src/kemal/cli.cr` · `src/kemal/ssl.cr`\n\n## Entry point & boot sequence\n- `Kemal.run` is overloaded 4 ways (`kemal.cr:13/18/23/33`); the real body is at `src/kemal.cr:33` — `def self.run(port, args = ARGV, trap_signal = true, &)`.\n- **WF-core:001 — system boot is one ordered call-chain** (background process). `Kemal.run`: (1) `Kemal::CLI.new(args)` parses ARGV into Config + configures SSL [`kemal.cr:34`, `cli.cr:6-15`]; (2) `config = Kemal.config` (the singleton); (3) `config.setup` assembles the ordered HANDLERS chain [`config.cr:140`]; (4) optional port override; (5) non-test only: `setup_404` registers a default 404 handler unless present + `setup_trap_signal` installs `Process.on_terminate → Kemal.stop → exit` [`kemal.cr:41-43,95-109`]; (6) `server = config.server ||= HTTP::Server.new(config.handlers)`; (7) `config.running = true` then `yield config` to the user block; (8) early return if the block called `Kemal.stop`; (9) `bind_tls`/`bind_tcp`; (10) `display_startup_message`; (11) `server.listen` (blocks) unless `env == test`. — `src/kemal.cr:33`\n\n## Config singleton (process-global state)\n- **BR-core:002 — no per-application isolation.** `Config::INSTANCE` (`config.cr:11`) plus the class-level mutable constants HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS (`config.cr:12-16`) are process-global mutable state that the global-scope DSL, every Router, and every handler register into. `Kemal.config` returns that one instance (`config.cr:209`). Intentional Sinatra-style design, but tests/sub-apps share one registry. — `src/kemal/config.cr:11`\n- **BR-core:001 — fixed chain assembly order.** `config.setup` (`config.cr:140-154`) builds the chain in fixed, position-counted order via `@handler_position`: InitHandler → [RequestLogHandler if `@logging`] → HeadRequestHandler → [ExceptionHandler if `@always_rescue`] → [StaticFileHandler if `serve_static` is a Hash] → custom (`use`) handlers → filter handlers → `WebSocketHandler::INSTANCE` → `RouteHandler::INSTANCE`. The two terminal handlers are always appended LAST (`config.cr:151-152`); custom handlers always sit between the built-ins and the terminal Route/WS handlers. — `src/kemal/config.cr:140`\n- **BR-core:004 — idempotent setup.** Guarded by `unless @default_handlers_setup && @router_included`, so repeated `Kemal.run`/`mount` does not double-insert the default chain; `@handler_position` monotonically advances within a single setup to preserve insertion order. — `src/kemal/config.cr:141`\n- **`Config.clear`** (`config.cr:80-94`) resets all flags AND clears the 5 shared handler collections — the test-reset / re-init seam; `handlers=` (`config.cr:100-103`) calls `clear` then replaces. — `src/kemal/config.cr:80`\n- **VERSION** (`config.cr:2`) is resolved at COMPILE time by shelling out `shards version` — a build-time macro, not a runtime read. — `src/kemal/config.cr:2`\n- Default legacy logger precedence: `setup_log_handler` uses `@logger || RequestLogHandler.new` (`config.cr:164`), so a deprecated `BaseLogHandler` subclass still takes precedence when set. — `src/kemal/config.cr:164`\n\n## The DSL (global top-level scope)\n- `dsl.cr` is baked into GLOBAL top-level scope (not under `Kemal::`). `get/post/put/patch/delete/options` are macro-generated from HTTP_METHODS (`dsl.cr:12,28-33`); each raises `InvalidPathStartException` unless the path starts with `/` and delegates to `RouteHandler::INSTANCE.add_route`. `before_*/after_*` are macro-generated over FILTER_METHODS (incl. `all`) × [before, after] (`dsl.cr:123-135`). — `src/kemal/dsl.cr:28`\n- `use()` is overloaded (`dsl.cr:143-181`): plain handler → `config.add_handler`; with position; with a path prefix → wraps in `Kemal::PathHandler.new(path, handler)`; with a path + Enumerable of handlers. `mount(router)` calls `register_routes`; `mount(path, router)` prefixes. — `src/kemal/dsl.cr:143`\n- `sse` routes are GET routes whose handler wraps `EventStream.serve` (`dsl.cr:63-68`) — SSE is not a separate transport at the routing layer; it reuses `RouteHandler`. — `src/kemal/dsl.cr:63`\n\n## CLI & SSL\n- `CLI` (`cli.cr`) parses ARGV via `OptionParser` into Config (`-b/--bind`, `-p/--port`, `-s/--ssl`, `--ssl-key-file`, `--ssl-cert-file`, `-h`); `--help` calls `exit 0`; `@config.extra_options.try &.call(opts)` lets apps inject options (`cli.cr:38`). `configure_ssl` ABORTS the process if `--ssl` is set but key/cert is missing (`cli.cr:45-46`). — `src/kemal/cli.cr:42`\n- `SSL` (`ssl.cr`) is a thin wrapper over `OpenSSL::SSL::Context::Server`; `key_file=`/`cert_file=` set `private_key`/`certificate_chain`. — `src/kemal/ssl.cr:1`\n\n## Cross-component edges\n- core → handlers/router/websocket: `config.setup` appends `WebSocketHandler::INSTANCE` and `RouteHandler::INSTANCE` (constant references resolved after the umbrella glob load).\n- DSL `get/ws/sse` → router/websocket: delegate to the `RouteHandler`/`WebSocketHandler` INSTANCE singletons.\n- DSL `use()` → handlers: wraps in `PathHandler` for the path-prefix form.\n\n## Design rationale\nThe Sinatra-style global DSL + process singleton is the deliberate ergonomic choice — `get \"/\" { }` at top level requires global mutable registries. See `.ai/docs/decisions.md` (ADR-0001, ADR-0002).","provenance":{"stage":"EMIT (deep component doc)","component":"core","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(core) · src/kemal.cr, src/kemal/{dsl,config,cli,ssl}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal.cr","src/kemal/dsl.cr","src/kemal/config.cr","src/kemal/cli.cr","src/kemal/ssl.cr"],"content_hash":"sha256:fafcf70b08e8c724944ec6909fa085a07fe716497d672a27e694cb303f6444e9","anchor":"c-core"},{"name":"ext","role":"Standard-library monkey-patches (Crystal open-class extensions, **NOT under the `Kemal::` module**). Loaded by the separate `require \"./kemal/ext/*\"` glob (`kemal.cr:6`).","paths":["src/kemal/ext/context.cr","src/kemal/ext/response.cr"],"facts":[{"text":"`redirect` (`context.cr:29-34`) sets `Location` + status (default 302) and CLOSES the response by default (`close: true`) — the source of the BR-handlers:004 closed-response convention. — `src/kemal/ext/context.cr:29`","ids":["BR-handlers:004"],"cites":[{"file":"context.cr","line":"29-34","ref":"context.cr:29-34"},{"file":"src/kemal/ext/context.cr","line":"29","ref":"src/kemal/ext/context.cr:29"}],"anchor":"br-handlers-004"}],"edges":["ext ← router/handlers/websocket: every handler reads `context.params`/`context.route_found?`/`context.ws_route_found?` — this component is the lifecycle substrate they all share.","ext ↔ helpers: `STORE_MAPPINGS` is defined here and extended by `helpers/macros.cr add_context_storage_type` (compile-time union contract).","ext ← handlers: `OverrideMethodHandler` depends on `invalidate_route_cache` after rewriting `request.method`."],"all_cites":[{"file":"kemal.cr","line":"6","ref":"kemal.cr:6"},{"file":"context.cr","line":"11-16","ref":"context.cr:11-16"},{"file":"src/kemal/ext/context.cr","line":"11","ref":"src/kemal/ext/context.cr:11"},{"file":"context.cr","line":"9","ref":"context.cr:9"},{"file":"helpers/macros.cr","line":"126","ref":"helpers/macros.cr:126"},{"file":"src/kemal/ext/context.cr","line":"9","ref":"src/kemal/ext/context.cr:9"},{"file":"context.cr","line":"52-60","ref":"context.cr:52-60"},{"file":"src/kemal/ext/context.cr","line":"52","ref":"src/kemal/ext/context.cr:52"},{"file":"context.cr","line":"29-34","ref":"context.cr:29-34"},{"file":"src/kemal/ext/context.cr","line":"29","ref":"src/kemal/ext/context.cr:29"},{"file":"response.cr","line":"3","ref":"response.cr:3"},{"file":"src/kemal/ext/response.cr","line":"3","ref":"src/kemal/ext/response.cr:3"}],"all_ids":["BR-handlers:004"],"body_md":"# ext\n\n**Role.** Standard-library monkey-patches (Crystal open-class extensions, **NOT under the `Kemal::` module**). Loaded by the separate `require \"./kemal/ext/*\"` glob (`kemal.cr:6`).\n\n**Paths.** `src/kemal/ext/context.cr` · `src/kemal/ext/response.cr`\n\n## Context extension (the request lifecycle seam)\n- `ext/context.cr` REOPENS `HTTP::Server::Context` (stdlib, NOT under `Kemal::`) to bolt Kemal's request lifecycle onto the stdlib context: `params` (lazily builds `ParamParser` from the cached ws-or-http route lookup), `route`/`websocket`/`route_lookup`/`ws_route_lookup` (cached via `@cached_route_lookup`/`@cached_ws_route_lookup`, established in a `macro finished` block, `context.cr:11-16`), `route_found?`/`ws_route_found?`, the typed `@store` session map with `get`/`set`/`get?`, `status()` (chainable), and `json`/`html`/`xml`/`text` response writers. — `src/kemal/ext/context.cr:11`\n- The `@store` session map type is the compile-time Union of `STORE_MAPPINGS = [Nil, String, Int32, Int64, Float64, Bool]` (`context.cr:9`); `add_context_storage_type` (`helpers/macros.cr:126`) extends this list — store typing is a cross-file compile-time contract between ext and helpers. — `src/kemal/ext/context.cr:9`\n- `invalidate_route_cache` (`context.cr:52-60`) clears the cached route lookup AND, if params were already built, re-resolves the route and pushes the new url params into the existing `ParamParser` via `update_url_params` — the seam `OverrideMethodHandler` relies on after rewriting `request.method`. — `src/kemal/ext/context.cr:52`\n- `redirect` (`context.cr:29-34`) sets `Location` + status (default 302) and CLOSES the response by default (`close: true`) — the source of the BR-handlers:004 closed-response convention. — `src/kemal/ext/context.cr:29`\n\n## Response extension (legacy, compiled out on modern Crystal)\n- `ext/response.cr` REOPENS `HTTP::Server::Response::Output` but is GUARDED to no-op on Crystal ≥1.3.0 via `{{ skip_file if compare_versions(...) }}` (`response.cr:3`) — a legacy Content-Length fix (issue #627) compiled out on modern Crystal; effectively dead on any current toolchain. This is documented dead code, not drift (see `.ai/docs/issues.md` IF-4/IF-10 suppressions). — `src/kemal/ext/response.cr:3`\n\n## Cross-component edges\n- ext ← router/handlers/websocket: every handler reads `context.params`/`context.route_found?`/`context.ws_route_found?` — this component is the lifecycle substrate they all share.\n- ext ↔ helpers: `STORE_MAPPINGS` is defined here and extended by `helpers/macros.cr add_context_storage_type` (compile-time union contract).\n- ext ← handlers: `OverrideMethodHandler` depends on `invalidate_route_cache` after rewriting `request.method`.","provenance":{"stage":"EMIT (deep component doc)","component":"ext","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(ext) · src/kemal/ext/{context,response}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/ext/context.cr","src/kemal/ext/response.cr"],"content_hash":"sha256:4807c0274f3c8e739ad0dbc7bda6c585f6199b66b5c21279164f325df4fa8644","anchor":"c-ext"},{"name":"handlers","role":"The `HTTP::Handler` middleware chain — the pipeline links assembled by `config.cr:140-154`. Each concrete middleware `include HTTP::Handler` and implements `call`/`call_next`.","paths":["src/kemal/handler.cr","init_handler.cr","exception_handler.cr","head_request_handler.cr","override_method_handler.cr","path_handler.cr","static_file_handler.cr","filter_handler.cr","file_upload.cr"],"facts":[{"text":"BR-handlers:001 — every middleware includes `HTTP::Handler`. The contract is: do work, then call `call_next(context)` to advance; a handler that returns WITHOUT `call_next` terminates the chain for that request (WebSocketHandler on a 403 reject; PathHandler on a prefix miss; StaticFileHandler serves-or-`call_next`). `RouteHandler::INSTANCE` is the terminal link and raises `RouteNotFound` when no route matches. — `src/kemal/handler.cr:35`","ids":["BR-handlers:001"],"cites":[{"file":"src/kemal/handler.cr","line":"35","ref":"src/kemal/handler.cr:35"}],"anchor":"br-handlers-001"},{"text":"BR-handlers:003 — match by declaration order (NOT inheritance). The generic fallback matches a registered exception handler by ORDER OF DECLARATION using `ex.class \u003c= expected_exception`, deliberately NOT by nearest-inheritance: the first registered compatible handler wins. Documented in-code as intentional (`exception_handler.cr:22-23`). — `src/kemal/exception_handler.cr:24`","ids":["BR-handlers:003"],"cites":[{"file":"exception_handler.cr","line":"22-23","ref":"exception_handler.cr:22-23"},{"file":"src/kemal/exception_handler.cr","line":"24","ref":"src/kemal/exception_handler.cr:24"}],"anchor":"br-handlers-003"},{"text":"BR-handlers:004 — never write to a closed response. Every render helper short-circuits with `return if context.response.closed?` (`exception_handler.cr:47,56,66`), and `redirect()` closes the response by default. Convention: once closed, downstream handlers must not write. — `src/kemal/exception_handler.cr:47`","ids":["BR-handlers:004"],"cites":[{"file":"exception_handler.cr","line":"47","ref":"exception_handler.cr:47"},{"file":"src/kemal/exception_handler.cr","line":"47","ref":"src/kemal/exception_handler.cr:47"}],"anchor":"br-handlers-004"},{"text":"FilterHandler dispatches before/after filters (see `router` doc + BR-handlers:002); global filters kept in `@global_filters`, never in the radix `@tree` (#757 fix); `@exact_filters` is an O(1) hash cache over the tree (`filter_handler.cr:11`). `FilterHandler.call` (`filter_handler.cr:41-58`) raises `CustomException` when, after the before filters, an error handler is registered for the current status_code (filters can short-circuit into the error path); on no route found it still runs `before_all` (if a 404 handler exists) then `call_next`. — `src/kemal/filter_handler.cr:11`","ids":["BR-handlers:002"],"cites":[{"file":"filter_handler.cr","line":"11","ref":"filter_handler.cr:11"},{"file":"filter_handler.cr","line":"41-58","ref":"filter_handler.cr:41-58"},{"file":"src/kemal/filter_handler.cr","line":"11","ref":"src/kemal/filter_handler.cr:11"}],"anchor":"br-handlers-002"}],"edges":["handlers ← core: assembled in fixed order by `config.setup` (BR-core:001).","ExceptionHandler ↔ router/helpers: rescues `RouteNotFound`/`CustomException`/`PayloadTooLarge` (defined in `helpers/exceptions.cr`); renders via `templates.cr render_500`.","FilterHandler ← router: `Router#register_filters` re-adds `FilterHandler::INSTANCE` defensively after `Config.clear`."],"all_cites":[{"file":"config.cr","line":"140-154","ref":"config.cr:140-154"},{"file":"src/kemal/handler.cr","line":"35","ref":"src/kemal/handler.cr:35"},{"file":"handler.cr","line":"11","ref":"handler.cr:11"},{"file":"handler.cr","line":"14-17","ref":"handler.cr:14-17"},{"file":"handler.cr","line":"91-93","ref":"handler.cr:91-93"},{"file":"handler.cr","line":"44","ref":"handler.cr:44"},{"file":"src/kemal/handler.cr","line":"11","ref":"src/kemal/handler.cr:11"},{"file":"src/kemal/init_handler.cr","line":"11","ref":"src/kemal/init_handler.cr:11"},{"file":"exception_handler.cr","line":"30","ref":"exception_handler.cr:30"},{"file":"src/kemal/exception_handler.cr","line":"7","ref":"src/kemal/exception_handler.cr:7"},{"file":"exception_handler.cr","line":"22-23","ref":"exception_handler.cr:22-23"},{"file":"src/kemal/exception_handler.cr","line":"24","ref":"src/kemal/exception_handler.cr:24"},{"file":"exception_handler.cr","line":"47","ref":"exception_handler.cr:47"},{"file":"src/kemal/exception_handler.cr","line":"47","ref":"src/kemal/exception_handler.cr:47"},{"file":"src/kemal/head_request_handler.cr","line":"36","ref":"src/kemal/head_request_handler.cr:36"},{"file":"override_method_handler.cr","line":"5-8","ref":"override_method_handler.cr:5-8"},{"file":"src/kemal/override_method_handler.cr","line":"19","ref":"src/kemal/override_method_handler.cr:19"},{"file":"path_handler.cr","line":"36-44","ref":"path_handler.cr:36-44"},{"file":"path_handler.cr","line":"25","ref":"path_handler.cr:25"},{"file":"src/kemal/path_handler.cr","line":"36","ref":"src/kemal/path_handler.cr:36"},{"file":"static_file_handler.cr","line":"29","ref":"static_file_handler.cr:29"},{"file":"static_file_handler.cr","line":"55-58","ref":"static_file_handler.cr:55-58"},{"file":"src/kemal/static_file_handler.cr","line":"3","ref":"src/kemal/static_file_handler.cr:3"},{"file":"filter_handler.cr","line":"11","ref":"filter_handler.cr:11"},{"file":"filter_handler.cr","line":"41-58","ref":"filter_handler.cr:41-58"},{"file":"src/kemal/filter_handler.cr","line":"11","ref":"src/kemal/filter_handler.cr:11"},{"file":"filter_handler.cr","line":"40","ref":"filter_handler.cr:40"},{"file":"src/kemal/filter_handler.cr","line":"40","ref":"src/kemal/filter_handler.cr:40"},{"file":"file_upload.cr","line":"13-19","ref":"file_upload.cr:13-19"},{"file":"src/kemal/file_upload.cr","line":"13","ref":"src/kemal/file_upload.cr:13"}],"all_ids":["BR-handlers:001","BR-handlers:003","BR-handlers:004","BR-handlers:002","BR-core:001"],"body_md":"# handlers\n\n**Role.** The `HTTP::Handler` middleware chain — the pipeline links assembled by `config.cr:140-154`. Each concrete middleware `include HTTP::Handler` and implements `call`/`call_next`.\n\n**Paths.** `src/kemal/handler.cr` · `init_handler.cr` · `exception_handler.cr` · `head_request_handler.cr` · `override_method_handler.cr` · `path_handler.cr` · `static_file_handler.cr` · `filter_handler.cr` · `file_upload.cr`\n\n## The chain contract\n- **BR-handlers:001 — every middleware includes `HTTP::Handler`.** The contract is: do work, then call `call_next(context)` to advance; a handler that returns WITHOUT `call_next` terminates the chain for that request (WebSocketHandler on a 403 reject; PathHandler on a prefix miss; StaticFileHandler serves-or-`call_next`). `RouteHandler::INSTANCE` is the terminal link and raises `RouteNotFound` when no route matches. — `src/kemal/handler.cr:35`\n- `HandlerInterface` (`handler.cr:11`) adds the only/exclude path-matching macros backed by per-class `@@only_routes_tree`/`@@exclude_routes_tree` Radix trees (`handler.cr:14-17`); `Kemal::Handler` is the base class that includes it (`handler.cr:91-93`). `only_match?`/`exclude_match?` are NOT applied automatically — `handler.cr:44` notes the custom handler must call them. — `src/kemal/handler.cr:11`\n\n## Concrete middlewares\n- **InitHandler** (`init_handler.cr`) seeds every response: `X-Powered-By: Kemal` (only if `Kemal.config.powered_by_header?`), defaults Content-Type to `text/html` if unset, stamps a `Date` header; inserted FIRST in the chain. — `src/kemal/init_handler.cr:11`\n- **ExceptionHandler** (`exception_handler.cr`) is the central error funnel: `call_next` wrapped in rescue clauses ordered `RouteNotFound → 404`, `CustomException → its status_code`, `PayloadTooLarge → 413` (or custom 413 handler), then a generic `rescue ex : Exception`, logs (`Log.error`, `exception_handler.cr:30`), then a custom 500 handler or `render_500` (verbosity off in production). — `src/kemal/exception_handler.cr:7`\n  - **BR-handlers:003 — match by declaration order (NOT inheritance).** The generic fallback matches a registered exception handler by ORDER OF DECLARATION using `ex.class \u003c= expected_exception`, deliberately NOT by nearest-inheritance: the first registered compatible handler wins. Documented in-code as intentional (`exception_handler.cr:22-23`). — `src/kemal/exception_handler.cr:24`\n  - **BR-handlers:004 — never write to a closed response.** Every render helper short-circuits with `return if context.response.closed?` (`exception_handler.cr:47,56,66`), and `redirect()` closes the response by default. Convention: once closed, downstream handlers must not write. — `src/kemal/exception_handler.cr:47`\n- **HeadRequestHandler** swaps the response output for a private `NullIO` that COUNTS bytes without sending a body on HEAD requests, and on close sets Content-Length from the counted bytes (respecting RFC 7230: 304/204/1xx get no content-length). — `src/kemal/head_request_handler.cr:36`\n- **OverrideMethodHandler** is OPT-IN (not in the default chain; doc at `override_method_handler.cr:5-8`). On a POST whose body `_method ∈ {PUT,PATCH,DELETE}` it rewrites `request.method` and calls `context.invalidate_route_cache`; it CONSUMES `params.body` (documented caveat). — `src/kemal/override_method_handler.cr:19`\n- **PathHandler** wraps another handler to run only for a path prefix; `matches_prefix?` treats `/` or `''` as match-all, exact match, or prefix-followed-by-`/` — so `/api` matches `/api` and `/api/...` but NOT `/apiv2` (`path_handler.cr:36-44`). It rewires `@handler.next = self.next` before delegating (`path_handler.cr:25`). — `src/kemal/path_handler.cr:36`\n- **StaticFileHandler** subclasses `HTTP::StaticFileHandler` and FORKS on Crystal version: Crystal ≥1.17.0 overrides `directory_index` + `serve_file` (deliberately opts OUT of content-range serving, `static_file_handler.cr:29`); older Crystal carries a full hand-rolled `call()` with NUL-byte rejection (`static_file_handler.cr:55-58`), redirect normalization, dir_index/dir_listing, 304 caching. — `src/kemal/static_file_handler.cr:3`\n- **FilterHandler** dispatches before/after filters (see `router` doc + BR-handlers:002); global filters kept in `@global_filters`, never in the radix `@tree` (#757 fix); `@exact_filters` is an O(1) hash cache over the tree (`filter_handler.cr:11`). `FilterHandler.call` (`filter_handler.cr:41-58`) raises `CustomException` when, after the before filters, an error handler is registered for the current status_code (filters can short-circuit into the error path); on no route found it still runs `before_all` (if a 404 handler exists) then `call_next`. — `src/kemal/filter_handler.cr:11`\n  - **BR-handlers:002 — filter order + exactly-once.** `FilterHandler` enforces `before_all → before_x → X → after_x → after_all` (`filter_handler.cr:40`); global filters live in `@global_filters` and NEVER enter the radix `@tree`, so a path lookup cannot match them twice — duplicate `before_all`/`after_all` execution is structurally impossible (the #757 fix this commit b73de3d carries). — `src/kemal/filter_handler.cr:40`\n- **FileUpload** streams an upload to a `File.tempfile` in its constructor; on a copy error it calls `cleanup` (close + delete) then re-raises (`file_upload.cr:13-19`) — temp files are not leaked on failure. — `src/kemal/file_upload.cr:13`\n\n## Cross-component edges\n- handlers ← core: assembled in fixed order by `config.setup` (BR-core:001).\n- ExceptionHandler ↔ router/helpers: rescues `RouteNotFound`/`CustomException`/`PayloadTooLarge` (defined in `helpers/exceptions.cr`); renders via `templates.cr render_500`.\n- FilterHandler ← router: `Router#register_filters` re-adds `FilterHandler::INSTANCE` defensively after `Config.clear`.","provenance":{"stage":"EMIT (deep component doc)","component":"handlers","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(handlers) · src/kemal/{handler,init_handler,exception_handler,head_request_handler,override_method_handler,path_handler,static_file_handler,filter_handler,file_upload}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/handler.cr","src/kemal/init_handler.cr","src/kemal/exception_handler.cr","src/kemal/head_request_handler.cr","src/kemal/override_method_handler.cr","src/kemal/path_handler.cr","src/kemal/static_file_handler.cr","src/kemal/filter_handler.cr","src/kemal/file_upload.cr"],"content_hash":"sha256:d6976ab275fb54d93e93ba82c834b31c4304e1b34b60d53d742737ce5efbcbaa","anchor":"c-handlers"},{"name":"helpers","role":"View/response helper layer baked into global scope + shared utilities + the exception hierarchy + ECR templating.","paths":["src/kemal/helpers/helpers.cr","macros.cr","templates.cr","exceptions.cr","exception_page.cr","utils.cr"],"facts":[{"text":"BR-core:003 — leading-slash precondition (boundary rule). Every route/ws/sse/filter path MUST start with `/`; the DSL and Router validate via `Utils.path_starts_with_slash?` and raise `Kemal::Exceptions::InvalidPathStartException` otherwise — enforced at registration time, not request time. — `src/kemal/helpers/utils.cr:5`","ids":["BR-core:003"],"cites":[{"file":"src/kemal/helpers/utils.cr","line":"5","ref":"src/kemal/helpers/utils.cr:5"}],"anchor":"br-core-003"}],"edges":["helpers → handlers: `gzip` installs `HTTP::CompressHandler` via `use()`; the exception classes are rescued by `ExceptionHandler`.","helpers → ext: `add_context_storage_type` pushes into `STORE_MAPPINGS` (defined in `ext/context.cr`) — a compile-time contract between helpers and ext.","helpers ← router/core DSL: `path_starts_with_slash?` is the shared leading-slash gate."],"all_cites":[{"file":"helpers.cr","line":"18","ref":"helpers.cr:18"},{"file":"helpers.cr","line":"284-286","ref":"helpers.cr:284-286"},{"file":"src/kemal/helpers/helpers.cr","line":"18","ref":"src/kemal/helpers/helpers.cr:18"},{"file":"helpers.cr","line":"137-179","ref":"helpers.cr:137-179"},{"file":"helpers.cr","line":"206-248","ref":"helpers.cr:206-248"},{"file":"helpers.cr","line":"161-176","ref":"helpers.cr:161-176"},{"file":"src/kemal/helpers/helpers.cr","line":"137","ref":"src/kemal/helpers/helpers.cr:137"},{"file":"macros.cr","line":"126-128","ref":"macros.cr:126-128"},{"file":"src/kemal/helpers/macros.cr","line":"126","ref":"src/kemal/helpers/macros.cr:126"},{"file":"templates.cr","line":"24-36","ref":"templates.cr:24-36"},{"file":"src/kemal/helpers/templates.cr","line":"24","ref":"src/kemal/helpers/templates.cr:24"},{"file":"exceptions.cr","line":"16-18","ref":"exceptions.cr:16-18"},{"file":"src/kemal/helpers/exceptions.cr","line":"16","ref":"src/kemal/helpers/exceptions.cr:16"},{"file":"src/kemal/helpers/utils.cr","line":"5","ref":"src/kemal/helpers/utils.cr:5"},{"file":"src/kemal/helpers/utils.cr","line":"1","ref":"src/kemal/helpers/utils.cr:1"}],"all_ids":["BR-core:003"],"body_md":"# helpers\n\n**Role.** View/response helper layer baked into global scope + shared utilities + the exception hierarchy + ECR templating.\n\n**Paths.** `src/kemal/helpers/helpers.cr` · `macros.cr` · `templates.cr` · `exceptions.cr` · `exception_page.cr` · `utils.cr`\n\n## Global helpers\n- `helpers.cr` defines GLOBAL top-level helpers (not under `Kemal::`): `public_folder`, `logging`, `serve_static` (Bool/Hash overloads), `headers`, `send_file`, `gzip`, `static_headers` — plus DEPRECATED `add_handler`/`log`/`logger` (`helpers.cr:18,37,81`). `gzip(status)` installs `HTTP::CompressHandler` via `use()` (`helpers.cr:284-286`). — `src/kemal/helpers/helpers.cr:18`\n- `send_file` (`helpers.cr:137-179`) is the response-streaming workhorse: sets `X-Content-Type-Options nosniff` + `Accept-Ranges bytes`, honors a `Range` header via `multipart()` (`helpers.cr:206-248`, single 206 partial + `multipart/byteranges`), and gzip/deflate-compresses only when `serve_static['gzip']==true`, filesize \u003e 860, the extension is a zip-type, and the client `Accept-Encoding` allows it (`helpers.cr:161-176`). The byte-slice overload writes data directly. — `src/kemal/helpers/helpers.cr:137`\n\n## Templating & rendering macros\n- `macros.cr` provides the ECR templating surface: `content_for`/`yield_content` (a `CONTENT_FOR_BLOCKS` global hash keyed by id), `render(filename[,layout])` (`ECR.embed`/`render`), `halt` (overloaded — closes the response and `next`-es out of the route block), and `add_context_storage_type` which PUSHes a type into `HTTP::Server::Context::STORE_MAPPINGS` at compile time (`macros.cr:126-128`). — `src/kemal/helpers/macros.cr:126`\n- `templates.cr` provides `render_404` (a static HTML page) and `render_500(context, exception, verbosity)` which renders `Kemal::ExceptionPage` (dev, full trace) vs `ExceptionPage.for_production_exception` (terse) based on verbosity (`templates.cr:24-36`); `exception_page.cr` subclasses the `exception_page` shard and supplies Kemal branding. — `src/kemal/helpers/templates.cr:24`\n\n## Exception hierarchy & utils\n- `Kemal::Exceptions` (`exceptions.cr`) defines `InvalidPathStartException` / `RouteNotFound` / `CustomException` / `PayloadTooLarge` — all `\u003c Exception`; `CustomException` carries the context and a default `'Rendered error with {status}'` message (`exceptions.cr:16-18`). — `src/kemal/helpers/exceptions.cr:16`\n- **BR-core:003 — leading-slash precondition (boundary rule).** Every route/ws/sse/filter path MUST start with `/`; the DSL and Router validate via `Utils.path_starts_with_slash?` and raise `Kemal::Exceptions::InvalidPathStartException` otherwise — enforced at registration time, not request time. — `src/kemal/helpers/utils.cr:5`\n- `Utils` (`utils.cr`) holds `ZIP_TYPES` (the compressible extension allow-list) + `path_starts_with_slash?` (the leading-slash rule used by every route/ws/sse DSL) + `zip_types(path)`. — `src/kemal/helpers/utils.cr:1`\n\n## Cross-component edges\n- helpers → handlers: `gzip` installs `HTTP::CompressHandler` via `use()`; the exception classes are rescued by `ExceptionHandler`.\n- helpers → ext: `add_context_storage_type` pushes into `STORE_MAPPINGS` (defined in `ext/context.cr`) — a compile-time contract between helpers and ext.\n- helpers ← router/core DSL: `path_starts_with_slash?` is the shared leading-slash gate.","provenance":{"stage":"EMIT (deep component doc)","component":"helpers","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(helpers) · src/kemal/helpers/{helpers,macros,templates,exceptions,exception_page,utils}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/helpers/helpers.cr","src/kemal/helpers/macros.cr","src/kemal/helpers/templates.cr","src/kemal/helpers/exceptions.cr","src/kemal/helpers/exception_page.cr","src/kemal/helpers/utils.cr"],"content_hash":"sha256:40f085f464b1ec035c238539859360d912dfe7f9968373e97eecb634bb3294fe","anchor":"c-helpers"},{"name":"logging","role":"Pluggable request-logging abstraction — **deprecated in favor of stdlib `Log`**. The default `RequestLogHandler` is the only non-deprecated implementation.","paths":["src/kemal/base_log_handler.cr","request_log_handler.cr","log_handler.cr","null_log_handler.cr"],"facts":[],"edges":["logging ← core: `config.setup_log_handler` inserts `RequestLogHandler` second in the chain (right after `InitHandler`) when `@logging` is on.","logging → core: `Config#logger` returns the `NullLogHandler` no-op default."],"all_cites":[{"file":"src/kemal/base_log_handler.cr","line":"3","ref":"src/kemal/base_log_handler.cr:3"},{"file":"config.cr","line":"161-168","ref":"config.cr:161-168"},{"file":"request_log_handler.cr","line":"13-18","ref":"request_log_handler.cr:13-18"},{"file":"src/kemal/request_log_handler.cr","line":"6","ref":"src/kemal/request_log_handler.cr:6"},{"file":"log_handler.cr","line":"22-27","ref":"log_handler.cr:22-27"},{"file":"src/kemal/log_handler.cr","line":"22","ref":"src/kemal/log_handler.cr:22"},{"file":"config.cr","line":"62-64","ref":"config.cr:62-64"},{"file":"config.cr","line":"62","ref":"config.cr:62"},{"file":"config.cr","line":"164","ref":"config.cr:164"},{"file":"src/kemal/config.cr","line":"164","ref":"src/kemal/config.cr:164"},{"file":"request_log_handler.cr","line":"13","ref":"request_log_handler.cr:13"},{"file":"log_handler.cr","line":"22","ref":"log_handler.cr:22"}],"all_ids":[],"body_md":"# logging\n\n**Role.** Pluggable request-logging abstraction — **deprecated in favor of stdlib `Log`**. The default `RequestLogHandler` is the only non-deprecated implementation.\n\n**Paths.** `src/kemal/base_log_handler.cr` · `request_log_handler.cr` · `log_handler.cr` · `null_log_handler.cr`\n\n## The abstraction & the default\n- `BaseLogHandler` (`base_log_handler.cr`) is the abstract interface (`include HTTP::Handler`; abstract `call` + `write`) every logger must inherit — but the whole abstraction is deprecated in favor of stdlib `Log`. — `src/kemal/base_log_handler.cr:3`\n- `RequestLogHandler` (`request_log_handler.cr`) is the DEFAULT logger wired in by `config.setup_log_handler` (`config.cr:161-168`, only when `@logging`) — times `call_next` via `Time.measure` and emits status/method/resource/elapsed through stdlib `Log.info`; `elapsed_text` formats ms vs µs (`request_log_handler.cr:13-18`). — `src/kemal/request_log_handler.cr:6`\n\n## Legacy / no-op loggers (all @[Deprecated])\n- `LogHandler` (`log_handler.cr`) is the LEGACY `@[Deprecated]` STDOUT logger (same elapsed formatting, duplicated, `log_handler.cr:22-27`). — `src/kemal/log_handler.cr:22`\n- `NullLogHandler` (`null_log_handler.cr`) is the `@[Deprecated]` Null-Object no-op returned by `Config#logger` when no custom logger is set (`config.cr:62-64`). — `src/kemal/null_log_handler.cr` (via config.cr:62)\n- Config wires a custom legacy logger ahead of the default: `setup_log_handler` uses `@logger || RequestLogHandler.new` (`config.cr:164`), so a deprecated `BaseLogHandler` subclass still takes precedence when set. — `src/kemal/config.cr:164`\n\n## Note (not drift — documented deprecation)\nThe legacy loggers are correctly `@[Deprecated]`-annotated with the replacement named (\"Use standard library `Log`\"). The duplicated `elapsed_text` in `request_log_handler.cr:13` and `log_handler.cr:22` is same-LOGIC duplication with IDENTICAL behavior — see `.ai/docs/issues.md` (IF-6 suppression: same-logic, no divergent named value-set).\n\n## Cross-component edges\n- logging ← core: `config.setup_log_handler` inserts `RequestLogHandler` second in the chain (right after `InitHandler`) when `@logging` is on.\n- logging → core: `Config#logger` returns the `NullLogHandler` no-op default.","provenance":{"stage":"EMIT (deep component doc)","component":"logging","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(logging) · src/kemal/{base_log_handler,request_log_handler,log_handler,null_log_handler}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/base_log_handler.cr","src/kemal/request_log_handler.cr","src/kemal/log_handler.cr","src/kemal/null_log_handler.cr"],"content_hash":"sha256:958c0bae0344ee5e344950b1be6c2b51e9ddf1e5e6357d96a64f326b2c8a7290","anchor":"c-logging"},{"name":"router","role":"Route storage, matching and dispatch. The terminal `RouteHandler` middleware plus a file-local LRU cache over a Radix tree; the modular `Router` DSL; the `Route` record; and param parsing with body-size guards.","paths":["src/kemal/route_handler.cr","src/kemal/router.cr","src/kemal/route.cr","src/kemal/param_parser.cr"],"facts":[{"text":"BR-router:001 — terminal cleanup. `RouteHandler#process_request` always cleans up per-request multipart temp files in an `ensure` block, so a route handler that raises does not leak `FileUpload` tempfiles; `FileUpload`'s constructor also cleans up + re-raises on a copy failure. — `src/kemal/route_handler.cr:173`","ids":["BR-router:001"],"cites":[{"file":"src/kemal/route_handler.cr","line":"173","ref":"src/kemal/route_handler.cr:173"}],"anchor":"br-router-001"},{"text":"BR-router:002 — body-size double guard (security-adjacent). Body size is guarded TWO ways: `validate_content_length!` against `max_request_body_size`, and `read_body_with_limit` / the private `LimitedBodyIO` cap while streaming (raising `PayloadTooLarge`) so a lying/absent `Content-Length` can't bypass the limit (`param_parser.cr:50-55,227-234`). Multipart fields use a separate `max_multipart_form_field_size` limit. — `src/kemal/param_parser.cr:227`","ids":["BR-router:002"],"cites":[{"file":"param_parser.cr","line":"50-55","ref":"param_parser.cr:50-55"},{"file":"src/kemal/param_parser.cr","line":"227","ref":"src/kemal/param_parser.cr:227"}],"anchor":"br-router-002"}],"edges":["router → handlers: `ExceptionHandler` rescues the `CustomException`/`RouteNotFound`/`PayloadTooLarge` this component raises.","router → ext: `process_request` reads `context.params` / `context.route_found?` (the lifecycle methods bolted on in `ext/context.cr`).","router ← core/Router: `Router#register_routes` flushes into `RouteHandler::INSTANCE`."],"all_cites":[{"file":"route_handler.cr","line":"103","ref":"route_handler.cr:103"},{"file":"route_handler.cr","line":"166-167","ref":"route_handler.cr:166-167"},{"file":"route_handler.cr","line":"173-174","ref":"route_handler.cr:173-174"},{"file":"src/kemal/route_handler.cr","line":"103","ref":"src/kemal/route_handler.cr:103"},{"file":"src/kemal/route_handler.cr","line":"173","ref":"src/kemal/route_handler.cr:173"},{"file":"route_handler.cr","line":"177","ref":"route_handler.cr:177"},{"file":"route_handler.cr","line":"118-119","ref":"route_handler.cr:118-119"},{"file":"route_handler.cr","line":"144-152","ref":"route_handler.cr:144-152"},{"file":"src/kemal/route_handler.cr","line":"133","ref":"src/kemal/route_handler.cr:133"},{"file":"route_handler.cr","line":"7-101","ref":"route_handler.cr:7-101"},{"file":"src/kemal/route_handler.cr","line":"7","ref":"src/kemal/route_handler.cr:7"},{"file":"router.cr","line":"201-240","ref":"router.cr:201-240"},{"file":"router.cr","line":"168-172","ref":"router.cr:168-172"},{"file":"src/kemal/router.cr","line":"201","ref":"src/kemal/router.cr:201"},{"file":"router.cr","line":"236-239","ref":"router.cr:236-239"},{"file":"router.cr","line":"323-329","ref":"router.cr:323-329"},{"file":"router.cr","line":"331-335","ref":"router.cr:331-335"},{"file":"router.cr","line":"277-284","ref":"router.cr:277-284"},{"file":"src/kemal/router.cr","line":"236","ref":"src/kemal/router.cr:236"},{"file":"router.cr","line":"271-273","ref":"router.cr:271-273"},{"file":"src/kemal/router.cr","line":"271","ref":"src/kemal/router.cr:271"},{"file":"route.cr","line":"11-14","ref":"route.cr:11-14"},{"file":"router.cr","line":"307-312","ref":"router.cr:307-312"},{"file":"src/kemal/route.cr","line":"11","ref":"src/kemal/route.cr:11"},{"file":"param_parser.cr","line":"124-134","ref":"param_parser.cr:124-134"},{"file":"src/kemal/param_parser.cr","line":"124","ref":"src/kemal/param_parser.cr:124"},{"file":"param_parser.cr","line":"50-55","ref":"param_parser.cr:50-55"},{"file":"src/kemal/param_parser.cr","line":"227","ref":"src/kemal/param_parser.cr:227"},{"file":"param_parser.cr","line":"83-101","ref":"param_parser.cr:83-101"},{"file":"param_parser.cr","line":"180","ref":"param_parser.cr:180"},{"file":"src/kemal/param_parser.cr","line":"83","ref":"src/kemal/param_parser.cr:83"},{"file":"param_parser.cr","line":"172-178","ref":"param_parser.cr:172-178"},{"file":"src/kemal/param_parser.cr","line":"172","ref":"src/kemal/param_parser.cr:172"}],"all_ids":["BR-router:001","BR-router:002"],"body_md":"# router\n\n**Role.** Route storage, matching and dispatch. The terminal `RouteHandler` middleware plus a file-local LRU cache over a Radix tree; the modular `Router` DSL; the `Route` record; and param parsing with body-size guards.\n\n**Paths.** `src/kemal/route_handler.cr` · `src/kemal/router.cr` · `src/kemal/route.cr` · `src/kemal/param_parser.cr`\n\n## RouteHandler (terminal middleware)\n- `RouteHandler` (`route_handler.cr:103`, `INSTANCE` singleton) is the TERMINAL middleware (appended last). `process_request` raises `RouteNotFound` unless `route_found?`, returns early if the response is already closed, calls the matched handler, raises `CustomException` if an error handler is registered for the resulting status_code (`route_handler.cr:166-167`), prints content, and in an `ensure` always runs `context.params.cleanup_temporary_files` (`route_handler.cr:173-174`). — `src/kemal/route_handler.cr:103`\n- **BR-router:001 — terminal cleanup.** `RouteHandler#process_request` always cleans up per-request multipart temp files in an `ensure` block, so a route handler that raises does not leak `FileUpload` tempfiles; `FileUpload`'s constructor also cleans up + re-raises on a copy failure. — `src/kemal/route_handler.cr:173`\n- Routes live in a `Radix::Tree(Route)` keyed `'/{METHOD}{path}'` (`route_handler.cr:177`). `lookup_route` caches into a file-local LRUCache and is Mutex-synchronized for concurrent fibers (`route_handler.cr:118-119,136`). **HEAD requests with no HEAD route IMPLICITLY fall back to the GET handler**, and the fallback is cached under the original HEAD key (`route_handler.cr:144-152`). — `src/kemal/route_handler.cr:133`\n- **LRUCache** (`route_handler.cr:7-101`) is a deliberately minimal, file-local O(1) doubly-linked-list + Hash LRU; capacity = `Kemal.config.max_route_cache_size` (default 1024); intentionally not part of the public API. — `src/kemal/route_handler.cr:7`\n\n## Router (modular DSL)\n- `Router` (`router.cr`) is the modular DSL: it ACCUMULATES route/filter/ws/sse/sub-router definitions into arrays at definition time and only flushes them into the global `RouteHandler`/`WebSocketHandler`/`FilterHandler` INSTANCEs in `register_routes` (`router.cr:201-240`), invoked by `mount`; `namespace` builds a nested Router via `with sub_router yield` (`router.cr:168-172`). — `src/kemal/router.cr:201`\n- `register_routes` recursively prefixes sub-routers (`router.cr:236-239`); `join_paths` normalizes slashes (`router.cr:323-329`); `validate_path!` enforces the leading-slash rule (`router.cr:331-335`); filters with path `'*'` apply to all collected route paths, otherwise to paths equal-to-or-prefixed-by the filter path (`router.cr:277-284`). — `src/kemal/router.cr:236`\n- `register_filters` re-adds `FilterHandler::INSTANCE` to config if it was cleared between tests (`router.cr:271-273`) — defensive re-registration against `Config.clear`. — `src/kemal/router.cr:271`\n- `Route` (`route.cr`) is a struct wrapping method/path/handler; the handler is normalized so a non-String block result becomes `''` (`route.cr:11-14`) — the same normalization `Router#add_route` applies (`router.cr:307-312`). — `src/kemal/route.cr:11`\n\n## ParamParser & body-size guards\n- `ParamParser` lazily parses url/query/body/json/files via a macro-generated memoized accessor per PART (`param_parser.cr:124-134`). — `src/kemal/param_parser.cr:124`\n- **BR-router:002 — body-size double guard (security-adjacent).** Body size is guarded TWO ways: `validate_content_length!` against `max_request_body_size`, and `read_body_with_limit` / the private `LimitedBodyIO` cap while streaming (raising `PayloadTooLarge`) so a lying/absent `Content-Length` can't bypass the limit (`param_parser.cr:50-55,227-234`). Multipart fields use a separate `max_multipart_form_field_size` limit. — `src/kemal/param_parser.cr:227`\n- `raw_body` is cached on first read and ONLY for url-encoded + JSON content types (`param_parser.cr:83-101`) so multiple handlers can read the body without consuming the IO; multipart fields use a separate `max_multipart_form_field_size` limit (`param_parser.cr:180,236-237`). — `src/kemal/param_parser.cr:83`\n- Multipart file fields whose name ends with `'[]'` accumulate into `@all_files` (arrays); others into `@files` (`param_parser.cr:172-178`). — `src/kemal/param_parser.cr:172`\n\n## Cross-component edges\n- router → handlers: `ExceptionHandler` rescues the `CustomException`/`RouteNotFound`/`PayloadTooLarge` this component raises.\n- router → ext: `process_request` reads `context.params` / `context.route_found?` (the lifecycle methods bolted on in `ext/context.cr`).\n- router ← core/Router: `Router#register_routes` flushes into `RouteHandler::INSTANCE`.","provenance":{"stage":"EMIT (deep component doc)","component":"router","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(router) · src/kemal/{route_handler,router,route,param_parser}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/route_handler.cr","src/kemal/router.cr","src/kemal/route.cr","src/kemal/param_parser.cr"],"content_hash":"sha256:598fdeb2fd132e92df01d2145a794cc8be49e8c1493b09d67aa4a27ee4fc2418","anchor":"c-router"},{"name":"websocket","role":"Real-time transports: the `WebSocketHandler` middleware (with Origin allow-list enforcement), the `WebSocket` route wrapper, and Server-Sent Events (`EventStream`).","paths":["src/kemal/websocket_handler.cr","src/kemal/websocket.cr","src/kemal/event_stream.cr"],"facts":[{"text":"BR-websocket:001 — Origin allow-list (security-relevant boundary). When `Kemal.config.websocket_allowed_origins` is non-empty, a WebSocket upgrade is REJECTED (403 Forbidden) unless the request Origin (normalized to `scheme://host[:port]`, default-port-stripped, lowercased; literal `'null'` supported) matches an entry; an EMPTY allow-list disables the check (allow-all). This is the cross-site-WebSocket-hijacking boundary. — `src/kemal/websocket_handler.cr:45`","ids":["BR-websocket:001"],"cites":[{"file":"src/kemal/websocket_handler.cr","line":"45","ref":"src/kemal/websocket_handler.cr:45"}],"anchor":"br-websocket-001"}],"edges":["websocket ← core: `config.setup` appends `WebSocketHandler::INSTANCE` as the penultimate terminal link (before `RouteHandler::INSTANCE`).","websocket ← core DSL: `sse` routes (`dsl.cr:63-68`) wrap `EventStream.serve` as GET routes — SSE reuses `RouteHandler`, not a separate transport at the routing layer.","websocket → ext: reads `context.ws_route_found?` (bolted on in `ext/context.cr`)."],"all_cites":[{"file":"websocket_handler.cr","line":"5","ref":"websocket_handler.cr:5"},{"file":"websocket_handler.cr","line":"38-43","ref":"websocket_handler.cr:38-43"},{"file":"src/kemal/websocket_handler.cr","line":"5","ref":"src/kemal/websocket_handler.cr:5"},{"file":"src/kemal/websocket_handler.cr","line":"45","ref":"src/kemal/websocket_handler.cr:45"},{"file":"websocket_handler.cr","line":"30","ref":"websocket_handler.cr:30"},{"file":"websocket_handler.cr","line":"22","ref":"websocket_handler.cr:22"},{"file":"src/kemal/websocket_handler.cr","line":"22","ref":"src/kemal/websocket_handler.cr:22"},{"file":"src/kemal/websocket.cr","line":"4","ref":"src/kemal/websocket.cr:4"},{"file":"event_stream.cr","line":"45-52","ref":"event_stream.cr:45-52"},{"file":"event_stream.cr","line":"18-28","ref":"event_stream.cr:18-28"},{"file":"src/kemal/event_stream.cr","line":"45","ref":"src/kemal/event_stream.cr:45"},{"file":"dsl.cr","line":"63-68","ref":"dsl.cr:63-68"}],"all_ids":["BR-websocket:001"],"body_md":"# websocket\n\n**Role.** Real-time transports: the `WebSocketHandler` middleware (with Origin allow-list enforcement), the `WebSocket` route wrapper, and Server-Sent Events (`EventStream`).\n\n**Paths.** `src/kemal/websocket_handler.cr` · `src/kemal/websocket.cr` · `src/kemal/event_stream.cr`\n\n## WebSocketHandler & the Origin boundary\n- `WebSocketHandler` (`websocket_handler.cr:5`, `INSTANCE` singleton) only engages when `context.ws_route_found?` AND the request is a genuine upgrade (`Upgrade: websocket` + `Connection: Upgrade`, case-insensitive, `websocket_handler.cr:38-43`); otherwise it `call_next`s. — `src/kemal/websocket_handler.cr:5`\n- **BR-websocket:001 — Origin allow-list (security-relevant boundary).** When `Kemal.config.websocket_allowed_origins` is non-empty, a WebSocket upgrade is REJECTED (403 Forbidden) unless the request Origin (normalized to `scheme://host[:port]`, default-port-stripped, lowercased; literal `'null'` supported) matches an entry; an EMPTY allow-list disables the check (allow-all). This is the cross-site-WebSocket-hijacking boundary. — `src/kemal/websocket_handler.cr:45`\n- WS routes are stored in a `Radix::Tree(WebSocket)` under `'/ws{path}'`. NOTE the path-key asymmetry: `add_route` builds the key via `radix_path('ws', path)` = `'/' + 'ws' + path` (`websocket_handler.cr:30,34-36`) while `lookup_ws_route` uses the literal `'\"/ws\" + path'` (`websocket_handler.cr:22`) — both yield `'/ws{path}'`, consistent but expressed two different ways. — `src/kemal/websocket_handler.cr:22`\n\n## WebSocket route wrapper\n- `WebSocket` (`websocket.cr`) subclasses `HTTP::WebSocketHandler` and just stores `path` + the user proc; `call` delegates to `super` (the stdlib upgrade handshake). — `src/kemal/websocket.cr:4`\n\n## EventStream (Server-Sent Events)\n- `EventStream` (`event_stream.cr`) implements SSE: `setup_headers` sets `Content-Type text/event-stream`, `Cache-Control no-cache`, `X-Accel-Buffering no`, and `Connection keep-alive` unless already set (`event_stream.cr:45-52`); `send()` splits multi-line data into separate `data:` lines and flushes (`event_stream.cr:18-28`); `comment()` sends a keep-alive comment line. `EventStream.serve` is the entry used by the `sse` DSL. — `src/kemal/event_stream.cr:45`\n\n## Cross-component edges\n- websocket ← core: `config.setup` appends `WebSocketHandler::INSTANCE` as the penultimate terminal link (before `RouteHandler::INSTANCE`).\n- websocket ← core DSL: `sse` routes (`dsl.cr:63-68`) wrap `EventStream.serve` as GET routes — SSE reuses `RouteHandler`, not a separate transport at the routing layer.\n- websocket → ext: reads `context.ws_route_found?` (bolted on in `ext/context.cr`).","provenance":{"stage":"EMIT (deep component doc)","component":"websocket","run_id":"run-2026-06-13-kemal-e2e","inputs":"extraction(websocket) · src/kemal/{websocket_handler,websocket,event_stream}.cr @ b73de3d8e6de","date":"2026-06-13","repo_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747"},"manifest_files":["src/kemal/websocket_handler.cr","src/kemal/websocket.cr","src/kemal/event_stream.cr"],"content_hash":"sha256:d572f17ab7d39bc5ebefa0e772a7203727e7d35c2565d75747ddba16bb09e317","anchor":"c-websocket"}],"decisions":[{"id":"ADR-0001","title":"Process-global `Config` singleton + class-constant handler registries","status":"accepted (inferred)","date":"unknown — inferred","certainty":"HIGH","context":"A Sinatra-style framework wants `get \"/\" { ... }` to work at top-level global scope with no app object to thread through. That requires a single, globally-reachable place to register routes, filters, handlers, and options.","decision":"Make `Config` a process-wide singleton (`Config::INSTANCE`, `config.cr:11`) and hold the five handler collections (HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS) as class-level mutable constants the global DSL, every Router, and every handler mutate directly.","why":"It is the minimum machinery that lets the global DSL register into one shared registry; the in-code comment at `config.cr:4-9` states \"It's a singleton\".","consequences":"NO per-application isolation (BR-core:002): tests and sub-apps share one registry. `Config.clear` (`config.cr:80-94`) is the ONLY reset seam — hence the defensive `register_filters` re-registration in `router.cr:271`. This is the load-bearing tradeoff of the whole framework.","cites":[{"file":"config.cr","line":"11","ref":"config.cr:11"},{"file":"config.cr","line":"4-9","ref":"config.cr:4-9"},{"file":"src/kemal/config.cr","line":"11","ref":"src/kemal/config.cr:11"},{"file":"config.cr","line":"12-16","ref":"config.cr:12-16"},{"file":"config.cr","line":"209","ref":"config.cr:209"},{"file":"config.cr","line":"80-94","ref":"config.cr:80-94"},{"file":"router.cr","line":"271","ref":"router.cr:271"}],"ids":["BR-core:002"],"body_md":"## ADR-0001: Process-global `Config` singleton + class-constant handler registries\n- **Status:**
