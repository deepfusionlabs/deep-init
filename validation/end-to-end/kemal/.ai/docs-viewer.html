accepted (inferred)\n- **Date:** unknown — inferred\n- **Context:** A Sinatra-style framework wants `get \"/\" { ... }` to work at top-level global scope with no app object to thread through. That requires a single, globally-reachable place to register routes, filters, handlers, and options.\n- **Decision:** Make `Config` a process-wide singleton (`Config::INSTANCE`, `config.cr:11`) and hold the five handler collections (HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS) as class-level mutable constants the global DSL, every Router, and every handler mutate directly.\n- **Why:** It is the minimum machinery that lets the global DSL register into one shared registry; the in-code comment at `config.cr:4-9` states \"It's a singleton\".\n- **Evidence:** `src/kemal/config.cr:11` (INSTANCE), `config.cr:12-16` (the 5 constants), `config.cr:209` (`Kemal.config` returns the instance).\n- **Consequences:** NO per-application isolation (BR-core:002): tests and sub-apps share one registry. `Config.clear` (`config.cr:80-94`) is the ONLY reset seam — hence the defensive `register_filters` re-registration in `router.cr:271`. This is the load-bearing tradeoff of the whole framework.\n- **Certainty:** [HIGH]","anchor":"adr-0001"},{"id":"ADR-0002","title":"A fixed-order `HTTP::Handler` middleware chain with terminal handlers appended last","status":"accepted (inferred)","date":"unknown — inferred","certainty":"HIGH","context":"Requests must flow through a predictable pipeline (init → logging → head → exceptions → static → custom → filters → routing) regardless of the order users call `use`/`get`. Composing on Crystal's stdlib `HTTP::Handler` gives the chain for free.","decision":"`config.setup` (`config.cr:140`) assembles the chain in a FIXED, position-counted order via `@handler_position`, and ALWAYS appends `WebSocketHandler::INSTANCE` then `RouteHandler::INSTANCE` last; custom (`use`) handlers always land between the built-ins and those terminal handlers.","why":"The terminal Route/WS handlers must see a request only after every cross-cutting concern (logging, exceptions, static files, filters) has had its turn; a registration-order chain would let a user accidentally place routing before exception handling.","consequences":"The pipeline is the load-bearing request contract (BR-core:001); custom handlers cannot run after routing. Idempotency-guarded (BR-core:004) so re-running `Kemal.run`/`mount` doesn't double-insert.","cites":[{"file":"config.cr","line":"140","ref":"config.cr:140"},{"file":"src/kemal/config.cr","line":"140","ref":"src/kemal/config.cr:140"},{"file":"config.cr","line":"151-152","ref":"config.cr:151-152"},{"file":"handler.cr","line":"35","ref":"handler.cr:35"}],"ids":["BR-core:001","BR-core:004"],"body_md":"## ADR-0002: A fixed-order `HTTP::Handler` middleware chain with terminal handlers appended last\n- **Status:** accepted (inferred)\n- **Date:** unknown — inferred\n- **Context:** Requests must flow through a predictable pipeline (init → logging → head → exceptions → static → custom → filters → routing) regardless of the order users call `use`/`get`. Composing on Crystal's stdlib `HTTP::Handler` gives the chain for free.\n- **Decision:** `config.setup` (`config.cr:140`) assembles the chain in a FIXED, position-counted order via `@handler_position`, and ALWAYS appends `WebSocketHandler::INSTANCE` then `RouteHandler::INSTANCE` last; custom (`use`) handlers always land between the built-ins and those terminal handlers.\n- **Why:** The terminal Route/WS handlers must see a request only after every cross-cutting concern (logging, exceptions, static files, filters) has had its turn; a registration-order chain would let a user accidentally place routing before exception handling.\n- **Evidence:** `src/kemal/config.cr:140` (setup), `config.cr:151-152` (terminal append), `handler.cr:35` (the `call_next` contract).\n- **Consequences:** The pipeline is the load-bearing request contract (BR-core:001); custom handlers cannot run after routing. Idempotency-guarded (BR-core:004) so re-running `Kemal.run`/`mount` doesn't double-insert.\n- **Certainty:** [HIGH]","anchor":"adr-0002"},{"id":"ADR-0003","title":"Match exception handlers by declaration order, not nearest-inheritance","status":"accepted (inferred)","date":"unknown — inferred","certainty":"HIGH","context":"When multiple registered handlers could rescue a raised exception (e.g. a base class and a subclass), the framework must pick one deterministically.","decision":"The generic fallback iterates registered exception handlers in ORDER OF DECLARATION and takes the first whose expected type satisfies `ex.class \u003c= expected_exception` (`exception_handler.cr:24`) — explicitly NOT nearest-inheritance.","why":"Declaration order is predictable and user-controllable (register the most specific handler first); the in-code comment (`exception_handler.cr:22-23`) documents this as intentional: \"Matches based on order of declaration rather than inheritance relationship\".","consequences":"Contradicts the naive most-specific-wins expectation (BR-handlers:003); users who register a broad handler before a narrow one will have the broad one win. This is the most non-obvious behavior in the codebase.","cites":[{"file":"exception_handler.cr","line":"24","ref":"exception_handler.cr:24"},{"file":"exception_handler.cr","line":"22-23","ref":"exception_handler.cr:22-23"},{"file":"src/kemal/exception_handler.cr","line":"24","ref":"src/kemal/exception_handler.cr:24"}],"ids":["BR-handlers:003"],"body_md":"## ADR-0003: Match exception handlers by declaration order, not nearest-inheritance\n- **Status:** accepted (inferred)\n- **Date:** unknown — inferred\n- **Context:** When multiple registered handlers could rescue a raised exception (e.g. a base class and a subclass), the framework must pick one deterministically.\n- **Decision:** The generic fallback iterates registered exception handlers in ORDER OF DECLARATION and takes the first whose expected type satisfies `ex.class \u003c= expected_exception` (`exception_handler.cr:24`) — explicitly NOT nearest-inheritance.\n- **Why:** Declaration order is predictable and user-controllable (register the most specific handler first); the in-code comment (`exception_handler.cr:22-23`) documents this as intentional: \"Matches based on order of declaration rather than inheritance relationship\".\n- **Evidence:** `src/kemal/exception_handler.cr:24` + the comment at `:22-23`.\n- **Consequences:** Contradicts the naive most-specific-wins expectation (BR-handlers:003); users who register a broad handler before a narrow one will have the broad one win. This is the most non-obvious behavior in the codebase.\n- **Certainty:** [HIGH]","anchor":"adr-0003"},{"id":"ADR-0004","title":"Keep global (`before_all`/`after_all`) filters out of the radix tree (the #757 fix)","status":"accepted (inferred)","date":"~this commit (b73de3d carries the #757 fix) — inferred","certainty":"MEDIUM","context":"Global filters and path-scoped filters were both stored in the radix `@tree`, so a path lookup could match a global filter a second time, running `before_all`/`after_all` twice.","decision":"Store global filters in a separate `@global_filters` collection that NEVER enters the radix `@tree` (`filter_handler.cr:40`), making duplicate `before_all`/`after_all` execution structurally impossible while preserving the invariant order `before_all → before_x → X → after_x → after_all`.","why":"Correctness — a filter that runs twice (e.g. an auth check, a counter) is a real bug; structural separation is more robust than a runtime dedup guard.","consequences":"BR-handlers:002 — the exactly-once guarantee is a structural property, not a defensive check. `@exact_filters` is an O(1) hash cache over the remaining tree.","cites":[{"file":"filter_handler.cr","line":"40","ref":"filter_handler.cr:40"},{"file":"src/kemal/filter_handler.cr","line":"40","ref":"src/kemal/filter_handler.cr:40"}],"ids":["BR-handlers:002"],"body_md":"## ADR-0004: Keep global (`before_all`/`after_all`) filters out of the radix tree (the #757 fix)\n- **Status:** accepted (inferred)\n- **Date:** ~this commit (b73de3d carries the #757 fix) — inferred\n- **Context:** Global filters and path-scoped filters were both stored in the radix `@tree`, so a path lookup could match a global filter a second time, running `before_all`/`after_all` twice.\n- **Decision:** Store global filters in a separate `@global_filters` collection that NEVER enters the radix `@tree` (`filter_handler.cr:40`), making duplicate `before_all`/`after_all` execution structurally impossible while preserving the invariant order `before_all → before_x → X → after_x → after_all`.\n- **Why:** Correctness — a filter that runs twice (e.g. an auth check, a counter) is a real bug; structural separation is more robust than a runtime dedup guard.\n- **Evidence:** `src/kemal/filter_handler.cr:40` (the order comment + `@global_filters`); the commit this analysis pins (`b73de3d`) is the \"Fix before_all filters running twice\" (#757) fix.\n- **Consequences:** BR-handlers:002 — the exactly-once guarantee is a structural property, not a defensive check. `@exact_filters` is an O(1) hash cache over the remaining tree.\n- **Certainty:** [MEDIUM] — the structural mechanism is HIGH-certain from code; the attribution to #757 is inferred from the pinned-commit context.","anchor":"adr-0004"}],"knowledge_log":[{"id":"KL-architecture:001","text":"The whole `src/kemal/` tree loads via three glob `require`s in the umbrella `src/kemal.cr`; files reference siblings by fully-qualified constants, not per-file imports — so there is NO module-import graph (the permitted+textual model).","cites":[{"file":"src/kemal.cr","line":"4-6","ref":"src/kemal.cr:4-6"}],"certainty":"HIGH","anchor":"kl-architecture-001"},{"id":"KL-preference:001","text":"The DSL (`dsl.cr`) and the view helpers (`helpers.cr`) are deliberately baked into GLOBAL top-level scope, NOT under `Kemal::` — the Sinatra ergonomic convention.","cites":[{"file":"src/kemal/dsl.cr","line":"28","ref":"src/kemal/dsl.cr:28"},{"file":"src/kemal/helpers/helpers.cr","line":"18","ref":"src/kemal/helpers/helpers.cr:18"}],"certainty":"HIGH","anchor":"kl-preference-001"},{"id":"KL-learning:001","text":"`VERSION` is resolved at COMPILE time by shelling out `shards version` (a macro), not read at runtime.","cites":[{"file":"src/kemal/config.cr","line":"2","ref":"src/kemal/config.cr:2"}],"certainty":"HIGH","anchor":"kl-learning-001"},{"id":"KL-architecture:002","text":"SSE is not a separate transport at the routing layer — `sse` routes are GET routes wrapping `EventStream.serve`, reusing `RouteHandler`.","cites":[{"file":"src/kemal/dsl.cr","line":"63","ref":"src/kemal/dsl.cr:63"}],"certainty":"HIGH","anchor":"kl-architecture-002"},{"id":"KL-learning:002","text":"HEAD requests with no explicit HEAD route IMPLICITLY fall back to the GET handler, and the fallback is cached under the original HEAD key.","cites":[{"file":"src/kemal/route_handler.cr","line":"144","ref":"src/kemal/route_handler.cr:144"}],"certainty":"HIGH","anchor":"kl-learning-002"},{"id":"KL-mistake:001","text":"`ext/response.cr` is documented dead code on modern Crystal — `{{ skip_file if compare_versions(...) }}` compiles it out on Crystal ≥1.3.0 (a legacy issue-#627 Content-Length fix). Don't rely on it.","cites":[{"file":"src/kemal/ext/response.cr","line":"3","ref":"src/kemal/ext/response.cr:3"}],"certainty":"HIGH","anchor":"kl-mistake-001"},{"id":"KL-preference:002","text":"The entire `logging` component (`BaseLogHandler`/`LogHandler`/`NullLogHandler`) is `@[Deprecated]` in favor of stdlib `Log`; only `RequestLogHandler` is the live default.","cites":[{"file":"src/kemal/base_log_handler.cr","line":"3","ref":"src/kemal/base_log_handler.cr:3"}],"certainty":"HIGH","anchor":"kl-preference-002"},{"id":"KL-integration:001","text":"The `@store` session-map type union (`STORE_MAPPINGS`, `ext/context.cr:9`) is extended at compile time by `helpers/macros.cr add_context_storage_type` — a cross-file compile-time contract between `ext` and `helpers`.","cites":[{"file":"ext/context.cr","line":"9","ref":"ext/context.cr:9"},{"file":"src/kemal/ext/context.cr","line":"9","ref":"src/kemal/ext/context.cr:9"}],"certainty":"HIGH","anchor":"kl-integration-001"}],"open_questions":["The two-way expression of the WS path key (`radix_path('ws', path)` in `add_route` vs the literal `\"/ws\" + path` in `lookup_ws_route`) yields the same key but is written two different ways — likely incidental, not a deliberate decision; flagged as a readability note, not an ADR."],"issues":{"summary":"0 verified issues / 9 named suppressions. DeepInit declines to fabricate ungroundable fires; every candidate it considered and chose NOT to file is recorded below with the predicate-FALSE mechanism that suppressed it (degrade-don't-false-flag, R1). This is the expected posture for a mature, intentionally-designed OSS HTTP framework.","verified":[],"suppressions":[{"family":"IF-8","title":"IF-8 — circular component dependency","verdict":"structurally inapplicable as an IMPORT cycle (permitted+textual model).","cites":[],"body_md":"### IF-8 — circular component dependency\n**Verdict: structurally inapplicable as an IMPORT cycle (permitted+textual model).**\nCrystal/kemal uses the permitted+textual model: the ONLY `require` statements are three glob requires in the umbrella `src/kemal.cr` (`require \"./kemal/*\"`, `\"./kemal/ext/*\"`, `\"./kemal/helpers/*\"`). No file imports a sibling; every file reopens `module Kemal` and references siblings by fully-qualified constants (e.g. `Kemal::RouteHandler::INSTANCE`) resolved after the single glob load. There are therefore NO per-file import edges to form an SCC. Mutual cross-references DO exist between components (config↔handlers↔router↔websocket via constant references), but the spec's IF-8 detector keys on the structural import graph; a component-SCC computed from constant-reference would be a granularity artifact of the glob-load model, not a compile-time import cycle (cf. the nginx permitted+textual datapoint). **Suppress: no import-edge substrate to fire on.**"},{"family":"IF-3a","title":"IF-3a — silent cross-component coupling (serve_static magic-string keys)","verdict":"an EXPLICIT interface mediates the resource → below the bar.","cites":[{"file":"config.cr","line":"43","ref":"config.cr:43"},{"file":"static_file_handler.cr","line":"11","ref":"static_file_handler.cr:11"},{"file":"helpers.cr","line":"161","ref":"helpers.cr:161"},{"file":"helpers.cr","line":"93-97","ref":"helpers.cr:93-97"}],"body_md":"### IF-3a — silent cross-component coupling (serve_static magic-string keys)\n**Verdict: an EXPLICIT interface mediates the resource → below the bar.**\nCandidate: the string keys `'dir_index'`/`'dir_listing'`/`'gzip'` are written as the default hash in core (`config.cr:43`) and read by literal key in handlers (`static_file_handler.cr:11,21,84,95`) and helpers (`helpers.cr:161`) with no shared constant. SUPPRESS: all reads go through the `Config` singleton's public `serve_static` accessor (`Kemal.config.serve_static`), and the keys are the documented public option surface (`helpers.cr:93-97`). The IF-3a gate requires a named resource read/written by ≥2 components WITH NO EXPLICIT INTERFACE; here the Config accessor IS the interface. Residual risk (a key typo silently disabling a feature) is real but LOW."},{"family":"IF-3a","title":"IF-3a — silent cross-component coupling (Config global mutable HANDLERS arrays)","verdict":"intentional, documented singleton design + mediated access → below the bar.","cites":[{"file":"router.cr","line":"271","ref":"router.cr:271"},{"file":"config.cr","line":"4-9","ref":"config.cr:4-9"}],"body_md":"### IF-3a — silent cross-component coupling (Config global mutable HANDLERS arrays)\n**Verdict: intentional, documented singleton design + mediated access → below the bar.**\nCandidate: HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS are class constants on Config, mutated by core (`config.cr`) and Router (`router.cr:271` reads `Kemal::Config::FILTER_HANDLERS` directly). SUPPRESS: this is the intentional, documented singleton design (`config.cr:4-9` \"It's a singleton\") and access is mediated through Config's public methods (`add_handler`/`add_filter_handler`/`handlers`); the one direct constant read in `router.cr:271` is a defensive idempotency check, not a silent coupling. The coupling is the architecture's central, named, documented contract — captured as **BR-core:002** — not a hidden change-one-break-the-other resource."},{"family":"IF-3a","title":"IF-3a — silent cross-component coupling (STORE_MAPPINGS)","verdict":"a compile-time macro contract / documented extension API → below the bar.","cites":[{"file":"context.cr","line":"9","ref":"context.cr:9"},{"file":"macros.cr","line":"126-128","ref":"macros.cr:126-128"},{"file":"context.cr","line":"11-12","ref":"context.cr:11-12"}],"body_md":"### IF-3a — silent cross-component coupling (STORE_MAPPINGS)\n**Verdict: a compile-time macro contract / documented extension API → below the bar.**\nCandidate: `HTTP::Server::Context::STORE_MAPPINGS` is defined in ext (`context.cr:9`) and pushed to by helpers' `add_context_storage_type` macro (`macros.cr:126-128`). SUPPRESS: this is a COMPILE-TIME macro contract (the array is consumed by `macro finished` to build the StoreTypes union, `context.cr:11-12`), exposed deliberately as the documented extension API; it is a public, named extension seam, not a silent runtime resource coupling. Captured as a component fact + BR."},{"family":"IF-1","title":"IF-1 — business-rule violation / inconsistent enforcement","verdict":"no rule to check inconsistency against → suppress (degrade-don't-false-flag).","cites":[],"body_md":"### IF-1 — business-rule violation / inconsistent enforcement\n**Verdict: no rule to check inconsistency against → suppress (degrade-don't-false-flag).**\nNo documented Core/Supporting business rule is enforced on one path but absent on a sibling path to the same entity+operation. kemal is an HTTP framework, not a domain app with ownership/authorization rules over entities. The closest invariants (body-size cap, leading-slash precondition, response-closed guard) are each enforced uniformly across all reaching paths (the body-size cap is even double-guarded, BR-router:002). No guarded-vs-unguarded sibling contrast exists."},{"family":"IF-4","title":"IF-4 — intent/decision contradiction","verdict":"dual-citation impossible (no decision side) → suppress.","cites":[],"body_md":"### IF-4 — intent/decision contradiction\n**Verdict: dual-citation impossible (no decision side) → suppress.**\nNo ADR/decision-log in the repo, and no code observed contradicting a recorded rule, a name-that-lies, a stale workaround, or a load-bearing TODO/FIXME on a Core path (no TODO/FIXME/HACK markers found in `src/`). Deprecated APIs (`add_handler`/`log`/`logger`/`LogHandler`/`NullLogHandler`/`BaseLogHandler`) are correctly `@[Deprecated]`-annotated with the replacement named (\"Use standard library `Log`\" / \"Use `use` instead\") — that is honest documentation of intent, not a contradiction. The `ext/response.cr` legacy override is explicitly compiled out on Crystal ≥1.3 with an in-code rationale + issue link (#627) — documented dead code, not drift."},{"family":"IF-6","title":"IF-6 — divergent named allowed-value set","verdict":"no non-empty symmetric difference under a shared name → suppress.","cites":[{"file":"helpers/utils.cr","line":"3","ref":"helpers/utils.cr:3"},{"file":"ext/context.cr","line":"9","ref":"ext/context.cr:9"},{"file":"request_log_handler.cr","line":"13","ref":"request_log_handler.cr:13"},{"file":"log_handler.cr","line":"22","ref":"log_handler.cr:22"}],"body_md":"### IF-6 — divergent named allowed-value set\n**Verdict: no non-empty symmetric difference under a shared name → suppress.**\nNo named literal value-set is defined under the same canonical name in ≥2 distinct components with conflicting membership. The named sets present are single-owner: `ZIP_TYPES` (`helpers/utils.cr:3`), `STORE_MAPPINGS` (`ext/context.cr:9`), `ALLOWED_METHODS`/`HTTP_METHODS`/`FILTER_METHODS`/`PARTS` (each in one file). The duplicated `elapsed_text` method (`request_log_handler.cr:13` and the deprecated `log_handler.cr:22`) is same-LOGIC duplication with IDENTICAL behavior, not a divergent named value-set — that is the deferred semantic-IF-6 (same-logic, no shared name), explicitly out of the deterministic slice's scope, and the copies do not diverge anyway."},{"family":"IF-7c","title":"IF-7c — cross-boundary swallowed error","verdict":"predicate-FALSE (re-raise + error-as-value) → suppress.","cites":[{"file":"param_parser.cr","line":"120","ref":"param_parser.cr:120"},{"file":"file_upload.cr","line":"17-19","ref":"file_upload.cr:17-19"},{"file":"exception_handler.cr","line":"30","ref":"exception_handler.cr:30"}],"body_md":"### IF-7c — cross-boundary swallowed error\n**Verdict: predicate-FALSE (re-raise + error-as-value) → suppress.**\nNo bare empty / comment-only error handler exists. The two rescue sites are both NON-empty and deliberate: `param_parser.cr:120` `rescue value` returns the original (unescaped) value (an error-as-value fallback, not a swallow), and `file_upload.cr:17-19` rescues, calls `cleanup()`, then re-raises (`raise ex`) — propagation, the opposite of a swallow. Crystal has no Java-style checked exceptions; the central error funnel is `ExceptionHandler` which logs (`Log.error`, `exception_handler.cr:30`) and renders rather than discarding."},{"family":"IF-10","title":"IF-10 — statically-dead const-gated branch","verdict":"no literal-const indirection feeding a runtime `if` → suppress (config-as-compile-flag).","cites":[{"file":"config.cr","line":"18","ref":"config.cr:18"},{"file":"static_file_handler.cr","line":"3","ref":"static_file_handler.cr:3"},{"file":"ext/response.cr","line":"3","ref":"ext/response.cr:3"},{"file":"helpers.cr","line":"1","ref":"helpers.cr:1"}],"body_md":"### IF-10 — statically-dead const-gated branch\n**Verdict: no literal-const indirection feeding a runtime `if` → suppress (config-as-compile-flag).**\nNo module-level compile-time-literal constant is used as the WHOLE test of a conditional with a statically-dead arm. The conditionals in `src/` test runtime/instance state (`@logging`, `@always_rescue`, `@serve_static.is_a?(Hash)`, `config.powered_by_header?`, request methods/headers) or config values — none is a const-folded literal. The compile-time `{% if flag?(:without_openssl) %}` / `{% if compare_versions(Crystal::VERSION,...) %}` / `{{ skip_file if ... }}` macros (`config.cr:18`, `static_file_handler.cr:3`, `ext/response.cr:3`, `helpers.cr:1`) are Crystal MACRO conditionals resolved by the compiler against build flags / toolchain version — config-as-compile-flag (the deliberate, intended build-variant mechanism), the analog of nginx's IF-10-muted-via-preprocessor datapoint, not a dead const-gated runtime branch."}],"body_md":"# Issue ledger — kemal\n\n**Summary:** 0 verified issues / 9 named suppressions. DeepInit declines to fabricate ungroundable fires; every candidate it considered and chose NOT to file is recorded below with the predicate-FALSE mechanism that suppressed it (degrade-don't-false-flag, R1). This is the expected posture for a mature, intentionally-designed OSS HTTP framework.\n\n## 1. Verified issues\n\n| ISS-id | Family | Claim | Provenance | Severity | Certainty | Verified | Lifecycle |\n|--------|--------|-------|------------|----------|-----------|----------|-----------|\n| — | — | *(none)* | — | — | — | — | — |\n\nNo issue survived verification this run. The SARIF `results[]` is correspondingly empty (a valid run).\n\n## 2. Named suppressions (the candidates considered and why they did NOT fire)\n\nEach row names a real structural candidate and the gate clause that holds it below the precision-first bar — never silent.\n\n### IF-8 — circular component dependency\n**Verdict: structurally inapplicable as an IMPORT cycle (permitted+textual model).**\nCrystal/kemal uses the permitted+textual model: the ONLY `require` statements are three glob requires in the umbrella `src/kemal.cr` (`require \"./kemal/*\"`, `\"./kemal/ext/*\"`, `\"./kemal/helpers/*\"`). No file imports a sibling; every file reopens `module Kemal` and references siblings by fully-qualified constants (e.g. `Kemal::RouteHandler::INSTANCE`) resolved after the single glob load. There are therefore NO per-file import edges to form an SCC. Mutual cross-references DO exist between components (config↔handlers↔router↔websocket via constant references), but the spec's IF-8 detector keys on the structural import graph; a component-SCC computed from constant-reference would be a granularity artifact of the glob-load model, not a compile-time import cycle (cf. the nginx permitted+textual datapoint). **Suppress: no import-edge substrate to fire on.**\n\n### IF-3a — silent cross-component coupling (serve_static magic-string keys)\n**Verdict: an EXPLICIT interface mediates the resource → below the bar.**\nCandidate: the string keys `'dir_index'`/`'dir_listing'`/`'gzip'` are written as the default hash in core (`config.cr:43`) and read by literal key in handlers (`static_file_handler.cr:11,21,84,95`) and helpers (`helpers.cr:161`) with no shared constant. SUPPRESS: all reads go through the `Config` singleton's public `serve_static` accessor (`Kemal.config.serve_static`), and the keys are the documented public option surface (`helpers.cr:93-97`). The IF-3a gate requires a named resource read/written by ≥2 components WITH NO EXPLICIT INTERFACE; here the Config accessor IS the interface. Residual risk (a key typo silently disabling a feature) is real but LOW.\n\n### IF-3a — silent cross-component coupling (Config global mutable HANDLERS arrays)\n**Verdict: intentional, documented singleton design + mediated access → below the bar.**\nCandidate: HANDLERS/CUSTOM_HANDLERS/FILTER_HANDLERS/ERROR_HANDLERS/EXCEPTION_HANDLERS are class constants on Config, mutated by core (`config.cr`) and Router (`router.cr:271` reads `Kemal::Config::FILTER_HANDLERS` directly). SUPPRESS: this is the intentional, documented singleton design (`config.cr:4-9` \"It's a singleton\") and access is mediated through Config's public methods (`add_handler`/`add_filter_handler`/`handlers`); the one direct constant read in `router.cr:271` is a defensive idempotency check, not a silent coupling. The coupling is the architecture's central, named, documented contract — captured as **BR-core:002** — not a hidden change-one-break-the-other resource.\n\n### IF-3a — silent cross-component coupling (STORE_MAPPINGS)\n**Verdict: a compile-time macro contract / documented extension API → below the bar.**\nCandidate: `HTTP::Server::Context::STORE_MAPPINGS` is defined in ext (`context.cr:9`) and pushed to by helpers' `add_context_storage_type` macro (`macros.cr:126-128`). SUPPRESS: this is a COMPILE-TIME macro contract (the array is consumed by `macro finished` to build the StoreTypes union, `context.cr:11-12`), exposed deliberately as the documented extension API; it is a public, named extension seam, not a silent runtime resource coupling. Captured as a component fact + BR.\n\n### IF-1 — business-rule violation / inconsistent enforcement\n**Verdict: no rule to check inconsistency against → suppress (degrade-don't-false-flag).**\nNo documented Core/Supporting business rule is enforced on one path but absent on a sibling path to the same entity+operation. kemal is an HTTP framework, not a domain app with ownership/authorization rules over entities. The closest invariants (body-size cap, leading-slash precondition, response-closed guard) are each enforced uniformly across all reaching paths (the body-size cap is even double-guarded, BR-router:002). No guarded-vs-unguarded sibling contrast exists.\n\n### IF-4 — intent/decision contradiction\n**Verdict: dual-citation impossible (no decision side) → suppress.**\nNo ADR/decision-log in the repo, and no code observed contradicting a recorded rule, a name-that-lies, a stale workaround, or a load-bearing TODO/FIXME on a Core path (no TODO/FIXME/HACK markers found in `src/`). Deprecated APIs (`add_handler`/`log`/`logger`/`LogHandler`/`NullLogHandler`/`BaseLogHandler`) are correctly `@[Deprecated]`-annotated with the replacement named (\"Use standard library `Log`\" / \"Use `use` instead\") — that is honest documentation of intent, not a contradiction. The `ext/response.cr` legacy override is explicitly compiled out on Crystal ≥1.3 with an in-code rationale + issue link (#627) — documented dead code, not drift.\n\n### IF-6 — divergent named allowed-value set\n**Verdict: no non-empty symmetric difference under a shared name → suppress.**\nNo named literal value-set is defined under the same canonical name in ≥2 distinct components with conflicting membership. The named sets present are single-owner: `ZIP_TYPES` (`helpers/utils.cr:3`), `STORE_MAPPINGS` (`ext/context.cr:9`), `ALLOWED_METHODS`/`HTTP_METHODS`/`FILTER_METHODS`/`PARTS` (each in one file). The duplicated `elapsed_text` method (`request_log_handler.cr:13` and the deprecated `log_handler.cr:22`) is same-LOGIC duplication with IDENTICAL behavior, not a divergent named value-set — that is the deferred semantic-IF-6 (same-logic, no shared name), explicitly out of the deterministic slice's scope, and the copies do not diverge anyway.\n\n### IF-7c — cross-boundary swallowed error\n**Verdict: predicate-FALSE (re-raise + error-as-value) → suppress.**\nNo bare empty / comment-only error handler exists. The two rescue sites are both NON-empty and deliberate: `param_parser.cr:120` `rescue value` returns the original (unescaped) value (an error-as-value fallback, not a swallow), and `file_upload.cr:17-19` rescues, calls `cleanup()`, then re-raises (`raise ex`) — propagation, the opposite of a swallow. Crystal has no Java-style checked exceptions; the central error funnel is `ExceptionHandler` which logs (`Log.error`, `exception_handler.cr:30`) and renders rather than discarding.\n\n### IF-10 — statically-dead const-gated branch\n**Verdict: no literal-const indirection feeding a runtime `if` → suppress (config-as-compile-flag).**\nNo module-level compile-time-literal constant is used as the WHOLE test of a conditional with a statically-dead arm. The conditionals in `src/` test runtime/instance state (`@logging`, `@always_rescue`, `@serve_static.is_a?(Hash)`, `config.powered_by_header?`, request methods/headers) or config values — none is a const-folded literal. The compile-time `{% if flag?(:without_openssl) %}` / `{% if compare_versions(Crystal::VERSION,...) %}` / `{{ skip_file if ... }}` macros (`config.cr:18`, `static_file_handler.cr:3`, `ext/response.cr:3`, `helpers.cr:1`) are Crystal MACRO conditionals resolved by the compiler against build flags / toolchain version — config-as-compile-flag (the deliberate, intended build-variant mechanism), the analog of nginx's IF-10-muted-via-preprocessor datapoint, not a dead const-gated runtime branch.\n\n## 3. Honesty note\nThis ledger is report-only and 100% local. Zero fires on a framework this mature is the expected, correct outcome — the suppressions above are the evidence DeepInit *looked* and grounded every non-fire, rather than the absence of analysis. Several couplings that a naive scanner would flag (the global `Config` singleton, the `serve_static` magic keys, `STORE_MAPPINGS`) are instead captured as first-class **context facts / BRs** in the component docs, where they belong."},"files_index":[{"file":"cli.cr","refs":[{"line":"6-15","kind":"component","owner":"core","label":"WF-core:001 — system boot is one ordered call-chain (background process). `Kemal.run`: (1)"}]},{"file":"config.cr","refs":[{"line":"140","kind":"component","owner":"core","label":"WF-core:001 — system boot is one ordered call-chain l":"FilterHandler dispatches before/after filters (see `router` doc + BR-handlers:002); global"},{"line":"40","kind":"decision","owner":"ADR-0004","label":"Keep global (`before_all`/`after_all`) filters out of the radix tree (the #757 fix)"}]},{"file":"src/kemal/handler.cr","refs":[{"line":"35","kind":"lean","owner":"AGENTS.md","label":"The `HTTP::Handler` chain contract: a handler does work then calls `call_next(context)` to"},{"line":"35","kind":"component","owner":"handlers","label":"BR-handlers:001 — every middleware includes `HTTP::Handler`. The contract is: do work, the"}]},{"file":"src/kemal/helpers/helpers.cr","refs":[{"line":"18","kind":"knowledge","owner":"KL-preference:001","label":"The DSL (`dsl.cr`) and the view helpers (`helpers.cr`) are deliberately baked into GLOBAL "}]},{"file":"src/kemal/helpers/utils.cr","refs":[{"line":"5","kind":"component","owner":"helpers","label":"BR-core:003 — leading-slash precondition (boundary rule). Every route/ws/sse/filter path M"}]},{"file":"src/kemal/param_parser.cr","refs":[{"line":"227","kind":"lean","owner":"AGENTS.md","label":"Request body size is capped TWO independent ways so a missing/lying `Content-Length` can't"},{"line":"227","kind":"component","owner":"router","label":"BR-router:002 — body-size double guard (security-adjacent). Body size is guarded TWO ways:"}]},{"file":"src/kemal/route_handler.cr","refs":[{"line":"173","kind":"lean","owner":"AGENTS.md","label":"`RouteHandler#process_request` always cleans up per-request multipart temp files in an `en"},{"line":"173","kind":"component","owner":"router","label":"BR-router:001 — terminal cleanup. `RouteHandler#process_request` always cleans up per-requ"},{"line":"144","kind":"knowledge","owner":"KL-learning:002","label":"HEAD requests with no explicit HEAD route IMPLICITLY fall back to the GET handler, and the"}]},{"file":"src/kemal/websocket_handler.cr","refs":[{"line":"45","kind":"lean","owner":"AGENTS.md","label":"WebSocket upgrades are rejected 403 unless the request Origin (normalized to `scheme://hos"},{"line":"45","kind":"component","owner":"websocket","label":"BR-websocket:001 — Origin allow-list (security-relevant boundary). When `Kemal.config.webs"}]}],"xref":{"WF-core:001":{"id":"WF-core:001","kind":"record","owner":"core","anchor":"wf-core-001"},"BR-core:002":{"id":"BR-core:002","kind":"record","owner":"core","anchor":"br-core-002"},"BR-core:001":{"id":"BR-core:001","kind":"record","owner":"core","anchor":"br-core-001"},"BR-core:004":{"id":"BR-core:004","kind":"record","owner":"core","anchor":"br-core-004"},"BR-handlers:004":{"id":"BR-handlers:004","kind":"record","owner":"ext","anchor":"br-handlers-004"},"BR-handlers:001":{"id":"BR-handlers:001","kind":"record","owner":"handlers","anchor":"br-handlers-001"},"BR-handlers:003":{"id":"BR-handlers:003","kind":"record","owner":"handlers","anchor":"br-handlers-003"},"BR-handlers:002":{"id":"BR-handlers:002","kind":"record","owner":"handlers","anchor":"br-handlers-002"},"BR-core:003":{"id":"BR-core:003","kind":"record","owner":"helpers","anchor":"br-core-003"},"BR-router:001":{"id":"BR-router:001","kind":"record","owner":"router","anchor":"br-router-001"},"BR-router:002":{"id":"BR-router:002","kind":"record","owner":"router","anchor":"br-router-002"},"BR-websocket:001":{"id":"BR-websocket:001","kind":"record","owner":"websocket","anchor":"br-websocket-001"},"ADR-0001":{"id":"ADR-0001","kind":"decision","owner":"decisions","anchor":"adr-0001"},"ADR-0002":{"id":"ADR-0002","kind":"decision","owner":"decisions","anchor":"adr-0002"},"ADR-0003":{"id":"ADR-0003","kind":"decision","owner":"decisions","anchor":"adr-0003"},"ADR-0004":{"id":"ADR-0004","kind":"decision","owner":"decisions","anchor":"adr-0004"},"KL-architecture:001":{"id":"KL-architecture:001","kind":"knowledge","owner":"decisions","anchor":"kl-architecture-001"},"KL-preference:001":{"id":"KL-preference:001","kind":"knowledge","owner":"decisions","anchor":"kl-preference-001"},"KL-learning:001":{"id":"KL-learning:001","kind":"knowledge","owner":"decisions","anchor":"kl-learning-001"},"KL-architecture:002":{"id":"KL-architecture:002","kind":"knowledge","owner":"decisions","anchor":"kl-architecture-002"},"KL-learning:002":{"id":"KL-learning:002","kind":"knowledge","owner":"decisions","anchor":"kl-learning-002"},"KL-mistake:001":{"id":"KL-mistake:001","kind":"knowledge","owner":"decisions","anchor":"kl-mistake-001"},"KL-preference:002":{"id":"KL-preference:002","kind":"knowledge","owner":"decisions","anchor":"kl-preference-002"},"KL-integration:001":{"id":"KL-integration:001","kind":"knowledge","owner":"decisions","anchor":"kl-integration-001"}},"search_index":[{"id":"overview","type":"overview","title":"Architecture overview","text":"A composable HTTP::Handler middleware pipeline driven by a Sinatra-style global DSL over a process-global Config singleton. The whole src/kemal/ tree is loaded by three glob requires in src/kemal.cr; files reference siblings by fully-qualified constants, not per-file imports. Components map to .ai/docs/components/. Kemal is a lean, Sinatra-style HTTP web framework for the Crystal language: a global-scope DSL (get \"/\" { ... }, ws, sse, before all, use, mount) layered over a fixed HTTP::Handler middleware chain that a single process-wide Config singleton assembles and owns.","view":"overview","anchor":"overview"},{"id":"BR-handlers:003","type":"fact","title":"Critical fact","text":"Exception handlers are matched by ORDER OF DECLARATION, not nearest-inheritance — the first registered compatible handler wins (ex.class \u003c= expected exception). Documented in-code as intentional; naive readers expect most-specific-wins. — src/kemal/exception handler.cr:24 [BR-handlers:003]","view":"overview","anchor":"br-handlers-003"},{"id":"BR-core:001","type":"fact","title":"Critical fact","text":"The default middleware chain is assembled in a FIXED, position-counted order (NOT registration order); the two terminal handlers WebSocketHandler::INSTANCE then RouteHandler::INSTANCE are ALWAYS appended last, and custom (use) handlers always land between the built-ins and those terminal handlers. — src/kemal/config.cr:140 [BR-core:001]","view":"overview","anchor":"br-core-001"},{"id":"BR-core:002","type":"fact","title":"Critical fact","text":"There is NO per-application isolation: Config::INSTANCE plus the class-constant arrays HANDLERS/CUSTOM HANDLERS/FILTER HANDLERS/ERROR HANDLERS/EXCEPTION HANDLERS are process-global mutable state shared by the global DSL, every Router, and every handler; Config.clear is the ONLY reset seam (tests/sub-apps share one registry). — src/kemal/config.cr:11 [BR-core:002]","view":"overview","anchor":"br-core-002"},{"id":"BR-handlers:002","type":"fact","title":"Critical fact","text":"Filter order is invariant before all → before x → X → after x → after all, and global filters live in @global filters and NEVER enter the radix @tree, so a path lookup cannot match them twice — duplicate before all/after all execution is structurally impossible (the 757 fix this commit carries). — src/kemal/filter handler.cr:40 [BR-handlers:002]","view":"overview","anchor":"br-handlers-002"},{"id":"BR-websocket:001","type":"fact","title":"Critical fact","text":"WebSocket upgrades are rejected 403 unless the request Origin (normalized to scheme://host[:port], default-port-stripped, lowercased; literal null supported) matches a non-empty websocket allowed origins; an EMPTY allow-list disables the check (allow-all). This is the cross-site-WebSocket-hijacking boundary. — src/kemal/websocket handler.cr:45 [BR-websocket:001]","view":"overview","anchor":"br-websocket-001"},{"id":"BR-router:002","type":"fact","title":"Critical fact","text":"Request body size is capped TWO independent ways so a missing/lying Content-Length can't bypass the limit: validate content length! rejects an oversized declared length, and LimitedBodyIO/read body with limit enforce max request body size while streaming, raising PayloadTooLarge → 413. — src/kemal/param parser.cr:227 [BR-router:002]","view":"overview","anchor":"br-router-002"},{"id":"BR-handlers:001","type":"fact","title":"Critical fact","text":"The HTTP::Handler chain contract: a handler does work then calls call next(context) to advance; a handler that returns WITHOUT call next terminates the chain for that request (e.g. WebSocketHandler on a 403 reject, PathHandler on a prefix miss). RouteHandler::INSTANCE is the terminal link and raises RouteNotFound when no route matches. — src/kemal/handler.cr:35 [BR-handlers:001]","view":"overview","anchor":"br-handlers-001"},{"id":"BR-router:001","type":"fact","title":"Critical fact","text":"RouteHandler process request always cleans up per-request multipart temp files in an ensure block (context.params.cleanup temporary files), so a raising route handler never leaks FileUpload tempfiles; FileUpload's constructor also cleans up + re-raises on a copy failure. — src/kemal/route handler.cr:173 [BR-router:001]","view":"overview","anchor":"br-router-001"},{"id":"WF-core:001","type":"fact","title":"Critical fact","text":"System boot is one ordered call-chain in Kemal.run: CLI.new(args) parses ARGV into Config (aborts on missing SSL key/cert) → Kemal.config singleton → config.setup assembles the chain → (non-test) setup 404 + setup trap signal → server = HTTP::Server.new(config.handlers) → running=true → yield config → early-return if the block called Kemal.stop → bind tls/bind tcp → display startup message → server.listen (blocks; skipped when env==test). — src/kemal.cr:33 [WF-core:001]","view":"overview","anchor":"wf-core-001"},{"id":"BR-core:004","type":"fact","title":"Critical fact","text":"config.setup is idempotent-guarded (unless @default handlers setup && @router included), so repeated Kemal.run/mount calls do not double-insert the default chain. — src/kemal/config.cr:141 [BR-core:004]","view":"overview","anchor":"br-core-004"},{"id":"core","type":"component","title":"core","text":"Framework entry point + global run/stop lifecycle + the user-facing DSL baked into top-level scope. Owns the Config singleton that holds every option and assembles the ordered middleware chain. core Role. Framework entry point + global run/stop lifecycle + the user-facing DSL baked into top-level scope. Owns the Config singleton that holds every option and assembles the ordered middleware chain. Paths. src/kemal.cr · src/kemal/dsl.cr · src/kemal/config.cr · src/kemal/cli.cr · src/kemal/ssl.cr Entry point & boot sequence - Kemal.run is overloaded 4 ways (kemal.cr:13/18/23/33); the real body is at src/kemal.cr:33 — def self.run(port, args = ARGV, trap signal = true, &). - WF-core:001 — system boot is one ordered call-chain (background process). Kemal.run: (1) Kemal::CLI.new(args) parses ARGV into Config + configures SSL [kemal.cr:34, cli.cr:6-15]; (2) config = Kemal.config (the singleton); (3) config.setup assembles the ordered HANDLERS chain [config.cr:140]; (4) optional port override; (5) non-test only: setup 404 registers a default 404 handler unless present + setup trap signal installs Process.on terminate → Kemal.stop → exit [kemal.cr:41-43,95-109]; (6) server = config.server = HTTP::Server.new(config.handlers); (7) config.running = true then yield config to the user block; (8) early return if the block called Kemal.stop; (9) bind tls/bind tcp; (10) display startup message; (11) server.listen (blocks) unless env == test. — src/kemal.cr:33 Config singleton (process-global state) - BR-core:002 — no per-application isolation. Config::INSTANCE (config.cr:11) plus the class-level mutable constants HANDLERS/CUSTOM HANDLERS/FILTER HANDLERS/ERROR HANDLERS/EXCEPTION HANDLERS (config.cr:12-16) are process-global mutable state that the global-scope DSL, every Router, and every handler register into. Kemal.config returns that one instance (config.cr:209). Intentional Sinatra-style design, but tests/sub-apps share one registry. — src/kemal/config.cr:11 - BR-core:001 — fixed chain assembly order. config.setup (config.cr:140-154) builds the chain in fixed, position-counted order via @handler position: InitHandler → [RequestLogHandler if @logging] → HeadRequestHandler → [ExceptionHandler if @always rescue] → [StaticFileHandler if serve static is a Hash] → custom (use) handlers → filter handlers → WebSocketHandler::INSTANCE → RouteHandler::INSTANCE. The two terminal handlers are always appended LAST (config.cr:151-152); custom handlers always sit between the built-ins and the terminal Route/WS handlers. — src/kemal/config.cr:140 - BR-core:004 — idempotent setup. Guarded by unless @default handlers setup && @router included, so repeated Kemal.run/mount does not double-insert the default chain; @handler position monotonically advances within a single setup to preserve insertion order. — src/kemal/config.cr:141 - Config.clear (config.cr:80-94) resets all flags AND clears the 5 shared handler collections — the test-reset / re-init seam; handlers= (config.cr:100-103) calls clear then replaces. — src/kemal/config.cr:80 - VERSION (config.cr:2) is resolved at COMPILE time by shelling out shards version — a build-time macro, not a runtime read. — src/kemal/config.cr:2 - Default legacy logger precedence: setup log handler uses @logger RequestLogHandler.new (config.cr:164), so a deprecated BaseLogHandler subclass still takes precedence when set. — src/kemal/config.cr:164 The DSL (global top-level scope) - dsl.cr is baked into GLOBAL top-level scope (not under Kemal::). get/post/put/patch/delete/options are macro-generated from HTTP METHODS (dsl.cr:12,28-33); each raises InvalidPathStartException unless the path starts with / and delegates to RouteHandler::INSTANCE.add route. before /after are macro-generated over FILTER METHODS (incl. all) × [before, after] (dsl.cr:123-135). — src/kemal/dsl.cr:28 - use() is overloaded (dsl.cr:143-181): plain handler → config.add handler; with position; with a path prefix → wraps in Kemal::PathHandler.new(path, handler); with a path + Enumerable of handlers. mount(router) calls register routes; mount(path, router) prefixes. — src/kemal/dsl.cr:143 - sse routes are GET routes whose handler wraps EventStream.serve (dsl.cr:63-68) — SSE is not a separate transport at the routing layer; it reuses RouteHandler. — src/kemal/dsl.cr:63 CLI & SSL - CLI (cli.cr) parses ARGV via OptionParser into Config (-b/--bind, -p/--port, -s/--ssl, --ssl-key-file, --ssl-cert-file, -h); --help calls exit 0; @config.extra options.try &.call(opts) lets apps inject options (cli.cr:38). configure ssl ABORTS the process if --ssl is set but key/cert is missing (cli.cr:45-46). — src/kemal/cli.cr:42 - SSL (ssl.cr) is a thin wrapper over OpenSSL::SSL::Context::Server; key file=/cert file= set private key/certificate chain. — src/kemal/ssl.cr:1 Cross-component edges - core → handlers/router/websocket: config.setup appends WebSocketHandler::INSTANCE and RouteHandler::INSTANCE (constant references resolved after the umbrella glob load). - DSL get/ws/sse → router/websocket: delegate to the RouteHandler/WebSocketHandler INSTANCE singletons. - DSL use() → handlers: wraps in PathHandler for the path-prefix form. Design rationale The Sinatra-style global DSL + process singleton is the deliberate ergonomic choice — get \"/\" { } at top level requires global mutable registries. See .ai/docs/decisions.md (ADR-0001, ADR-0002).","view":"component","target":"core","anchor":"c-core"},{"id":"ext","type":"component","title":"ext","text":"Standard-library monkey-patches (Crystal open-class extensions, NOT under the Kemal:: module ). Loaded by the separate require \"./kemal/ext/ \" glob (kemal.cr:6). ext Role. Standard-library monkey-patches (Crystal open-class extensions, NOT under the Kemal:: module ). Loaded by the separate require \"./kemal/ext/ \" glob (kemal.cr:6). Paths. src/kemal/ext/context.cr · src/kemal/ext/response.cr Context extension (the request lifecycle seam) - ext/context.cr REOPENS HTTP::Server::Context (stdlib, NOT under Kemal::) to bolt Kemal's request lifecycle onto the stdlib context: params (lazily builds ParamParser from the cached ws-or-http route lookup), route/websocket/route lookup/ws route lookup (cached via @cached route lookup/@cached ws route lookup, established in a macro finished block, context.cr:11-16), route found?/ws route found?, the typed @store session map with get/set/get?, status() (chainable), and json/html/xml/text response writers. — src/kemal/ext/context.cr:11 - The @store session map type is the compile-time Union of STORE MAPPINGS = [Nil, String, Int32, Int64, Float64, Bool] (context.cr:9); add context storage type (helpers/macros.cr:126) extends this list — store typing is a cross-file compile-time contract between ext and helpers. — src/kemal/ext/context.cr:9 - invalidate route cache (context.cr:52-60) clears the cached route lookup AND, if params were already built, re-resolves the route and pushes the new url params into the existing ParamParser via update url params — the seam OverrideMethodHandler relies on after rewriting request.method. — src/kemal/ext/context.cr:52 - redirect (context.cr:29-34) sets Location + status (default 302) and CLOSES the response by default (close: true) — the source of the BR-handlers:004 closed-response convention. — src/kemal/ext/context.cr:29 Response extension (legacy, compiled out on modern Crystal) - ext/response.cr REOPENS HTTP::Server::Response::Output but is GUARDED to no-op on Crystal ≥1.3.0 via {{ skip file if compare versions(...) }} (response.cr:3) — a legacy Content-Length fix (issue 627) compiled out on modern Crystal; effectively dead on any current toolchain. This is documented dead code, not drift (see .ai/docs/issues.md IF-4/IF-10 suppressions). — src/kemal/ext/response.cr:3 Cross-component edges - ext ← router/handlers/websocket: every handler reads context.params/context.route found?/context.ws route found? — this component is the lifecycle substrate they all share. - ext ↔ helpers: STORE MAPPINGS is defined here and extended by helpers/macros.cr add context storage type (compile-time union contract). - ext ← handlers: OverrideMethodHandler depends on invalidate route cache after rewriting request.method.","view":"component","target":"ext","anchor":"c-ext"},{"id":"handlers","type":"component","title":"handlers","text":"The HTTP::Handler middleware chain — the pipeline links assembled by config.cr:140-154. Each concrete middleware include HTTP::Handler and implements call/call next. handlers Role. The HTTP::Handler middleware chain — the pipeline links assembled by config.cr:140-154. Each concrete middleware include HTTP::Handler and implements call/call next. Paths. src/kemal/handler.cr · init handler.cr · exception handler.cr · head request handler.cr · override method handler.cr · path handler.cr · static file handler.cr · filter handler.cr · file upload.cr The chain contract - BR-handlers:001 — every middleware includes HTTP::Handler. The contract is: do work, then call call next(context) to advance; a handler that returns WITHOUT call next terminates the chain for that request (WebSocketHandler on a 403 reject; PathHandler on a prefix miss; StaticFileHandler serves-or-call next). RouteHandler::INSTANCE is the terminal link and raises RouteNotFound when no route matches. — src/kemal/handler.cr:35 - HandlerInterface (handler.cr:11) adds the only/exclude path-matching macros backed by per-class @@only routes tree/@@exclude routes tree Radix trees (handler.cr:14-17); Kemal::Handler is the base class that includes it (handler.cr:91-93). only match?/exclude match? are NOT applied automatically — handler.cr:44 notes the custom handler must call them. — src/kemal/handler.cr:11 Concrete middlewares - InitHandler (init handler.cr) seeds every response: X-Powered-By: Kemal (only if Kemal.config.powered by header?), defaults Content-Type to text/html if unset, stamps a Date header; inserted FIRST in the chain. — src/kemal/init handler.cr:11 - ExceptionHandler (exception handler.cr) is the central error funnel: call next wrapped in rescue clauses ordered RouteNotFound → 404, CustomException → its status code, PayloadTooLarge → 413 (or custom 413 handler), then a generic rescue ex : Exception, logs (Log.error, exception handler.cr:30), then a custom 500 handler or render 500 (verbosity off in production). — src/kemal/exception handler.cr:7 - BR-handlers:003 — match by declaration order (NOT inheritance). The generic fallback matches a registered exception handler by ORDER OF DECLARATION using ex.class \u003c= expected exception, deliberately NOT by nearest-inheritance: the first registered compatible handler wins. Documented in-code as intentional (exception handler.cr:22-23). — src/kemal/exception handler.cr:24 - BR-handlers:004 — never write to a closed response. Every render helper short-circuits with return if context.response.closed? (exception handler.cr:47,56,66), and redirect() closes the response by default. Convention: once closed, downstream handlers must not write. — src/kemal/exception handler.cr:47 - HeadRequestHandler swaps the response output for a private NullIO that COUNTS bytes without sending a body on HEAD requests, and on close sets Content-Length from the counted bytes (respecting RFC 7230: 304/204/1xx get no content-length). — src/kemal/head request handler.cr:36 - OverrideMethodHandler is OPT-IN (not in the default chain; doc at override method handler.cr:5-8). On a POST whose body method ∈ {PUT,PATCH,DELETE} it rewrites request.method and calls context.invalidate route cache; it CONSUMES params.body (documented caveat). — src/kemal/override method handler.cr:19 - PathHandler wraps another handler to run only for a path prefix; matches prefix? treats / or '' as match-all, exact match, or prefix-followed-by-/ — so /api matches /api and /api/... but NOT /apiv2 (path handler.cr:36-44). It rewires @handler.next = self.next before delegating (path handler.cr:25). — src/kemal/path handler.cr:36 - StaticFileHandler subclasses HTTP::StaticFileHandler and FORKS on Crystal version: Crystal ≥1.17.0 overrides directory index + serve file (deliberately opts OUT of content-range serving, static file handler.cr:29); older Crystal carries a full hand-rolled call() with NUL-byte rejection (static file handler.cr:55-58), redirect normalization, dir index/dir listing, 304 caching. — src/kemal/static file handler.cr:3 - FilterHandler dispatches before/after filters (see router doc + BR-handlers:002); global filters kept in @global filters, never in the radix @tree ( 757 fix); @exact filters is an O(1) hash cache over the tree (filter handler.cr:11). FilterHandler.call (filter handler.cr:41-58) raises CustomException when, after the before filters, an error handler is registered for the current status code (filters can short-circuit into the error path); on no route found it still runs before all (if a 404 handler exists) then call next. — src/kemal/filter handler.cr:11 - BR-handlers:002 — filter order + exactly-once. FilterHandler enforces before all → before x → X → after x → after all (filter handler.cr:40); global filters live in @global filters and NEVER enter the radix @tree, so a path lookup cannot match them twice — duplicate before all/after all execution is structurally impossible (the 757 fix this commit b73de3d carries). — src/kemal/filter handler.cr:40 - FileUpload streams an upload to a File.tempfile in its constructor; on a copy error it calls cleanup (close + delete) then re-raises (file upload.cr:13-19) — temp files are not leaked on failure. — src/kemal/file upload.cr:13 Cross-component edges - handlers ← core: assembled in fixed order by config.setup (BR-core:001). - ExceptionHandler ↔ router/helpers: rescues RouteNotFound/CustomException/PayloadTooLarge (defined in helpers/exceptions.cr); renders via templates.cr render 500. - FilterHandler ← router: Router register filters re-adds FilterHandler::INSTANCE defensively after Config.clear.","view":"component","target":"handlers","anchor":"c-handlers"},{"id":"helpers","type":"component","title":"helpers","text":"View/response helper layer baked into global scope + shared utilities + the exception hierarchy + ECR templating. helpers Role. View/response helper layer baked into global scope + shared utilities + the exception hierarchy + ECR templating. Paths. src/kemal/helpers/helpers.cr · macros.cr · templates.cr · exceptions.cr · exception page.cr · utils.cr Global helpers - helpers.cr defines GLOBAL top-level helpers (not under Kemal::): public folder, logging, serve static (Bool/Hash overloads), headers, send file, gzip, static headers — plus DEPRECATED add handler/log/logger (helpers.cr:18,37,81). gzip(status) installs HTTP::CompressHandler via use() (helpers.cr:284-286). — src/kemal/helpers/helpers.cr:18 - send file (helpers.cr:137-179) is the response-streaming workhorse: sets X-Content-Type-Options nosniff + Accept-Ranges bytes, honors a Range header via multipart() (helpers.cr:206-248, single 206 partial + multipart/byteranges), and gzip/deflate-compresses only when serve static['gzip']==true, filesize 860, the extension is a zip-type, and the client Accept-Encoding allows it (helpers.cr:161-176). The byte-slice overload writes data directly. — src/kemal/helpers/helpers.cr:137 Templating & rendering macros - macros.cr provides the ECR templating surface: content for/yield content (a CONTENT FOR BLOCKS global hash keyed by id), render(filename[,layout]) (ECR.embed/render), halt (overloaded — closes the response and next-es out of the route block), and add context storage type which PUSHes a type into HTTP::Server::Context::STORE MAPPINGS at compile time (macros.cr:126-128). — src/kemal/helpers/macros.cr:126 - templates.cr provides render 404 (a static HTML page) and render 500(context, exception, verbosity) which renders Kemal::ExceptionPage (dev, full trace) vs ExceptionPage.for production exception (terse) based on verbosity (templates.cr:24-36); exception page.cr subclasses the exception page shard and supplies Kemal branding. — src/kemal/helpers/templates.cr:24 Exception hierarchy & utils - Kemal::Exceptions (exceptions.cr) defines InvalidPathStartException / RouteNotFound / CustomException / PayloadTooLarge — all \u003c Exception; CustomException carries the context and a default 'Rendered error with {status}' message (exceptions.cr:16-18). — src/kemal/helpers/exceptions.cr:16 - BR-core:003 — leading-slash precondition (boundary rule). Every route/ws/sse/filter path MUST start with /; the DSL and Router validate via Utils.path starts with slash? and raise Kemal::Exceptions::InvalidPathStartException otherwise — enforced at registration time, not request time. — src/kemal/helpers/utils.cr:5 - Utils (utils.cr) holds ZIP TYPES (the compressible extension allow-list) + path starts with slash? (the leading-slash rule used by every route/ws/sse DSL) + zip types(path). — src/kemal/helpers/utils.cr:1 Cross-component edges - helpers → handlers: gzip installs HTTP::CompressHandler via use(); the exception classes are rescued by ExceptionHandler. - helpers → ext: add context storage type pushes into STORE MAPPINGS (defined in ext/context.cr) — a compile-time contract between helpers and ext. - helpers ← router/core DSL: path starts with slash? is the shared leading-slash gate.","view":"component","target":"helpers","anchor":"c-helpers"},{"id":"logging","type":"component","title":"logging","text":"Pluggable request-logging abstraction — deprecated in favor of stdlib Log . The default RequestLogHandler is the only non-deprecated implementation. logging Role. Pluggable request-logging abstraction — deprecated in favor of stdlib Log . The default RequestLogHandler is the only non-deprecated implementation. Paths. src/kemal/base log handler.cr · request log handler.cr · log handler.cr · null log handler.cr The abstraction & the default - BaseLogHandler (base log handler.cr) is the abstract interface (include HTTP::Handler; abstract call + write) every logger must inherit — but the whole abstraction is deprecated in favor of stdlib Log. — src/kemal/base log handler.cr:3 - RequestLogHandler (request log handler.cr) is the DEFAULT logger wired in by config.setup log handler (config.cr:161-168, only when @logging) — times call next via Time.measure and emits status/method/resource/elapsed through stdlib Log.info; elapsed text formats ms vs µs (request log handler.cr:13-18). — src/kemal/request log handler.cr:6 Legacy / no-op loggers (all @[Deprecated]) - LogHandler (log handler.cr) is the LEGACY @[Deprecated] STDOUT logger (same elapsed formatting, duplicated, log handler.cr:22-27). — src/kemal/log handler.cr:22 - NullLogHandler (null log handler.cr) is the @[Deprecated] Null-Object no-op returned by Config logger when no custom logger is set (config.cr:62-64). — src/kemal/null log handler.cr (via config.cr:62) - Config wires a custom legacy logger ahead of the default: setup log handler uses @logger RequestLogHandler.new (config.cr:164), so a deprecated BaseLogHandler subclass still takes precedence when set. — src/kemal/config.cr:164 Note (not drift — documented deprecation) The legacy loggers are correctly @[Deprecated]-annotated with the replacement named (\"Use standard library Log\"). The duplicated elapsed text in request log handler.cr:13 and log handler.cr:22 is same-LOGIC duplication with IDENTICAL behavior — see .ai/docs/issues.md (IF-6 suppression: same-logic, no divergent named value-set). Cross-component edges - logging ← core: config.setup log handler inserts RequestLogHandler second in the chain (right after InitHandler) when @logging is on. - logging → core: Config logger returns the NullLogHandler no-op default.","view":"component","target":"logging","anchor":"c-logging"},{"id":"router","type":"component","title":"router","text":"Route storage, matching and dispatch. The terminal RouteHandler middleware plus a file-local LRU cache over a Radix tree; the modular Router DSL; the Route record; and param parsing with body-size guards. router Role. Route storage, matching and dispatch. The terminal RouteHandler middleware plus a file-local LRU cache over a Radix tree; the modular Router DSL; the Route record; and param parsing with body-size guards. Paths. src/kemal/route handler.cr · src/kemal/router.cr · src/kemal/route.cr · src/kemal/param parser.cr RouteHandler (terminal middleware) - RouteHandler (route handler.cr:103, INSTANCE singleton) is the TERMINAL middleware (appended last). process request raises RouteNotFound unless route found?, returns early if the response is already closed, calls the matched handler, raises CustomException if an error handler is registered for the resulting status code (route handler.cr:166-167), prints content, and in an ensure always runs context.params.cleanup temporary files (route handler.cr:173-174). — src/kemal/route handler.cr:103 - BR-router:001 — terminal cleanup. RouteHandler process request always cleans up per-request multipart temp files in an ensure block, so a route handler that raises does not leak FileUpload tempfiles; FileUpload's constructor also cleans up + re-raises on a copy failure. — src/kemal/route handler.cr:173 - Routes live in a Radix::Tree(Route) keyed '/{METHOD}{path}' (route handler.cr:177). lookup route caches into a file-local LRUCache and is Mutex-synchronized for concurrent fibers (route handler.cr:118-119,136). HEAD requests with no HEAD route IMPLICITLY fall back to the GET handler , and the fallback is cached under the original HEAD key (route handler.cr:144-152). — src/kemal/route handler.cr:133 - LRUCache (route handler.cr:7-101) is a deliberately minimal, file-local O(1) doubly-linked-list + Hash LRU; capacity = Kemal.config.max route cache size (default 1024); intentionally not part of the public API. — src/kemal/route handler.cr:7 Router (modular DSL) - Router (router.cr) is the modular DSL: it ACCUMULATES route/filter/ws/sse/sub-router definitions into arrays at definition time and only flushes them into the global RouteHandler/WebSocketHandler/FilterHandler INSTANCEs in register routes (router.cr:201-240), invoked by mount; namespace builds a nested Router via with sub router yield (router.cr:168-172). — src/kemal/router.cr:201 - register routes recursively prefixes sub-routers (router.cr:236-239); join paths normalizes slashes (router.cr:323-329); validate path! enforces the leading-slash rule (router.cr:331-335); filters with path ' ' apply to all collected route paths, otherwise to paths equal-to-or-prefixed-by the filter path (router.cr:277-284). — src/kemal/router.cr:236 - register filters re-adds FilterHandler::INSTANCE to config if it was cleared between tests (router.cr:271-273) — defensive re-registration against Config.clear. — src/kemal/router.cr:271 - Route (route.cr) is a struct wrapping method/path/handler; the handler is normalized so a non-String block result becomes '' (route.cr:11-14) — the same normalization Router add route applies (router.cr:307-312). — src/kemal/route.cr:11 ParamParser & body-size guards - ParamParser lazily parses url/query/body/json/files via a macro-generated memoized accessor per PART (param parser.cr:124-134). — src/kemal/param parser.cr:124 - BR-router:002 — body-size double guard (security-adjacent). Body size is guarded TWO ways: validate content length! against max request body size, and read body with limit / the private LimitedBodyIO cap while streaming (raising PayloadTooLarge) so a lying/absent Content-Length can't bypass the limit (param parser.cr:50-55,227-234). Multipart fields use a separate max multipart form field size limit. — src/kemal/param parser.cr:227 - raw body is cached on first read and ONLY for url-encoded + JSON content types (param parser.cr:83-101) so multiple handlers can read the body without consuming the IO; multipart fields use a separate max multipart form field size limit (param parser.cr:180,236-237). — src/kemal/param parser.cr:83 - Multipart file fields whose name ends with '[]' accumulate into @all files (arrays); others into @files (param parser.cr:172-178). — src/kemal/param parser.cr:172 Cross-component edges - router → handlers: ExceptionHandler rescues the CustomException/RouteNotFound/PayloadTooLarge this component raises. - router → ext: process request reads context.params / context.route found? (the lifecycle methods bolted on in ext/context.cr). - router ← core/Router: Router register routes flushes into RouteHandler::INSTANCE.","view":"component","target":"router","anchor":"c-router"},{"id":"websocket","type":"component","title":"websocket","text":"Real-time transports: the WebSocketHandler middleware (with Origin allow-list enforcement), the WebSocket route wrapper, and Server-Sent Events (EventStream). websocket Role. Real-time transports: the WebSocketHandler middleware (with Origin allow-list enforcement), the WebSocket route wrapper, and Server-Sent Events (EventStream). Paths. src/kemal/websocket handler.cr · src/kemal/websocket.cr · src/kemal/event stream.cr WebSocketHandler & the Origin boundary - WebSocketHandler (websocket handler.cr:5, INSTANCE singleton) only engages when context.ws route found? AND the request is a genuine upgrade (Upgrade: websocket + Connection: Upgrade, case-insensitive, websocket handler.cr:38-43); otherwise it call nexts. — src/kemal/websocket handler.cr:5 - BR-websocket:001 — Origin allow-list (security-relevant boundary). When Kemal.config.websocket allowed origins is non-empty, a WebSocket upgrade is REJECTED (403 Forbidden) unless the request Origin (normalized to scheme://host[:port], default-port-stripped, lowercased; literal 'null' supported) matches an entry; an EMPTY allow-list disables the check (allow-all). This is the cross-site-WebSocket-hijacking boundary. — src/kemal/websocket handler.cr:45 - WS routes are stored in a Radix::Tree(WebSocket) under '/ws{path}'. NOTE the path-key asymmetry: add route builds the key via radix path('ws', path) = '/' + 'ws' + path (websocket handler.cr:30,34-36) while lookup ws route uses the literal '\"/ws\" + path' (websocket handler.cr:22) — both yield '/ws{path}', consistent but expressed two different ways. — src/kemal/websocket handler.cr:22 WebSocket route wrapper - WebSocket (websocket.cr) subclasses HTTP::WebSocketHandler and just stores path + the user proc; call delegates to super (the stdlib upgrade handshake). — src/kemal/websocket.cr:4 EventStream (Server-Sent Events) - EventStream (event stream.cr) implements SSE: setup headers sets Content-Type text/event-stream, Cache-Control no-cache, X-Accel-Buffering no, and Connection keep-alive unless already set (event stream.cr:45-52); send() splits multi-line data into separate data: lines and flushes (event stream.cr:18-28); comment() sends a keep-alive comment line. EventStream.serve is the entry used by the sse DSL. — src/kemal/event stream.cr:45 Cross-component edges - websocket ← core: config.setup appends WebSocketHandler::INSTANCE as the penultimate terminal link (before RouteHandler::INSTANCE). - websocket ← core DSL: sse routes (dsl.cr:63-68) wrap EventStream.serve as GET routes — SSE reuses RouteHandler, not a separate transport at the routing layer. - websocket → ext: reads context.ws route found? (bolted on in ext/context.cr).","view":"component","target":"websocket","anchor":"c-websocket"},{"id":"ADR-0001","type":"decision","title":"ADR-0001 · Process-global `Config` singleton + class-constant handler registries","text":"A Sinatra-style framework wants get \"/\" { ... } to work at top-level global scope with no app object to thread through. That requires a single, globally-reachable place to register routes, filters, handlers, and options. Make Config a process-wide singleton (Config::INSTANCE, config.cr:11) and hold the five handler collections (HANDLERS/CUSTOM HANDLERS/FILTER HANDLERS/ERROR HANDLERS/EXCEPTION HANDLERS) as class-level mutable constants the global DSL, every Router, and every handler mutate directly. It is the minimum machinery that lets the global DSL register into one shared registry; the in-code comment at config.cr:4-9 states \"It's a singleton\".","view":"decisions","anchor":"adr-0001"},{"id":"ADR-0002","type":"decision","title":"ADR-0002 · A fixed-order `HTTP::Handler` middleware chain with terminal handlers appended last","text":"Requests must flow through a predictable pipeline (init → logging → head → exceptions → static → custom → filters → routing) regardless of the order users call use/get. Composing on Crystal's stdlib HTTP::Handler gives the chain for free. config.setup (config.cr:140) assembles the chain in a FIXED, position-counted order via @handler position, and ALWAYS appends WebSocketHandler::INSTANCE then RouteHandler::INSTANCE last; custom (use) handlers always land between the built-ins and those terminal handlers. The terminal Route/WS handlers must see a request only after every cross-cutting concern (logging, exceptions, static files, filters) has had its turn; a registration-order chain would let a user accidentally place routing before exception handling.","view":"decisions","anchor":"adr-0002"},{"id":"ADR-0003","type":"decision","title":"ADR-0003 · Match exception handlers by declaration order, not nearest-inheritance","text":"When multiple registered handlers could rescue a raised exception (e.g. a base class and a subclass), the framework must pick one deterministically. The generic fallback iterates registered exception handlers in ORDER OF DECLARATION and takes the first whose expected type satisfies ex.class \u003c= expected exception (exception handler.cr:24) — explicitly NOT nearest-inheritance. Declaration order is predictable and user-controllable (register the most specific handler first); the in-code comment (exception handler.cr:22-23) documents this as intentional: \"Matches based on order of declaration rather than inheritance relationship\".","view":"decisions","anchor":"adr-0003"},{"id":"ADR-0004","type":"decision","title":"ADR-0004 · Keep global (`before_all`/`after_all`) filters out of the radix tree (the #757 fix)","text":"Global filters and path-scoped filters were both stored in the radix @tree, so a path lookup could match a global filter a second time, running before all/after all twice. Store global filters in a separate @global filters collection that NEVER enters the radix @tree (filter handler.cr:40), making duplicate before all/after all execution structurally impossible while preserving the invariant order before all → before x → X → after x → after all. Correctness — a filter that runs twice (e.g. an auth check, a counter) is a real bug; structural separation is more robust than a runtime dedup guard.","view":"decisions","anchor":"adr-0004"},{"id":"KL-architecture:001","type":"knowledge","title":"KL-architecture:001","text":"The whole src/kemal/ tree loads via three glob requires in the umbrella src/kemal.cr; files reference siblings by fully-qualified constants, not per-file imports — so there is NO module-import graph (the permitted+textual model).","view":"decisions","anchor":"kl-architecture-001"},{"id":"KL-preference:001","type":"knowledge","title":"KL-preference:001","text":"The DSL (dsl.cr) and the view helpers (helpers.cr) are deliberately baked into GLOBAL top-level scope, NOT under Kemal:: — the Sinatra ergonomic convention.","view":"decisions","anchor":"kl-preference-001"},{"id":"KL-learning:001","type":"knowledge","title":"KL-learning:001","text":"VERSION is resolved at COMPILE time by shelling out shards version (a macro), not read at runtime.","view":"decisions","anchor":"kl-learning-001"},{"id":"KL-architecture:002","type":"knowledge","title":"KL-architecture:002","text":"SSE is not a separate transport at the routing layer — sse routes are GET routes wrapping EventStream.serve, reusing RouteHandler.","view":"decisions","anchor":"kl-architecture-002"},{"id":"KL-learning:002","type":"knowledge","title":"KL-learning:002","text":"HEAD requests with no explicit HEAD route IMPLICITLY fall back to the GET handler, and the fallback is cached under the original HEAD key.","view":"decisions","anchor":"kl-learning-002"},{"id":"KL-mistake:001","type":"knowledge","title":"KL-mistake:001","text":"ext/response.cr is documented dead code on modern Crystal — {{ skip file if compare versions(...) }} compiles it out on Crystal ≥1.3.0 (a legacy issue- 627 Content-Length fix). Don't rely on it.","view":"decisions","anchor":"kl-mistake-001"},{"id":"KL-preference:002","type":"knowledge","title":"KL-preference:002","text":"The entire logging component (BaseLogHandler/LogHandler/NullLogHandler) is @[Deprecated] in favor of stdlib Log; only RequestLogHandler is the live default.","view":"decisions","anchor":"kl-preference-002"},{"id":"KL-integration:001","type":"knowledge","title":"KL-integration:001","text":"The @store session-map type union (STORE MAPPINGS, ext/context.cr:9) is extended at compile time by helpers/macros.cr add context storage type — a cross-file compile-time contract between ext and helpers.","view":"decisions","anchor":"kl-integration-001"},{"id":"IF-8","type":"suppression","title":"IF-8 suppression","text":"structurally inapplicable as an IMPORT cycle (permitted+textual model).","view":"issues","anchor":"suppressions"},{"id":"IF-3a","type":"suppression","title":"IF-3a suppression","text":"an EXPLICIT interface mediates the resource → below the bar.","view":"issues","anchor":"suppressions"},{"id":"IF-3a","type":"suppression","title":"IF-3a suppression","text":"intentional, documented singleton design + mediated access → below the bar.","view":"issues","anchor":"suppressions"},{"id":"IF-3a","type":"suppression","title":"IF-3a suppression","text":"a compile-time macro contract / documented extension API → below the bar.","view":"issues","anchor":"suppressions"},{"id":"IF-1","type":"suppression","title":"IF-1 suppression","text":"no rule to check inconsistency against → suppress (degrade-don't-false-flag).","view":"issues","anchor":"suppressions"},{"id":"IF-4","type":"suppression","title":"IF-4 suppression","text":"dual-citation impossible (no decision side) → suppress.","view":"issues","anchor":"suppressions"},{"id":"IF-6","type":"suppression","title":"IF-6 suppression","text":"no non-empty symmetric difference under a shared name → suppress.","view":"issues","anchor":"suppressions"},{"id":"IF-7c","type":"suppression","title":"IF-7c suppression","text":"predicate-FALSE (re-raise + error-as-value) → suppress.","view":"issues","anchor":"suppressions"},{"id":"IF-10","type":"suppression","title":"IF-10 suppression","text":"no literal-const indirection feeding a runtime if → suppress (config-as-compile-flag).","view":"issues","anchor":"suppressions"}],"manifest":{"schema_version":3,"deepinit_version":"2.0.0","run_id":"run-2026-06-13-kemal-e2e","generated":"2026-06-13T00:00:00Z","repo":{"name":"kemalcr/kemal","pinned_sha":"b73de3d8e6de97541866b6ecdc8c6ee1ef3eb747","source_root":"validation/_clones/kemal"},"components":{"core":{"doc":".ai/docs/components/core.md","files":["src/kemal.cr","src/kemal/dsl.cr","src/kemal/config.cr","src/kemal/cli.cr","src/kemal/ssl.cr"],"content_hash":"sha256:fafcf70b08e8c724944ec6909fa085a07fe716497d672a27e694cb303f6444e9","verified_at":"2026-06-13T00:00:00Z"},"handlers":{"doc":".ai/docs/components/handlers.md","files":["src/kemal/handler.cr","src/kemal/init_handler.cr","src/kemal/exception_handler.cr","src/kemal/head_request_handler.cr","src/kemal/override_method_handler.cr","src/kemal/path_handler.cr","src/kemal/static_file_handler.cr","src/kemal/filter_handler.cr","src/kemal/file_upload.cr"],"content_hash":"sha256:d6976ab275fb54d93e93ba82c834b31c4304e1b34b60d53d742737ce5efbcbaa","verified_at":"2026-06-13T00:00:00Z"},"router":{"doc":".ai/docs/components/router.md","files":["src/kemal/route_handler.cr","src/kemal/router.cr","src/kemal/route.cr","src/kemal/param_parser.cr"],"content_hash":"sha256:598fdeb2fd132e92df01d2145a794cc8be49e8c1493b09d67aa4a27ee4fc2418","verified_at":"2026         i++;

        pre.appendChild(cp); out.appendChild(pre); continue;

  function goResult(e){ $("#results").classList.remove("open"); $("#search").setAttribute("aria-expanded","false"); $("#search").value=""; location.hash="#"+(e.anchor||e.view||"overview"); }
  function moveSel(d){ if(!shown.length)return; selIdx=(selIdx+d+shown.length)%shown.length;
    document.querySelectorAll(".res").forEach(function(r,i){ r.setAttribute("aria-selected", i===selIdx?"true":"false"); if(i===selIdx){ r.scrollIntoView({block:"nearest"}); $("#search").setAttribute("aria-activedescendant","res-"+i);} }); }
  var debTimer; function debounce(fn,ms){ return function(){ clearTimeout(debTimer); var a=arguments,th=this; debTimer=setTimeout(function(){fn.apply(th,a);},ms); }; }
  var doSearch=debounce(function(){ runSearch($("#search").value); },140);
  $("#search").addEventListener("input",doSearch);
  $("#search").addEventListener("keydown",function(e){
    if(e.key==="ArrowDown"){ e.preventDefault(); moveSel(1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); moveSel(-1); }
    else if(e.key==="Enter"){ if(selIdx>=0&&shown[selIdx]){ e.preventDefault(); goResult(shown[selIdx]); } }
    else if(e.key==="Escape"){ $("#results").classList.remove("open"); $("#search").blur(); }
  });
  document.addEventListener("click",function(e){ if(!e.target.closest(".searchwrap")) $("#results").classList.remove("open"); });

  // ===================================================================
  // Keyboard + theme + dialog
  // ===================================================================
  document.addEventListener("keydown",function(e){
    var inField=/^(INPUT|TEXTAREA|SELECT)$/.test((e.target||{}).tagName);
    if(e.key==="/"&&!inField){ e.preventDefault(); $("#search").focus(); }
    else if(e.key==="?"&&!inField){ e.preventDefault(); $("#shortcuts").showModal(); }
    else if(e.key==="Escape"){ var d=$("#shortcuts"); if(d.open)d.close(); }
  });
  $("#helpbtn").addEventListener("click",function(){ $("#shortcuts").showModal(); });
  $("#themebtn").addEventListener("click",function(){
    var cur=document.documentElement.dataset.theme||"auto";
    var next=cur==="dark"?"light":(cur==="light"?"auto":"dark");
    document.documentElement.dataset.theme=next; try{ localStorage.setItem("deepinit-viewer-theme",next); }catch(e){} });

  // ===================================================================
  // boot
  // ===================================================================
  var pj=DATA.project||{};
  $("#brandname").textContent = pj.name ? " · "+pj.name : "";
  if(pj.repo_sha){ var rp=$("#reporepo"); rp.hidden=false; rp.textContent=(pj.name||"repo")+" @ "+pj.repo_sha.slice(0,10); }
  $("#genbanner").textContent="Generated artifact — regenerated on each DeepInit run; edits here are not preserved. "+(pj.generated?("Generated "+pj.generated+". "):"")+"Report-only · 100% local · self-contained (no network).";
  var ft=el("span"); ft.textContent="DeepInit docs viewer"+(pj.deepinit_version?(" · engine "+pj.deepinit_version):"")+(pj.run_id?(" · run "+pj.run_id):"")+" — grounded, verified context for coding agents. Every claim cites a file:line.";
  $("#footer").appendChild(ft);
  buildRail();
  navigate();
})();
</script>
</body>
</html>
