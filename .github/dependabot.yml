# Dependabot — automated dependency PRs.
#
# Place this file at: .github/dependabot.yml
#
# Two ecosystems are configured by default:
#   - npm        — your application/library dependencies
#   - github-actions — pinned action SHAs in .github/workflows/*.yml
#
# The github-actions ecosystem is critical when all your workflows are
# SHA-pinned (as oss-kit recommends): Dependabot will open PRs that bump
# both the SHA and the trailing `# vX.Y.Z` comment, so you stay current
# without losing the audit trail.
#
# Cost: Free on all repos (public and private).

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
