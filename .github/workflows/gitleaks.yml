# Server-side secret scanning (defense-in-depth complement to the client-side
# commit-guard.sh + secret-scan.sh hooks shipped by this plugin).
#
# Uses the gitleaks CLI directly (MIT-licensed, free for everyone) rather than the
# gitleaks-ACTION, which requires a paid GITLEAKS_LICENSE for ORGANIZATION-owned
# repositories — even public ones. The CLI reads .gitleaks.toml and scans full history.

name: gitleaks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Scan git history for secrets
        run: ./gitleaks detect --no-banner --redact --exit-code 1
