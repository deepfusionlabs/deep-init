# Server-side secret scanning (defense-in-depth complement to the
# client-side commit-guard.sh + secret-scan.sh hooks shipped by this plugin).
#
# NOTE on licensing:
#   - Public repositories: gitleaks-action runs for free, no license required.
#   - Private repositories owned by a GitHub organization: a GITLEAKS_LICENSE
#     secret (org-level or repo-level) is required. The guard below skips the
#     job on private repos when the license secret is missing so the workflow
#     does not fail noisily.
#   - Personal private repos: same — set GITLEAKS_LICENSE or accept the skip.
# See: https://github.com/gitleaks/gitleaks-action#-license

name: gitleaks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    # Always run on public repos; on private repos only run when a license is configured.
    if: ${{ github.event.repository.private == false || vars.GITLEAKS_LICENSE_CONFIGURED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
