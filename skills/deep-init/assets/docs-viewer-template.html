<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
<title>DeepInit · Documentation Viewer</title>
<!--
  DeepInit docs-navigation viewer (M7-7) — a self-contained, OFFLINE, vanilla-JS
  static DOCS READER over DeepInit's generated AGENTS.md + .ai/docs output.
  Generated artifact: regenerated every run, NOT an owned-region merge — do not
  hand-edit (your edits will be overwritten). Report-only · 100% local.
  Self-contained: vanilla JS + inline CSS, no remote/content-delivery hosts, no
  network, no external src|href, no XHR (opens from file://). License-clean —
  vendored nothing;
  the renderer/search/tree/markdown are all first-party. (dashboard AF-6 discipline;
  harness §43.) This is a docs READER, not a graph explorer (DeepMap, S-8) and is a
  SEPARATE artifact from the issue dashboard.
-->
<style>
:root{
  --bg:#fbfcfd; --bg-rail:#f3f5f8; --bg-card:#ffffff; --bg-code:#f3f5f8; --bg-inset:#eef1f5;
  --fg:#1b2330; --fg-soft:#54637a; --fg-faint:#8593a8; --border:#dde3ec; --border-soft:#e8edf3;
  --accent:#2563c9; --accent-soft:#e7f0fd; --accent-fg:#1d4fa0;
  --crit:#c0223b; --high:#d6612a; --med:#b8860b; --low:#5b6b86; --ok:#1f9d6b;
  --pill-high:#1f9d6b; --pill-med:#b8860b; --pill-low:#8593a8;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 2px 8px rgba(20,30,50,.05);
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --rail-l:17rem; --rail-r:15rem; --maxprose:74ch;
}
@media (prefers-color-scheme:dark){:root[data-theme="auto"]{
  --bg:#0f1419; --bg-rail:#141a22; --bg-card:#161d27; --bg-code:#1b232f; --bg-inset:#1b232f;
  --fg:#e6ebf2; --fg-soft:#9fb0c6; --fg-faint:#6c7c93; --border:#27313f; --border-soft:#212a36;
  --accent:#5b9bf2; --accent-soft:#16263e; --accent-fg:#8fbcf7;
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#7d8da3; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#7d8da3;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25);
}}
:root[data-theme="dark"]{
  --bg:#0f1419; --bg-rail:#141a22; --bg-card:#161d27; --bg-code:#1b232f; --bg-inset:#1b232f;
  --fg:#e6ebf2; --fg-soft:#9fb0c6; --fg-faint:#6c7c93; --border:#27313f; --border-soft:#212a36;
  --accent:#5b9bf2; --accent-soft:#16263e; --accent-fg:#8fbcf7;
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#7d8da3; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#7d8da3;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans);
  font-size:clamp(.95rem,.9rem+.2vw,1.02rem);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
.skip{position:absolute;left:-999px;top:0;background:var(--accent);color:#fff;padding:.5rem .9rem;z-index:50;border-radius:0 0 6px 0}
.skip:focus{left:0}

/* layout */
header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:1rem;
  padding:.55rem 1.1rem;background:var(--bg-rail);border-bottom:1px solid var(--border);backdrop-filter:saturate(1.1) blur(4px)}
.brand{display:flex;align-items:center;gap:.55rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.brand .logo{width:1.45rem;height:1.45rem;flex:0 0 auto;color:var(--accent)}
.brand .sub{font-weight:500;color:var(--fg-faint);font-size:.8rem}
.repo{font-family:var(--mono);font-size:.76rem;color:var(--fg-soft);background:var(--bg-inset);
  padding:.18rem .5rem;border-radius:5px;border:1px solid var(--border-soft);white-space:nowrap}
.spacer{flex:1 1 auto}
.searchwrap{position:relative;width:min(34vw,22rem)}
#search{width:100%;padding:.42rem .7rem .42rem 2rem;border:1px solid var(--border);border-radius:8px;
  background:var(--bg-card);color:var(--fg);font-size:.85rem;font-family:var(--sans)}
#search::placeholder{color:var(--fg-faint)}
.searchwrap .si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--fg-faint);width:1rem;height:1rem;pointer-events:none}
.kbd{font-family:var(--mono);font-size:.7rem;color:var(--fg-faint);border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:.02rem .3rem;background:var(--bg-card)}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:8px;cursor:pointer;transition:background-color .15s,color .15s}
.iconbtn:hover{background:var(--accent-soft);color:var(--accent-fg)}
.iconbtn svg{width:1.05rem;height:1.05rem}

#results{position:absolute;top:2.4rem;left:0;right:0;max-height:62vh;overflow:auto;background:var(--bg-card);
  border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:40;display:none;padding:.3rem}
#results.open{display:block}
.res{display:block;padding:.4rem .55rem;border-radius:7px;cursor:pointer}
.res[aria-selected="true"],.res:hover{background:var(--accent-soft)}
.res .rt{font-size:.82rem;font-weight:600}
.res .rk{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);margin-left:.4rem}
.res .rx{font-size:.76rem;color:var(--fg-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res mark{background:transparent;color:var(--accent-fg);font-weight:700}

.shell{display:grid;grid-template-columns:var(--rail-l) minmax(0,1fr) var(--rail-r);gap:0;align-items:start}
nav.rail{position:sticky;top:3.1rem;height:calc(100vh - 3.1rem);overflow:auto;padding:1rem .7rem 2rem;
  background:var(--bg-rail);border-right:1px solid var(--border)}
aside.toc{position:sticky;top:3.1rem;height:calc(100vh - 3.1rem);overflow:auto;padding:1.2rem .9rem 2rem;font-size:.82rem}
main{min-width:0;padding:1.6rem clamp(1rem,3vw,2.6rem) 5rem}
.prose{max-width:var(--maxprose)}

/* nav rail */
.navsec{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint);margin:1.1rem .4rem .3rem;font-weight:700}
.navlink{display:flex;align-items:center;gap:.5rem;padding:.34rem .55rem;border-radius:7px;color:var(--fg-soft);
  cursor:pointer;font-size:.86rem;font-weight:500;transition:background-color .12s,color .12s}
.navlink:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.navlink[aria-current="page"]{background:var(--accent-soft);color:var(--accent-fg);font-weight:650}
.navlink .ni{display:inline-flex;align-items:center;justify-content:center;width:1.1rem;flex:0 0 auto;color:var(--fg-faint);font-size:.8rem}
.navlink[aria-current="page"] .ni{color:var(--accent)}
.navlink .ct{margin-left:auto;font-size:.7rem;color:var(--fg-faint);font-family:var(--mono)}
.tree{margin:.1rem 0 0}
.tree .navlink{padding-left:1.7rem;font-weight:450}

/* TOC */
.toc .th{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fg-faint);font-weight:700;margin-bottom:.5rem}
.toc a{display:block;padding:.16rem 0 .16rem .65rem;color:var(--fg-soft);border-left:2px solid var(--border-soft);font-size:.8rem;line-height:1.4}
.toc a:hover{color:var(--accent-fg);text-decoration:none}
.toc a[aria-current="true"]{color:var(--accent-fg);border-left-color:var(--accent);font-weight:600}
.toc a.h3{padding-left:1.35rem;font-size:.76rem}

/* content */
h1.page{font-size:1.7rem;letter-spacing:-.02em;margin:.2rem 0 .35rem}
.tagline{color:var(--fg-soft);font-size:1.02rem;margin:0 0 1.3rem;max-width:var(--maxprose)}
.metarow{display:flex;flex-wrap:wrap;gap:.5rem;margin:0 0 1.5rem}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:9px;padding:.5rem .8rem;min-width:5.2rem}
.stat .n{font-size:1.25rem;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.stat .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);margin-top:.1rem}
main h2{font-size:1.22rem;letter-spacing:-.01em;margin:2.2rem 0 .7rem;padding-bottom:.3rem;border-bottom:1px solid var(--border-soft);scroll-margin-top:4.2rem}
main h3{font-size:1.02rem;margin:1.5rem 0 .5rem;scroll-margin-top:4.2rem}
main h4{font-size:.92rem;margin:1.1rem 0 .4rem;color:var(--fg-soft);scroll-margin-top:4.2rem}
.headerlink{opacity:0;margin-left:.4rem;color:var(--fg-faint);font-weight:400;text-decoration:none;font-size:.85em}
h2:hover .headerlink,h3:hover .headerlink,h4:hover .headerlink{opacity:1}
main p{max-width:var(--maxprose)}
main ul,main ol{max-width:var(--maxprose);padding-left:1.3rem}
main li{margin:.25rem 0}
main code{font-family:var(--mono);font-size:.85em;background:var(--bg-code);padding:.08rem .35rem;border-radius:4px;border:1px solid var(--border-soft)}
main pre{position:relative;background:var(--bg-code);border:1px solid var(--border);border-radius:9px;padding:.85rem 1rem;overflow:auto;max-width:var(--maxprose)}
main pre code{background:none;border:none;padding:0;font-size:.84em;line-height:1.5}
.copybtn{position:absolute;top:.45rem;right:.45rem;font-size:.68rem;padding:.15rem .45rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copybtn{opacity:1}
blockquote{margin:.8rem 0;padding:.2rem 0 .2rem 1rem;border-left:3px solid var(--border);color:var(--fg-soft);max-width:var(--maxprose)}
table.md{border-collapse:collapse;margin:.9rem 0;font-size:.85rem;display:block;overflow:auto;max-width:100%}
table.md th,table.md td{border:1px solid var(--border);padding:.4rem .6rem;text-align:left;vertical-align:top}
table.md th{background:var(--bg-inset);font-weight:650}
hr{border:none;border-top:1px solid var(--border);margin:1.6rem 0}

/* chips, pills, citations */
.cite{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.74rem;
  background:var(--bg-inset);border:1px solid var(--border-soft);border-radius:5px;padding:.05rem .35rem;cursor:pointer;color:var(--fg-soft);transition:background-color .12s}
.cite:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.cite .ci{width:.8rem;height:.8rem;opacity:.7}
.xref{font-family:var(--mono);font-size:.82em;color:var(--accent-fg);background:var(--accent-soft);padding:.02rem .3rem;border-radius:4px}
a.xref:hover{text-decoration:none;filter:brightness(.95)}
.pill{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.02em;padding:.08rem .42rem;border-radius:20px;vertical-align:middle}
.pill.high{background:color-mix(in srgb,var(--pill-high) 18%,transparent);color:var(--pill-high)}
.pill.medium{background:color-mix(in srgb,var(--pill-med) 18%,transparent);color:var(--pill-med)}
.pill.low{background:color-mix(in srgb,var(--pill-low) 20%,transparent);color:var(--pill-low)}
.pill.sev-critical{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}
.pill.sev-high{background:color-mix(in srgb,var(--high) 16%,transparent);color:var(--high)}
.pill.sev-medium{background:color-mix(in srgb,var(--med) 18%,transparent);color:var(--med)}
.pill.sev-low{background:color-mix(in srgb,var(--low) 20%,transparent);color:var(--low)}
.badge{display:inline-block;font-size:.7rem;font-weight:600;padding:.1rem .5rem;border-radius:6px;background:var(--bg-inset);color:var(--fg-soft);border:1px solid var(--border-soft)}

/* fact cards */
.fact{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;margin:.55rem 0;box-shadow:var(--shadow);scroll-margin-top:4.4rem}
.fact .ft{margin:0 0 .35rem}
.fact .fm{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}

/* component header */
.comphead{display:flex;flex-wrap:wrap;gap:.6rem;align-items:baseline;margin:.2rem 0 .3rem}
.filelist{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0 1rem}
.filelist .cite{cursor:pointer}
.edge{display:flex;gap:.5rem;align-items:baseline;padding:.3rem 0;border-bottom:1px solid var(--border-soft);font-size:.9rem}

/* ADR timeline */
.timeline{position:relative;margin:1rem 0 0;padding-left:1.6rem}
.timeline::before{content:"";position:absolute;left:.42rem;top:.4rem;bottom:.4rem;width:2px;background:var(--border)}
.adr{position:relative;margin:0 0 1rem}
.adr::before{content:"";position:absolute;left:-1.32rem;top:.45rem;width:.7rem;height:.7rem;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.adr summary{cursor:pointer;list-style:none;display:flex;flex-wrap:wrap;gap:.5rem;align-items:baseline;padding:.5rem .7rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow)}
.adr summary::-webkit-details-marker{display:none}
.adr summary:hover{border-color:var(--accent)}
.adr .at{font-weight:650}
.adr .aid{font-family:var(--mono);font-size:.78rem;color:var(--accent-fg)}
.adr[open] summary{border-radius:9px 9px 0 0;border-bottom:none}
.adr .body{border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:.3rem 1rem .8rem}
.kl{display:flex;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border-soft)}
.kl .kid{font-family:var(--mono);font-size:.74rem;color:var(--accent-fg);white-space:nowrap}
.callout{background:var(--accent-soft);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:.7rem 1rem;margin:1rem 0;color:var(--fg-soft);font-size:.9rem;max-width:var(--maxprose)}

/* issues */
.issbanner{display:flex;gap:.8rem;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.5rem 0 1.3rem;box-shadow:var(--shadow)}
.issbanner .big{font-size:1.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.supp{margin:.5rem 0}
.supp summary{cursor:pointer;display:flex;gap:.5rem;align-items:center;padding:.5rem .7rem;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;font-size:.9rem}
.supp summary:hover{border-color:var(--accent)}
.supp .body{padding:.4rem 1rem .7rem;color:var(--fg-soft);font-size:.88rem}
.fixtag{font-family:var(--mono);font-size:.72rem;color:var(--fg-faint)}

/* files index */
.fileitem{border-bottom:1px solid var(--border-soft);padding:.5rem 0}
.fileitem .fp{font-family:var(--mono);font-size:.84rem;font-weight:600}
.fileitem .fr{font-size:.78rem;color:var(--fg-soft);margin-top:.15rem}

.gen-banner{font-size:.72rem;color:var(--fg-faint);background:var(--bg-inset);border:1px dashed var(--border);
  border-radius:7px;padding:.45rem .7rem;margin:1.6rem 0 0;max-width:var(--maxprose)}
footer{padding:1.4rem clamp(1rem,3vw,2.6rem);color:var(--fg-faint);font-size:.76rem;border-top:1px solid var(--border-soft);margin-top:2rem}

dialog#shortcuts{border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;background:var(--bg-card);color:var(--fg);box-shadow:var(--shadow);max-width:24rem}
dialog#shortcuts::backdrop{background:rgba(10,15,25,.45)}
dialog#shortcuts h3{margin:.1rem 0 .8rem}
dialog#shortcuts dl{display:grid;grid-template-columns:auto 1fr;gap:.4rem .9rem;margin:0;font-size:.86rem}
dialog#shortcuts dt{text-align:right}

@media (max-width:1000px){.shell{grid-template-columns:var(--rail-l) minmax(0,1fr)}aside.toc{display:none}}
@media (max-width:720px){.shell{grid-template-columns:1fr}nav.rail{display:none}.searchwrap{width:auto;flex:1}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>

<script>
"use strict";
(function(){
  // ---- load the inert JSON island (never eval / never fetch) ----
  var DATA;
  try{ DATA = JSON.parse(document.getElementById("deepinit-data").textContent); }
  catch(e){ document.getElementById("content").textContent = "Could not parse embedded data."; return; }

  var $ = function(s,r){ return (r||document).querySelector(s); };
  var el = function(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; };
  var frag = function(){ return document.createDocumentFragment(); };

  // ===================================================================
  // Safe Markdown renderer — escape-first, createElement + textContent,
  // fixed element allowlist, URL-scheme allowlist. NEVER assigns payload
  // to innerHTML; never emits id/name from payload (DOM-clobber guard).
  // ===================================================================
  var SAFE_SCHEME = /^(https?:|mailto:|vscode:|#)/i;
  function safeHref(u){ u=(u||"").trim(); return SAFE_SCHEME.test(u) ? u : null; }

  // inline: walk an already-escaped-safe string, emit text + <code>/<strong>/<em>/<a>/.cite/.xref nodes
  var XREF = DATA.xref || {};
  var CITE_RE = /([A-Za-z0-9_./\-]+\.[A-Za-z0-9_]+:\d+(?:-\d+)?)/;
  var ID_RE = /\[?((?:BR|WF|IP|ADR|KL|ISS)-[A-Za-z0-9:_\-]+)\]?/;
  function inlineInto(parent, text){
    // tokenise on `code`, **bold**, *italic*, [text](url); the remainder runs through cite/xref linkers
    var re = /(`[^`]+`)|(\*\*[^*]+\*\*)|(\*[^*]+\*)|(\[[^\]]+\]\([^)]+\))/;
    while(text.length){
      var m = re.exec(text);
      if(!m){ citeXref(parent, text); break; }
      if(m.index>0) citeXref(parent, text.slice(0,m.index));
      var tok = m[0];
      if(m[1]){ parent.appendChild(el("code",null,tok.slice(1,-1))); }
      else if(m[2]){ parent.appendChild(el("strong",null,tok.slice(2,-2))); }

  // block-level: returns a DocumentFragment of allowed elements

    while(i<lines.length){

        var buf=[]; i++;
        while(i<lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;
        var pre=el("pre"), code=el("code",null,buf.join("\n")); pre.appendChild(code);
        var cp=el("button","copybtn","Copy"); cp.addEventListener("click",function(b,p){return function(){ copyText(b.join("\n"),p);};}(buf,cp));
        pre.appendChild(cp); out.appendChild(pre); continue;
      }
      var h=/^(#{1,4})\s+(.*)$/.exec(ln);
      if(h){ var lvl=h[1].length, tag="h"+Math.min(lvl+1,4); var hn=el(tag); inlineInto(hn,h[2]);

      }

  // ===================================================================
  // Search — debounced linear + subsequence fuzzy scoring
  // ===================================================================
  var IDX=DATA.search_index||[];
  function score(q, text, title){
    q=q.toLowerCase(); text=(text||"").toLowerCase(); title=(title||"").toLowerCase();
    if(title.indexOf(q)>=0) return 1000 - title.indexOf(q);
    var ti=text.indexOf(q); if(ti>=0) return 600 - Math.min(ti,400);
    // subsequence
    var qi=0; for(var i=0;i<text.length&&qi<q.length;i++){ if(text[i]===q[qi]) qi++; }
    return qi===q.length ? 100 : -1;
  }
  var selIdx=-1, shown=[];
  function runSearch(q){
    var box=$("#results"); box.textContent=""; selIdx=-1; shown=[];
    q=q.trim(); if(q.length<2){ box.classList.remove("open"); $("#search").setAttribute("aria-expanded","false"); return; }
    var scored=[]; IDX.forEach(function(e){ var s=score(q,e.text,e.title); if(s>0) scored.push([s,e]); });
    scored.sort(function(a,b){return b[0]-a[0];}); shown=scored.slice(0,12).map(function(x){return x[1];});
    if(!shown.length){ var n=el("div","res"); n.appendChild(el("span","rt","No matches")); box.appendChild(n); box.classList.add("open"); return; }
    shown.forEach(function(e,i){ var r=el("div","res"); r.setAttribute("role","option"); r.id="res-"+i; r.setAttribute("aria-selected","false");
      var top=el("div"); var t=el("span","rt",e.title); top.appendChild(t); top.appendChild(el("span","rk",e.type)); r.appendChild(top);
      var x=el("div","rx",e.text.slice(0,120)); r.appendChild(x);

  function moveSel(d){ if(!shown.length)return; selIdx=(selIdx+d+shown.length)%shown.length;

    else if(e.key==="Escape"){ $("#results").classList.remove("open"); $("#search").blur(); }
  });
  document.addEventListener("click",function(e){ if(!e.target.closest(".searchwrap")) $("#results").classList.remove("open"); });

  // ===================================================================
  // Keyboard + theme + dialog
  // ===================================================================
  document.addEventListener("keydown",function(e){
    var inField=/^(INPUT|TEXTAREA|SELECT)$/.test((e.target||{}).tagName);
    if(e.key==="/"&&!inField){ e.preventDefault(); $("#search").focus(); }
    else if(e.key==="?"&&!inField){ e.preventDefault(); $("#shortcuts").showModal(); }
    else if(e.key==="Escape"){ var d=$("#shortcuts"); if(d.open)d.close(); }
  });
  $("#helpbtn").addEventListener("click",function(){ $("#shortcuts").showModal(); });
  $("#themebtn").addEventListener("click",function(){
    var cur=document.documentElement.dataset.theme||"auto";
    var next=cur==="dark"?"light":(cur==="light"?"auto":"dark");
    document.documentElement.dataset.theme=next; try{ localStorage.setItem("deepinit-viewer-theme",next); }catch(e){} });

  // ===================================================================
  // boot
  // ===================================================================
  var pj=DATA.project||{};
  $("#brandname").textContent = pj.name ? " · "+pj.name : "";
  if(pj.repo_sha){ var rp=$("#reporepo"); rp.hidden=false; rp.textContent=(pj.name||"repo")+" @ "+pj.repo_sha.slice(0,10); }
  $("#genbanner").textContent="Generated artifact — regenerated on each DeepInit run; edits here are not preserved. "+(pj.generated?("Generated "+pj.generated+". "):"")+"Report-only · 100% local · self-contained (no network).";
  var ft=el("span"); ft.textContent="DeepInit docs viewer"+(pj.deepinit_version?(" · engine "+pj.deepinit_version):"")+(pj.run_id?(" · run "+pj.run_id):"")+" — grounded, verified context for coding agents. Every claim cites a file:line.";
  $("#footer").appendChild(ft);
  buildRail();
  navigate();
})();
</script>
</body>
</html>
