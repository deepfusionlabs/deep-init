<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
<title>DeepInit Report</title>
<!--
  DeepInit docs-navigation viewer (M7-7) — a self-contained, OFFLINE, vanilla-JS
  static DOCS READER over DeepInit's generated AGENTS.md + .ai/docs output.
  Generated artifact: regenerated every run, NOT an owned-region merge — do not
  hand-edit (your edits will be overwritten). Report-only · 100% local.
  Self-contained: vanilla JS + inline CSS, no remote/content-delivery hosts, no
  network, no external src|href, no XHR (opens from file://). License-clean —
  vendored nothing;
  the renderer/search/tree/markdown are all first-party. (dashboard AF-6 discipline;
  harness §43.) This is a docs READER, not a graph explorer (DeepMap, S-8) and is a
  SEPARATE artifact from the issue dashboard.
-->
<style>
/* ---- DeepFusion Labs brand system (navy + lime). Light: white/navy text,
   readable blue links, lime accents/fills. Dark: navy #070E1B hero + lime #C4E934.
   System fonts only (no embedded/CDN font — license-clean, offline). ---- */
:root{
  --bg:#ffffff; --bg-rail:#f6f8fc; --bg-card:#ffffff; --bg-code:#f6f8fc; --bg-inset:#eef1f6;
  --fg:#0f2240; --fg-soft:#4a5568; --fg-faint:#8896ab; --border:#e3e8f0; --border-soft:#eef1f6;
  --accent:#2257b8; --accent-soft:#eaf0fb; --accent-fg:#1d4fa0;
  --brand:#c4e934; --brand-deep:#a8cc1e; --brand-ink:#0f2240; --brand-soft:rgba(196,233,52,.20); --brand-glow:rgba(196,233,52,.5);
  --navy:#070e1b;
  --crit:#c0223b; --high:#d6612a; --med:#b8860b; --low:#5b6b86; --ok:#1f9d6b;
  --pill-high:#1f9d6b; --pill-med:#b8860b; --pill-low:#8593a8;
  --shadow:0 1px 2px rgba(15,34,64,.05),0 4px 22px rgba(15,34,64,.07);
  --shadow-lg:0 14px 44px rgba(15,34,64,.14);
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --rail-l:17rem; --rail-r:15rem; --maxprose:74ch;
  --radius:14px; --radius-sm:9px; --radius-xs:6px; --ease:cubic-bezier(.16,1,.3,1);
}
@media (prefers-color-scheme:dark){:root[data-theme="auto"]{
  --bg:#070e1b; --bg-rail:#0b1a30; --bg-card:#0f2240; --bg-code:#0b1a30; --bg-inset:#0b1a30;
  --fg:#e3eaf4; --fg-soft:#a9b8ce; --fg-faint:#7d8faa; --border:#1c2c44; --border-soft:#15233a;
  --accent:#c4e934; --accent-soft:rgba(196,233,52,.14); --accent-fg:#c4e934;
  --brand:#c4e934; --brand-deep:#a8cc1e; --brand-ink:#070e1b; --brand-soft:rgba(196,233,52,.16); --brand-glow:rgba(196,233,52,.42);
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#9db0c8; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#9db0c8;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 18px 50px rgba(0,0,0,.45);
}}
:root[data-theme="dark"]{
  --bg:#070e1b; --bg-rail:#0b1a30; --bg-card:#0f2240; --bg-code:#0b1a30; --bg-inset:#0b1a30;
  --fg:#e3eaf4; --fg-soft:#a9b8ce; --fg-faint:#7d8faa; --border:#1c2c44; --border-soft:#15233a;
  --accent:#c4e934; --accent-soft:rgba(196,233,52,.14); --accent-fg:#c4e934;
  --brand:#c4e934; --brand-deep:#a8cc1e; --brand-ink:#070e1b; --brand-soft:rgba(196,233,52,.16); --brand-glow:rgba(196,233,52,.42);
  --crit:#f0637a; --high:#ef9152; --med:#e0b341; --low:#9db0c8; --ok:#48c897;
  --pill-high:#48c897; --pill-med:#e0b341; --pill-low:#9db0c8;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 18px 50px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans);
  font-size:clamp(.95rem,.9rem+.2vw,1.02rem);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
/* hide OFF THE TOP (not left:-999px) — a physical-left offset overflows horizontally and, in an RTL document, scroll-anchors the viewport and shifts full-bleed views like the Map */
.skip{position:absolute;inset-inline-start:0;top:-3rem;background:var(--accent);color:#fff;padding:.5rem .9rem;z-index:50;border-radius:0 0 6px 0;transition:top .15s}
.skip:focus{top:0}

/* layout */
header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:.85rem;height:3.6rem;
  padding:0 1.2rem;background:color-mix(in srgb,var(--bg-rail) 90%,transparent);border-bottom:1px solid var(--border);
  backdrop-filter:saturate(1.3) blur(12px);-webkit-backdrop-filter:saturate(1.3) blur(12px)}
.brand{display:flex;align-items:center;gap:.55rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.brand .logo{width:1.45rem;height:1.45rem;flex:0 0 auto;color:var(--accent)}
.brand .sub{font-weight:500;color:var(--fg-faint);font-size:.8rem}
.repo{font-family:var(--mono);font-size:.76rem;color:var(--fg-soft);background:var(--bg-inset);
  padding:.18rem .5rem;border-radius:5px;border:1px solid var(--border-soft);white-space:nowrap}
.spacer{flex:1 1 auto}
.searchwrap{position:relative;width:min(34vw,22rem)}
#search{width:100%;padding:.42rem .7rem .42rem 2rem;border:1px solid var(--border);border-radius:8px;
  background:var(--bg-card);color:var(--fg);font-size:.85rem;font-family:var(--sans)}
#search::placeholder{color:var(--fg-faint)}
.searchwrap .si{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--fg-faint);width:1rem;height:1rem;pointer-events:none}
.kbd{font-family:var(--mono);font-size:.7rem;color:var(--fg-faint);border:1px solid var(--border);border-bottom-width:2px;border-radius:4px;padding:.02rem .3rem;background:var(--bg-card)}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:8px;cursor:pointer;transition:background-color .15s,color .15s}
.iconbtn:hover{background:var(--accent-soft);color:var(--accent-fg)}
.iconbtn svg{width:1.05rem;height:1.05rem}

#results{position:absolute;top:2.4rem;left:0;right:0;max-height:62vh;overflow:auto;background:var(--bg-card);
  border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:40;display:none;padding:.3rem}
#results.open{display:block}
.res{display:block;padding:.4rem .55rem;border-radius:7px;cursor:pointer}
.res[aria-selected="true"],.res:hover{background:var(--accent-soft)}
.res .rt{font-size:.82rem;font-weight:600}
.res .rk{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);margin-left:.4rem}
.res .rx{font-size:.76rem;color:var(--fg-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res mark{background:transparent;color:var(--accent-fg);font-weight:700}

.shell{display:grid;grid-template-columns:var(--rail-l) minmax(0,1fr) var(--rail-r);gap:0;align-items:start}
nav.rail{position:sticky;top:3.6rem;height:calc(100vh - 3.6rem);overflow:auto;padding:.9rem .55rem 2rem;
  background:var(--bg-rail);border-right:1px solid var(--border)} /* rail */
aside.toc{position:sticky;top:3.6rem;height:calc(100vh - 3.6rem);overflow:auto;padding:1.2rem .9rem 2rem;font-size:.82rem}
main{min-width:0;padding:1.6rem clamp(1rem,3vw,2.6rem) 5rem}
.prose{max-width:var(--maxprose)}

/* nav rail */
.navsec{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--fg-faint);margin:1.35rem .65rem .4rem;font-weight:700}
.navlink{display:flex;align-items:center;gap:.6rem;padding:.4rem .65rem;border-radius:8px;color:var(--fg-soft);
  cursor:pointer;font-size:.86rem;font-weight:550;transition:background-color .12s,color .12s}
.navlink:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.navlink[aria-current="page"]{background:var(--accent-soft);color:var(--accent-fg);font-weight:700}
.navlink .ni{display:inline-flex;align-items:center;justify-content:center;width:1.15rem;height:1.15rem;flex:0 0 auto;color:var(--fg-faint)}
.navlink .ni svg{width:1.02rem;height:1.02rem}
.navlink:hover .ni,.navlink[aria-current="page"] .ni{color:var(--accent)}
.navlink .nl{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navlink .ct{margin-left:auto;font-size:.68rem;color:var(--fg-faint);font-family:var(--mono);font-variant-numeric:tabular-nums}
.tree{margin:.15rem 0 0}
.tree .navlink{padding-left:.65rem;font-weight:500}

/* TOC */
.toc .th{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--fg-faint);font-weight:700;margin:0 0 .55rem .75rem}
.toc a{display:block;padding:.2rem 0 .2rem .75rem;color:var(--fg-soft);border-left:2px solid var(--border-soft);font-size:.79rem;line-height:1.45;transition:color .12s,border-color .12s}
.toc a:hover{color:var(--accent-fg);border-left-color:var(--fg-faint);text-decoration:none}
.toc a[aria-current="true"]{color:var(--accent-fg);border-left-color:var(--accent);font-weight:650}
.toc a.h3{padding-left:1.45rem;font-size:.75rem}

/* content */
h1.page{font-size:1.7rem;letter-spacing:-.02em;margin:.2rem 0 .35rem}
.tagline{color:var(--fg-soft);font-size:1.02rem;margin:0 0 1.3rem;max-width:var(--maxprose)}
.metarow{display:flex;flex-wrap:wrap;gap:.5rem;margin:0 0 1.5rem}
.stat{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .85rem .6rem 1rem;min-width:5.4rem;box-shadow:var(--shadow);overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand)}
.stat .n{font-size:1.35rem;font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums}
.stat .l{font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-top:.15rem}
main h2{font-size:1.22rem;letter-spacing:-.01em;margin:2.2rem 0 .7rem;padding-bottom:.3rem;border-bottom:1px solid var(--border-soft);scroll-margin-top:4.8rem}
main h3{font-size:1.02rem;margin:1.5rem 0 .5rem;scroll-margin-top:4.8rem}
main h4{font-size:.92rem;margin:1.1rem 0 .4rem;color:var(--fg-soft);scroll-margin-top:4.8rem}
.headerlink{opacity:0;margin-left:.4rem;color:var(--fg-faint);font-weight:400;text-decoration:none;font-size:.85em}
h2:hover .headerlink,h3:hover .headerlink,h4:hover .headerlink{opacity:1}
main p{max-width:var(--maxprose)}
main ul,main ol{max-width:var(--maxprose);padding-left:1.3rem}
main li{margin:.25rem 0}
main code{font-family:var(--mono);font-size:.85em;background:var(--bg-code);padding:.08rem .35rem;border-radius:4px;border:1px solid var(--border-soft)}
main pre{position:relative;background:var(--bg-code);border:1px solid var(--border);border-radius:9px;padding:.85rem 1rem;overflow:auto;max-width:var(--maxprose)}
main pre code{background:none;border:none;padding:0;font-size:.84em;line-height:1.5}
.copybtn{position:absolute;top:.45rem;right:.45rem;font-size:.68rem;padding:.15rem .45rem;border:1px solid var(--border);
  background:var(--bg-card);color:var(--fg-soft);border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copybtn{opacity:1}
blockquote{margin:.8rem 0;padding:.2rem 0 .2rem 1rem;border-left:3px solid var(--border);color:var(--fg-soft);max-width:var(--maxprose)}
table.md{border-collapse:collapse;margin:.9rem 0;font-size:.85rem;display:block;overflow:auto;max-width:100%}
table.md th,table.md td{border:1px solid var(--border);padding:.4rem .6rem;text-align:left;vertical-align:top}
table.md th{background:var(--bg-inset);font-weight:650}
hr{border:none;border-top:1px solid var(--border);margin:1.6rem 0}

/* chips, pills, citations */
.cite{display:inline-flex;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.74rem;
  background:var(--bg-inset);border:1px solid var(--border-soft);border-radius:5px;padding:.05rem .35rem;cursor:pointer;color:var(--fg-soft);transition:background-color .12s}
.cite:hover{background:var(--accent-soft);color:var(--accent-fg);text-decoration:none}
.cite .ci{width:.8rem;height:.8rem;opacity:.7}
.xref{font-family:var(--mono);font-size:.82em;color:var(--accent-fg);background:var(--accent-soft);padding:.02rem .3rem;border-radius:4px}
a.xref:hover{text-decoration:none;filter:brightness(.95)}
.pill{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.02em;padding:.08rem .42rem;border-radius:20px;vertical-align:middle}
.pill.high{background:color-mix(in srgb,var(--pill-high) 18%,transparent);color:var(--pill-high)}
.pill.medium{background:color-mix(in srgb,var(--pill-med) 18%,transparent);color:var(--pill-med)}
.pill.low{background:color-mix(in srgb,var(--pill-low) 20%,transparent);color:var(--pill-low)}
.pill.sev-critical{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}
.pill.sev-high{background:color-mix(in srgb,var(--high) 16%,transparent);color:var(--high)}
.pill.sev-medium{background:color-mix(in srgb,var(--med) 18%,transparent);color:var(--med)}
.pill.sev-low{background:color-mix(in srgb,var(--low) 20%,transparent);color:var(--low)}
.badge{display:inline-block;font-size:.7rem;font-weight:600;padding:.1rem .5rem;border-radius:6px;background:var(--bg-inset);color:var(--fg-soft);border:1px solid var(--border-soft)}

/* fact cards */
.fact{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;margin:.55rem 0;box-shadow:var(--shadow);scroll-margin-top:4.4rem}
.fact .ft{margin:0 0 .35rem}
.fact .fm{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}

/* component header */
.comphead{display:flex;flex-wrap:wrap;gap:.6rem;align-items:baseline;margin:.2rem 0 .3rem}
.filelist{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0 1rem}
.filelist .cite{cursor:pointer}
.edge{display:flex;gap:.5rem;align-items:baseline;padding:.3rem 0;border-bottom:1px solid var(--border-soft);font-size:.9rem}

/* ADR timeline */
.timeline{position:relative;margin:1rem 0 0;padding-left:1.6rem}
.timeline::before{content:"";position:absolute;left:.42rem;top:.4rem;bottom:.4rem;width:2px;background:var(--border)}
.adr{position:relative;margin:0 0 1rem}
.adr::before{content:"";position:absolute;left:-1.32rem;top:.45rem;width:.7rem;height:.7rem;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.adr summary{cursor:pointer;list-style:none;display:flex;flex-wrap:wrap;gap:.5rem;align-items:baseline;padding:.5rem .7rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow)}
.adr summary::-webkit-details-marker{display:none}
.adr summary:hover{border-color:var(--accent)}
.adr .at{font-weight:650}
.adr .aid{font-family:var(--mono);font-size:.78rem;color:var(--accent-fg)}
.adr[open] summary{border-radius:9px 9px 0 0;border-bottom:none}
.adr .body{border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:.3rem 1rem .8rem}
.kl{display:flex;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border-soft)}
.kl .kid{font-family:var(--mono);font-size:.74rem;color:var(--accent-fg);white-space:nowrap}
.callout{background:var(--accent-soft);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:.7rem 1rem;margin:1rem 0;color:var(--fg-soft);font-size:.9rem;max-width:var(--maxprose)}

/* issues */
.issbanner{display:flex;gap:.8rem;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin:.5rem 0 1.3rem;box-shadow:var(--shadow)}
.issbanner .big{font-size:1.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.supp{margin:.5rem 0}
.supp summary{cursor:pointer;display:flex;gap:.5rem;align-items:center;padding:.5rem .7rem;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;font-size:.9rem}
.supp summary:hover{border-color:var(--accent)}
.supp .body{padding:.4rem 1rem .7rem;color:var(--fg-soft);font-size:.88rem}
.fixtag{font-family:var(--mono);font-size:.72rem;color:var(--fg-faint)}

/* files index */
.fileitem{border-bottom:1px solid var(--border-soft);padding:.5rem 0}
.fileitem .fp{font-family:var(--mono);font-size:.84rem;font-weight:600}
.fileitem .fr{font-size:.78rem;color:var(--fg-soft);margin-top:.15rem}

.gen-banner{font-size:.72rem;color:var(--fg-faint);background:var(--bg-inset);border:1px dashed var(--border);
  border-radius:7px;padding:.45rem .7rem;margin:1.6rem 0 0;max-width:var(--maxprose)}
footer{padding:1.4rem clamp(1rem,3vw,2.6rem);color:var(--fg-faint);font-size:.76rem;border-top:1px solid var(--border-soft);margin-top:2rem}

dialog#shortcuts{position:relative;border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;background:var(--bg-card);color:var(--fg);box-shadow:var(--shadow);max-width:24rem}
.dlg-x{position:absolute;top:.55rem;inset-inline-end:.7rem;width:1.8rem;height:1.8rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-inset);color:var(--fg-soft);font-size:.95rem;line-height:1;cursor:pointer;display:grid;place-items:center}
.dlg-x:hover{color:var(--fg);border-color:var(--fg-faint)}
.langsel{height:2rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--fg-soft);font:inherit;font-size:.82rem;padding:0 .4rem;cursor:pointer}
.langsel:hover{color:var(--fg);border-color:var(--fg-faint)}
dialog#shortcuts::backdrop{background:rgba(10,15,25,.45)}
dialog#shortcuts h3{margin:.1rem 0 .8rem}
dialog#shortcuts dl{display:grid;grid-template-columns:auto 1fr;gap:.4rem .9rem;margin:0;font-size:.86rem}
dialog#shortcuts dt{text-align:right}

@media (max-width:1000px){.shell{grid-template-columns:var(--rail-l) minmax(0,1fr)}aside.toc{display:none}}
@media (max-width:720px){.shell{grid-template-columns:1fr}nav.rail{display:none}.searchwrap{width:auto;flex:1}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important;animation:none!important}}

/* ===== Co-branded masthead (DeepFusion Labs) ===== */
.brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;white-space:nowrap;color:var(--fg)}
.brand:hover{text-decoration:none}
.brand .logo{width:1.85rem;height:1.85rem;flex:0 0 auto;border-radius:8px;box-shadow:0 1px 3px rgba(15,34,64,.22)}
.brandtext{display:flex;flex-direction:column;line-height:1.04}
.brandtext .bn{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
.brandtext .bsub{font-weight:600;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-faint)}
.footwrap{display:flex;align-items:center;gap:.75rem}
.footwrap svg{flex:0 0 auto;border-radius:6px;box-shadow:0 1px 3px rgba(15,34,64,.2)}
.footwrap .f1{font-weight:700;color:var(--fg);font-size:.85rem;letter-spacing:-.005em}
.footwrap .f2{color:var(--fg-faint);font-size:.74rem;margin-top:.12rem}

/* ===== View switch (Docs / Insights) ===== */
.topdiv{width:1px;height:1.55rem;background:var(--border);flex:0 0 auto}
.viewswitch{display:inline-flex;gap:.2rem;padding:.22rem;background:var(--bg-inset);border:1px solid var(--border);border-radius:10px}
.vtab{display:inline-flex;align-items:center;gap:.42rem;font:inherit;font-size:.83rem;font-weight:650;color:var(--fg-soft);background:none;border:0;border-radius:7px;padding:.4rem .8rem;cursor:pointer;transition:background-color .15s,color .15s}
.vtab svg{width:.95rem;height:.95rem;flex:0 0 auto}
.vtab:hover{color:var(--fg)}
.vtab[aria-selected="true"]{background:var(--bg-card);color:var(--accent-fg);box-shadow:var(--shadow)}

/* ===== Insights view ===== */
body.mode-insights nav.rail,body.mode-insights aside.toc{display:none}
body.mode-insights .shell{grid-template-columns:1fr}
body.mode-insights .prose{max-width:none}
.ins-hero{display:flex;flex-wrap:wrap;align-items:flex-end;gap:.8rem 1.2rem;justify-content:space-between;margin:.1rem 0 1.3rem}
.ins-hero h1{font-size:1.7rem;letter-spacing:-.02em;margin:0}

.trustline{display:flex;flex-wrap:wrap;gap:.4rem}
.trust{font-size:.68rem;font-weight:650;color:var(--fg-soft);background:var(--bg-inset);border:1px solid var(--border-soft);border-radius:20px;padding:.2rem .65rem;white-space:nowrap}
.trust.ok{color:var(--brand-deep);border-color:var(--brand-soft);background:var(--brand-soft)}
.kpigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(8.4rem,1fr));gap:.75rem;margin:0 0 1.5rem}
.kpi{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem .8rem 1.15rem;box-shadow:var(--shadow);overflow:hidden;transition:transform .15s var(--ease),box-shadow .15s var(--ease)}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand)}
.kpi .n{font-size:1.75rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.kpi .l{font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-top:.35rem}
.kpi .d{font-size:.68rem;color:var(--fg-soft);margin-top:.25rem}
.panelgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,21rem),1fr));gap:1rem;margin:0 0 1.3rem;align-items:start}
.card2{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.05rem 1.2rem;box-shadow:var(--shadow)}
.card2.span2{grid-column:1/-1}
.card2 > h3{margin:0 0 .15rem;font-size:1rem}

.donutwrap{display:flex;align-items:center;gap:1.3rem;flex-wrap:wrap}

.legi .lc{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--fg-soft);font-weight:700}
.heatmap{display:flex;flex-direction:column;gap:.6rem}
.hmrow{display:grid;grid-template-columns:8.5rem 1fr 2.5rem;gap:.6rem;align-items:center;font-size:.82rem}
.hmrow .hl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.hmbar{height:.62rem;background:var(--bg-inset);border-radius:20px;overflow:hidden}
.hmbar > i{display:block;height:100%;border-radius:20px;transition:width .5s var(--ease)}
.hmrow .hv{font-variant-numeric:tabular-nums;color:var(--fg-soft);font-weight:700;text-align:right}
.unavail{display:flex;gap:.6rem;align-items:flex-start;background:var(--bg-inset);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:.75rem .95rem;color:var(--fg-soft);font-size:.84rem;line-height:1.5}
.unavail b{color:var(--fg);font-weight:700}
.depgraphwrap{margin:.4rem 0 .2rem;border:1px solid var(--border-soft);border-radius:var(--radius-sm);background:var(--bg-inset);padding:.5rem;cursor:pointer}
.depgraph{display:block;width:100%;height:auto;max-height:24rem}
.depgraph .gnode{cursor:pointer}
/* ===== Map view — interactive, navigable component graph (ADR-024) ===== */
body.mode-map nav.rail,body.mode-map aside.toc{display:none}
body.mode-map .shell{grid-template-columns:1fr}
/* span ALL grid tracks — robust even when body.no-toc (or a media query) restores a rail column and main would otherwise auto-place into the narrow 17rem track */
body.mode-map main{padding:0;overflow:hidden;grid-column:1/-1}
body.mode-map .prose{max-width:none;padding:0}
body.mode-map #genbanner{display:none}
.mapwrap{position:relative;width:100%;height:calc(100vh - 3.6rem);min-height:30rem;background:var(--bg-inset);overflow:hidden;direction:ltr}
.mapcanvas{position:absolute;inset:0;direction:ltr}
.mapsvg{position:absolute;inset:0;width:100%;height:100%;direction:ltr}
.mapbar{position:absolute;top:.7rem;left:.7rem;right:.7rem;z-index:5;display:flex;flex-wrap:wrap;gap:.5rem .8rem;align-items:center;background:color-mix(in srgb,var(--bg-card) 90%,transparent);border:1px solid var(--border);border-radius:12px;padding:.5rem .7rem;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.mapbar .mbtitle{font-weight:700;font-size:.86rem;margin-inline-end:.2rem}
.mapbar label{display:inline-flex;align-items:center;gap:.4rem;font-size:.76rem;color:var(--fg-soft)}
.mapbar input[type=range]{accent-color:var(--accent);vertical-align:middle;max-width:7rem}
.mapbar input[type=text]{font:inherit;font-size:.8rem;padding:.26rem .5rem;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--fg);min-width:9rem}
.mapbar .mbtn{font:inherit;font-size:.76rem;font-weight:650;color:var(--fg-soft);background:var(--bg-inset);border:1px solid var(--border);border-radius:7px;padding:.3rem .65rem;cursor:pointer}
.mapbar .mbtn:hover{color:var(--fg);border-color:var(--accent)}
.maphint{font-size:.74rem;color:var(--fg-faint);margin-inline-start:auto}
.maplegend{position:absolute;left:.7rem;bottom:.7rem;z-index:5;display:flex;flex-direction:column;gap:.32rem;background:color-mix(in srgb,var(--bg-card) 90%,transparent);border:1px solid var(--border);border-radius:10px;padding:.5rem .7rem;font-size:.72rem;color:var(--fg-soft);box-shadow:var(--shadow)}
.maplegend .lgrow{display:flex;align-items:center;gap:.45rem}
.maplegend .sw{width:.8rem;height:.8rem;border-radius:50%;flex:0 0 auto;border:1px solid var(--border)}
.maptip{position:absolute;z-index:6;pointer-events:none;max-width:17rem;background:var(--bg-card);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-lg);padding:.5rem .65rem;font-size:.8rem;display:none;line-height:1.45}
.maptip b{color:var(--fg)}
.maptip .mt-sub{color:var(--fg-soft);font-size:.74rem;margin-top:.15rem}
.mapsvg .mnode,.mapsvg .mnode text{cursor:pointer}
.mapsvg.dim .mnode:not(.hot){opacity:.22}
.mapsvg.dim .medge:not(.hot){opacity:.06}
.mapsvg .mnode.r-ok circle{fill:var(--ok)}.mapsvg .mnode.r-med circle{fill:var(--med)}.mapsvg .mnode.r-high circle{fill:var(--high)}.mapsvg .mnode.r-crit circle{fill:var(--crit)}.mapsvg .mnode.r-none circle{fill:var(--brand)}
.mapsvg .mnode.hot circle{stroke:var(--accent);stroke-width:3}
.irow{border:1px solid var(--border);border-inline-start:3px solid var(--low);border-radius:var(--radius-sm);padding:.6rem .9rem;margin:.55rem 0;background:var(--bg-card)}
.irow.s-critical{border-inline-start-color:var(--crit)}
.irow.s-high{border-inline-start-color:var(--high)}
.irow.s-medium{border-inline-start-color:var(--med)}
.irow.s-low{border-inline-start-color:var(--low)}
.irow.s-cosmetic{border-inline-start-color:var(--fg-faint)}
/* ---- RTL (he; future fa/ur) — the grid inline-axis mirrors automatically; these add the rest ---- */
[dir="rtl"] .depgraph text,[dir="rtl"] .mapsvg text{direction:ltr}
[dir="rtl"] code,[dir="rtl"] pre,[dir="rtl"] .cite,[dir="rtl"] .iid,[dir="rtl"] .did,[dir="rtl"] .badge,[dir="rtl"] .kbd{direction:ltr;unicode-bidi:isolate;text-align:left}
[dir="rtl"] .maplegend{left:auto;right:.7rem}
/* the Map area stays LTR so the graph engine's geometry never flips; re-RTL only the chrome text */
[dir="rtl"] .mapbar,[dir="rtl"] .maplegend,[dir="rtl"] .maptip{direction:rtl}
.irow .ih{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center}
.irow .iid{font-family:var(--mono);font-size:.77rem;font-weight:700;color:var(--accent-fg)}
.irow .ic{margin-top:.3rem;font-size:.9rem}
.irow .im{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.45rem;align-items:center}
.sevchip{font-size:.64rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:.1rem .45rem;border-radius:20px}
.sevchip.s-critical{color:var(--crit);background:color-mix(in srgb,var(--crit) 15%,transparent)}
.sevchip.s-high{color:var(--high);background:color-mix(in srgb,var(--high) 16%,transparent)}
.sevchip.s-medium{color:var(--med);background:color-mix(in srgb,var(--med) 18%,transparent)}
.sevchip.s-low{color:var(--low);background:color-mix(in srgb,var(--low) 20%,transparent)}
.sevchip.s-cosmetic{color:var(--fg-faint);background:var(--bg-inset)}
.dtable{width:100%;border-collapse:collapse;font-size:.85rem}
.dtable th,.dtable td{text-align:left;padding:.45rem .55rem;border-bottom:1px solid var(--border-soft);vertical-align:top}
.dtable th{font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-faint);font-weight:700}
.dtable td .did{font-family:var(--mono);font-size:.78rem;color:var(--accent-fg);font-weight:700}
.statusbadge{font-size:.66rem;font-weight:800;letter-spacing:.03em;padding:.1rem .5rem;border-radius:6px;white-space:nowrap}
.st-confirmed{color:var(--ok);background:color-mix(in srgb,var(--ok) 14%,transparent)}
.st-drifted{color:var(--high);background:color-mix(in srgb,var(--high) 16%,transparent)}
.st-open{color:var(--fg-soft);background:var(--bg-inset)}
@keyframes dpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
body:not(.reduced) .kpi,body:not(.reduced) .card2{animation:dpop .35s var(--ease) both}

body.no-toc .shell{grid-template-columns:var(--rail-l) minmax(0,1fr)}
body.no-toc aside.toc{display:none}

.cmdk-overlay{position:fixed;inset:0;background:rgba(7,14,27,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding-top:11vh}

    var ti=text.indexOf(q); if(ti>=0) return 600 - Math.min(ti,400);
    // subsequence

    return qi===q.length ? 100 : -1;
  }
